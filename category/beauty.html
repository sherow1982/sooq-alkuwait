<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العناية والتجميل - سوق الكويت | منتجات العناية الشخصية والتجميل</title>
    <meta name="description" content="تسوق أفضل منتجات العناية والتجميل في سوق الكويت. أسعار تنافسية وجودة عالية وشحن مجاني داخل الكويت.">
    <meta name="keywords" content="العناية والتجميل, سوق الكويت, تسوق اونلاين">
    <link rel="canonical" href="https://sherow1982.github.io/sooq-alkuwait/category/beauty/">
    <link rel="preload" href="../assets/css/kuwait-modern.css" as="style">
    <link rel="stylesheet" href="../assets/css/kuwait-modern.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        .category-header {
            background: linear-gradient(135deg, #2d5230, #4a7c59);
            color: white;
            padding: 60px 0;
            text-align: center;
            margin-bottom: 40px;
        }
        .category-title {
            font-size: 2.5rem;
            margin: 0;
            font-weight: 700;
        }
        .category-subtitle {
            font-size: 1.2rem;
            margin-top: 10px;
            opacity: 0.9;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.2rem;
            color: #666;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .product-card {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            background: white;
            text-decoration: none;
            color: inherit;
            display: block;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border-color: #2d5230;
        }
        .product-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: #f8f8f8;
        }
        .product-info {
            padding: 16px;
        }
        .product-title {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 8px 0;
            line-height: 1.4;
            color: #333;
            height: 44px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .product-price {
            color: #2d5230;
            font-weight: 700;
            font-size: 18px;
            margin-top: 8px;
        }
        .product-sale-price {
            color: #e74c3c;
            font-size: 14px;
            text-decoration: line-through;
            margin-right: 8px;
        }
        .no-products {
            text-align: center;
            padding: 80px 20px;
            color: #666;
        }
        .breadcrumb {
            padding: 20px;
            background: #f8f9fa;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .breadcrumb a {
            color: #2d5230;
            text-decoration: none;
        }
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        .product-count {
            text-align: center;
            margin: 20px 0;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container nav">
            <a class="logo" href="../index.html">
                <span class="logo-badge"></span>
                <span>سوق الكويت</span>
            </a>
            <nav class="menu">
                <a href="../index.html">الرئيسية</a>
                <a href="../products-catalog.html">المنتجات</a>
                <a href="../about.html">من نحن</a>
                <a href="../contact.html">اتصل بنا</a>
            </nav>
            <div class="cart-icon">
                <a href="../cart.html">🛒 السلة <span id="cart-count">0</span></a>
            </div>
        </div>
    </header>

    <div class="breadcrumb">
        <a href="../">الرئيسية</a> > <span>العناية والتجميل</span>
    </div>
    
    <div class="category-header">
        <div class="category-title">💄 العناية والتجميل</div>
        <div class="category-subtitle">منتجات العناية الشخصية والتجميل</div>
    </div>
    
    <div class="loading" id="loading">جاري تحميل منتجات العناية...</div>
    <div class="product-count" id="productCount" style="display:none"></div>
    <div class="products-grid" id="productsGrid" style="display:none"></div>
    <div class="no-products" id="noProducts" style="display:none">
        <h3>لا توجد منتجات في هذه الفئة حالياً</h3>
        <p><a href="../">العودة للصفحة الرئيسية</a></p>
    </div>

    <script>
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('sooq-cart')) || [];
            const cartCountEl = document.getElementById('cart-count');
            if (cartCountEl) {
                cartCountEl.textContent = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            }
        }
        
        async function loadCategoryProducts() {
            try {
                const PRODUCTS_URL = 'https://sherow1982.github.io/sooq-alkuwait/products_data.json';
                
                const cacheKey = 'sooq_products_cache';
                const cacheExpiry = 'sooq_products_expiry';
                const CACHE_DURATION = 10 * 60 * 1000;
                
                let products;
                const cached = sessionStorage.getItem(cacheKey);
                const expiry = sessionStorage.getItem(cacheExpiry);
                
                if (cached && expiry && Date.now() < parseInt(expiry)) {
                    products = JSON.parse(cached);
                } else {
                    const response = await fetch(PRODUCTS_URL);
                    if (!response.ok) throw new Error('فشل تحميل البيانات');
                    products = await response.json();
                    sessionStorage.setItem(cacheKey, JSON.stringify(products));
                    sessionStorage.setItem(cacheExpiry, (Date.now() + CACHE_DURATION).toString());
                }
                
                function categorizeProduct(product) {
                    const text = `${product.title} ${product.description}`.toLowerCase();
                    const keywords = ['شامبو', 'سيروم', 'كريم', 'عناية', 'شعر', 'بشرة', 'تجميل', 'جمال', 'عطر', 'مشط', 'ماكينة حلاقة', 'أظافر', 'لحية', 'تنعيم', 'تفتيح', 'مزيل عرق', 'روز ماري', 'زيت', 'شفاه'];
                    return keywords.some(keyword => text.includes(keyword.toLowerCase()));
                }
                
                const categoryProducts = products.filter(categorizeProduct);
                
                document.getElementById('loading').style.display = 'none';
                
                if (categoryProducts.length === 0) {
                    document.getElementById('noProducts').style.display = 'block';
                    return;
                }
                
                document.getElementById('productCount').textContent = `تم العثور على ${categoryProducts.length} منتج في فئة العناية والتجميل`;
                document.getElementById('productCount').style.display = 'block';
                
                const grid = document.getElementById('productsGrid');
                grid.style.display = 'grid';
                
                categoryProducts.forEach(product => {
                    const productLink = `../products-pages/product-${product.id}-${encodeURIComponent(product.title.replace(/[\s\u00A0]+/g, '-'))}.html`;
                    
                    const card = document.createElement('a');
                    card.href = productLink;
                    card.className = 'product-card';
                    card.innerHTML = `
                        <img src="${product.image_link}" alt="${product.title}" class="product-image" loading="lazy" 
                             onerror="this.src='https://via.placeholder.com/300x220/2d5230/ffffff?text=عناية+تجميل'">
                        <div class="product-info">
                            <h3 class="product-title">${product.title}</h3>
                            <div class="product-price">
                                ${product.sale_price && product.sale_price < product.price ? 
                                    `<span class="product-sale-price">${product.price} د.ك</span>${product.sale_price} د.ك` : 
                                    `${product.price} د.ك`}
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                
            } catch (error) {
                console.error('خطأ في تحميل المنتجات:', error);
                document.getElementById('loading').innerHTML = `
                    <div style="color: #e74c3c;">
                        <h3>عذراً، حدث خطأ في تحميل المنتجات</h3>
                        <p><a href="../">العودة للصفحة الرئيسية</a></p>
                    </div>
                `;
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            updateCartCount();
            loadCategoryProducts();
        });
    </script>
</body>
</html>
