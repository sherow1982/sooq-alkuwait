<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلكترونيات - سوق الكويت | منتجات إلكترونيات عالية الجودة</title>
    <meta name="description" content="تسوق أفضل منتجات إلكترونيات في سوق الكويت. أسعار تنافسية وجودة عالية وشحن مجاني داخل الكويت.">
    <meta name="keywords" content="إلكترونيات, سوق الكويت, منتجات إلكترونيات, تسوق اونلاين">
    <link rel="canonical" href="https://sherow1982.github.io/sooq-alkuwait/category/electronics/">
    <link rel="preload" href="../style.css" as="style">
    <link rel="stylesheet" href="../style.css">
    <style>
        .category-header {
            background: linear-gradient(135deg, #2d5230, #4a7c59);
            color: white;
            padding: 60px 0;
            text-align: center;
            margin-bottom: 40px;
        }
        .category-title {
            font-size: 2.5rem;
            margin: 0;
            font-weight: 700;
        }
        .category-subtitle {
            font-size: 1.2rem;
            margin-top: 10px;
            opacity: 0.9;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.2rem;
            color: #666;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .product-card {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            background: white;
            text-decoration: none;
            color: inherit;
            display: block;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border-color: #2d5230;
        }
        .product-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: #f8f8f8;
        }
        .product-info {
            padding: 16px;
        }
        .product-title {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 8px 0;
            line-height: 1.4;
            color: #333;
            height: 44px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .product-price {
            color: #2d5230;
            font-weight: 700;
            font-size: 18px;
            margin-top: 8px;
        }
        .product-sale-price {
            color: #e74c3c;
            font-size: 14px;
            text-decoration: line-through;
            margin-right: 8px;
        }
        .no-products {
            text-align: center;
            padding: 80px 20px;
            color: #666;
        }
        .breadcrumb {
            padding: 20px;
            background: #f8f9fa;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .breadcrumb a {
            color: #2d5230;
            text-decoration: none;
        }
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        .product-count {
            text-align: center;
            margin: 20px 0;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="breadcrumb">
        <a href="../">الرئيسية</a> > <span>إلكترونيات</span>
    </div>
    
    <div class="category-header">
        <div class="category-title">إلكترونيات</div>
        <div class="category-subtitle">منتجات إلكترونيات عالية الجودة</div>
    </div>
    
    <div class="loading" id="loading">جاري تحميل المنتجات...</div>
    <div class="product-count" id="productCount" style="display:none"></div>
    <div class="products-grid" id="productsGrid" style="display:none"></div>
    <div class="no-products" id="noProducts" style="display:none">
        <h3>لا توجد منتجات في هذه الفئة حالياً</h3>
        <p><a href="../">العودة للصفحة الرئيسية</a></p>
    </div>

    <script>
        const CATEGORY_FILTER = 'Electronics';
        const FEED_URL = 'https://sherow1982.github.io/sooq-alkuwait/merchant-feed.xml';
        
        // التحقق من الكاش أولاً
        const cacheKey = 'sooq_feed_cache';
        const cacheExpiry = 'sooq_feed_expiry';
        const CACHE_DURATION = 10 * 60 * 1000; // 10 دقائق
        
        async function loadCategoryProducts() {
            try {
                let xmlText;
                const cached = sessionStorage.getItem(cacheKey);
                const expiry = sessionStorage.getItem(cacheExpiry);
                
                if (cached && expiry && Date.now() < parseInt(expiry)) {
                    xmlText = cached;
                } else {
                    const response = await fetch(FEED_URL);
                    if (!response.ok) throw new Error('فشل تحميل الفييد');
                    xmlText = await response.text();
                    sessionStorage.setItem(cacheKey, xmlText);
                    sessionStorage.setItem(cacheExpiry, (Date.now() + CACHE_DURATION).toString());
                }
                
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, 'application/xml');
                const items = Array.from(xmlDoc.querySelectorAll('item'));
                
                // فلترة المنتجات حسب الفئة
                const categoryProducts = items.filter(item => {
                    const category = item.querySelector('g\\:product_category, product_category');
                    return category && category.textContent.trim() === CATEGORY_FILTER;
                });
                
                // إخفاء شاشة التحميل
                document.getElementById('loading').style.display = 'none';
                
                if (categoryProducts.length === 0) {
                    document.getElementById('noProducts').style.display = 'block';
                    return;
                }
                
                // إظهار عدد المنتجات
                document.getElementById('productCount').textContent = `تم العثور على ${categoryProducts.length} منتج في فئة إلكترونيات`;
                document.getElementById('productCount').style.display = 'block';
                
                // إظهار الشبكة
                const grid = document.getElementById('productsGrid');
                grid.style.display = 'grid';
                
                // إنشاء كروت المنتجات
                categoryProducts.forEach(item => {
                    const id = item.querySelector('g\\:id, id')?.textContent || '';
                    const title = item.querySelector('g\\:title, title')?.textContent || 'منتج';
                    const description = item.querySelector('g\\:description, description')?.textContent || '';
                    const link = item.querySelector('g\\:link, link')?.textContent || '#';
                    const imageLink = item.querySelector('g\\:image_link, image_link')?.textContent || '';
                    const price = item.querySelector('g\\:price, price')?.textContent || '';
                    const salePrice = item.querySelector('g\\:sale_price, sale_price')?.textContent || '';
                    
                    const card = document.createElement('a');
                    card.href = link;
                    card.className = 'product-card';
                    card.innerHTML = `
                        <img src="${imageLink}" alt="${title}" class="product-image" loading="lazy">
                        <div class="product-info">
                            <h3 class="product-title">${title}</h3>
                            <div class="product-price">
                                ${salePrice ? `<span class="product-sale-price">${price}</span>${salePrice}` : price}
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                
            } catch (error) {
                console.error('خطأ في تحميل المنتجات:', error);
                document.getElementById('loading').innerHTML = `
                    <div style="color: #e74c3c;">
                        <h3>عذراً، حدث خطأ في تحميل المنتجات</h3>
                        <p><a href="../">العودة للصفحة الرئيسية</a></p>
                    </div>
                `;
            }
        }
        
        // تحميل المنتجات عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', loadCategoryProducts);
    </script>
</body>
</html>
