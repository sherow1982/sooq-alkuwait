name: Push Local Products Pages

on:
  workflow_dispatch:

jobs:
  push-products:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate all product pages from JSON
        run: |
          echo "🏗️ إنشاء جميع صفحات المنتجات..."
          
          # إنشاء مجلد products-pages
          mkdir -p products-pages
          
          # تشغيل مولد الصفحات
          node -e "
          const fs = require('fs');
          
          try {
            // قراءة بيانات المنتجات
            const products = JSON.parse(fs.readFileSync('products_data.json', 'utf8'));
            console.log('📊 عدد المنتجات:', products.length);
            
            // قالب صفحة المنتج المحسن
            const createProductPage = (product) => {
              const discount = product.price > product.sale_price ? 
                Math.round(((product.price - product.sale_price) / product.price) * 100) : 0;
              
              return \`<!DOCTYPE html>
          <html lang=\"ar\" dir=\"rtl\">
          <head>
              <meta charset=\"UTF-8\">
              <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
              <title>\${product.title} - سوق الكويت 🇰🇼</title>
              <meta name=\"description\" content=\"\${product.description || product.title + ' - منتج عالي الجودة من سوق الكويت'}\">
              <link rel=\"stylesheet\" href=\"../assets/css/kuwait-modern.css\">
              <link href=\"https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap\" rel=\"stylesheet\">
              <style>
              :root {
                  --ku-green: #00843d; --ku-red: #ce1126; --ku-white: #ffffff;
                  --ku-black: #000000; --ku-gold: #ffcd00;
              }
              body { font-family: 'Cairo', sans-serif; margin: 0; background: #f8f9fa; }
              .header { background: linear-gradient(135deg, var(--ku-green), var(--ku-red)); color: white; padding: 15px 0; text-align: center; }
              .logo { color: white; text-decoration: none; font-size: 24px; font-weight: bold; }
              .container { max-width: 900px; margin: 0 auto; padding: 20px; }
              .product-page { background: white; border-radius: 20px; padding: 40px; margin: 20px 0; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
              .product-image { width: 100%; max-width: 500px; border-radius: 15px; margin-bottom: 30px; border: 3px solid var(--ku-gold); }
              .product-title { font-size: 28px; font-weight: bold; color: var(--ku-green); margin-bottom: 25px; line-height: 1.4; }
              .price-display { background: linear-gradient(135deg, var(--ku-red), #e74c3c); color: white; padding: 25px; border-radius: 15px; text-align: center; margin: 25px 0; position: relative; }
              .current-price { font-size: 36px; font-weight: 900; margin-bottom: 5px; }
              .original-price { font-size: 20px; text-decoration: line-through; opacity: 0.8; }
              .discount-badge { background: var(--ku-gold); color: var(--ku-black); padding: 8px 15px; border-radius: 20px; font-weight: bold; margin-top: 10px; display: inline-block; }
              .description { background: #f8f9fa; padding: 25px; border-radius: 15px; margin: 25px 0; line-height: 1.8; border-left: 4px solid var(--ku-gold); }
              .specs { background: white; border: 2px solid #e9ecef; border-radius: 15px; padding: 25px; margin: 25px 0; }
              .spec-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
              .spec-row:last-child { border-bottom: none; }
              .spec-label { font-weight: bold; color: #333; }
              .spec-value { color: var(--ku-green); font-weight: 600; }
              .actions { display: flex; gap: 15px; margin: 30px 0; }
              .whatsapp-btn { background: linear-gradient(135deg, #25d366, #128c7e); color: white; padding: 18px 30px; border: none; border-radius: 25px; text-decoration: none; font-weight: bold; flex: 1; text-align: center; transition: all 0.3s; }
              .whatsapp-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4); color: white; }
              .cart-btn { background: linear-gradient(135deg, var(--ku-gold), #f39c12); color: var(--ku-black); padding: 18px 30px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; flex: 1; transition: all 0.3s; }
              .cart-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(243, 156, 18, 0.4); }
              .back-link { color: var(--ku-green); text-decoration: none; font-weight: bold; margin: 20px 0; display: inline-block; font-size: 16px; }
              .back-link:hover { text-decoration: underline; }
              .footer { background: var(--ku-black); color: white; padding: 40px 0; text-align: center; margin-top: 50px; }
              @media (max-width: 768px) {
                  .container { padding: 15px; }
                  .product-page { padding: 25px; margin: 10px 0; }
                  .product-title { font-size: 24px; }
                  .current-price { font-size: 30px; }
                  .actions { flex-direction: column; }
              }
              </style>
          </head>
          <body>
              <header class=\"header\">
                  <div class=\"container\">
                      <a href=\"../index.html\" class=\"logo\">🇰🇼 سوق الكويت</a>
                  </div>
              </header>
              
              <div class=\"container\">
                  <a href=\"../products-catalog.html\" class=\"back-link\">← عودة للكتالوج</a>
                  
                  <div class=\"product-page\">
                      <img src=\"\${product.image_link}\" alt=\"\${product.title}\" class=\"product-image\" 
                           onerror=\"this.src='https://via.placeholder.com/500x400/00843d/ffffff?text=منتج+سوق+الكويت'\">
                      
                      <h1 class=\"product-title\">\${product.title}</h1>
                      
                      <div class=\"price-display\">
                          \${product.price > product.sale_price ? \`<div class=\"original-price\">\${product.price.toFixed(2)} د.ك</div>\` : ''}
                          <div class=\"current-price\">\${product.sale_price.toFixed(2)} د.ك</div>
                          \${discount > 0 ? \`<div class=\"discount-badge\">خصم \${discount}%</div>\` : ''}
                      </div>
                      
                      <div class=\"description\">
                          <h3 style=\"color: var(--ku-green); margin-bottom: 15px;\">📋 وصف المنتج</h3>
                          <p>\${product.description || product.title + ' - منتج عالي الجودة متوفر في سوق الكويت بأفضل الأسعار مع التوصيل المجاني.'}</p>
                      </div>
                      
                      <div class=\"specs\">
                          <h3 style=\"color: var(--ku-green); margin-bottom: 20px;\">📊 تفاصيل المنتج</h3>
                          <div class=\"spec-row\">
                              <span class=\"spec-label\">🆔 رقم المنتج:</span>
                              <span class=\"spec-value\">SOOQ-\${product.id.toString().padStart(4, '0')}</span>
                          </div>
                          <div class=\"spec-row\">
                              <span class=\"spec-label\">💰 السعر الأصلي:</span>
                              <span class=\"spec-value\">\${product.price.toFixed(2)} د.ك</span>
                          </div>
                          <div class=\"spec-row\">
                              <span class=\"spec-label\">🏷️ سعر البيع:</span>
                              <span class=\"spec-value\">\${product.sale_price.toFixed(2)} د.ك</span>
                          </div>
                          <div class=\"spec-row\">
                              <span class=\"spec-label\">🚚 التوصيل:</span>
                              <span class=\"spec-value\" style=\"color: var(--ku-green);\">مجاني لجميع أنحاء الكويت</span>
                          </div>
                          <div class=\"spec-row\">
                              <span class=\"spec-label\">⏱️ مدة التوصيل:</span>
                              <span class=\"spec-value\">24-48 ساعة</span>
                          </div>
                          <div class=\"spec-row\">
                              <span class=\"spec-label\">📞 خدمة العملاء:</span>
                              <span class=\"spec-value\">24/7 متاحة</span>
                          </div>
                      </div>
                      
                      <div class=\"actions\">
                          <a href=\"https://wa.me/201110760081?text=\${encodeURIComponent('مرحباً، أريد طلب هذا المنتج:\n\n📦 ' + product.title + '\n💰 السعر: ' + product.sale_price.toFixed(2) + ' د.ك\n🆔 رقم المنتج: SOOQ-' + product.id.toString().padStart(4, '0') + '\n\nيرجى تأكيد الطلب وإرسال عنوان التوصيل.')}\" 
                             class=\"whatsapp-btn\" target=\"_blank\">
                              💬 طلب عبر واتساب
                          </a>
                          
                          <button class=\"cart-btn\" data-id=\"\${product.id}\" data-title=\"\${product.title.replace(/\"/g, '&quot;')}\" data-price=\"\${product.sale_price}\" data-image=\"\${product.image_link}\">
                              🛒 أضف إلى السلة
                          </button>
                      </div>
                  </div>
              </div>
              
              <footer class=\"footer\">
                  <div class=\"container\">
                      <h3>🇰🇼 سوق الكويت</h3>
                      <p>تجربة تسوق حديثة بألوان العلم</p>
                      <div style=\"margin-top: 25px;\">
                          <a href=\"https://wa.me/201110760081\" style=\"color: #25d366; margin: 0 15px;\">💬</a>
                          <a href=\"mailto:sooqalkuwait2010@gmail.com\" style=\"color: var(--ku-gold); margin: 0 15px;\">📧</a>
                          <a href=\"tel:+201110760081\" style=\"color: var(--ku-gold); margin: 0 15px;\">📞</a>
                      </div>
                      <p style=\"margin-top: 20px; opacity: 0.8;\">© 2025 جميع الحقوق محفوظة</p>
                  </div>
              </footer>
              
              <script>
                  // تفعيل زر السلة
                  document.addEventListener('DOMContentLoaded', function() {
                      const cartBtn = document.querySelector('.cart-btn');
                      if (cartBtn) {
                          cartBtn.addEventListener('click', function() {
                              const id = Number(this.dataset.id);
                              const title = this.dataset.title;
                              const price = Number(this.dataset.price);
                              const image = this.dataset.image;
                              
                              // إضافة للسلة
                              let cart = JSON.parse(localStorage.getItem('sooq-cart') || '[]');
                              const existing = cart.find(item => item.id === id);
                              
                              if (existing) {
                                  existing.quantity += 1;
                              } else {
                                  cart.push({id: id, title: title, price: price, image: image, quantity: 1});
                              }
                              
                              localStorage.setItem('sooq-cart', JSON.stringify(cart));
                              
                              // إشعار وانتقال
                              alert('✅ تم إضافة المنتج إلى السلة بنجاح!');
                              setTimeout(() => {
                                  window.location.href = '../cart.html?added=1';
                              }, 1000);
                          });
                      }
                  });
              </script>
          </body>
          </html>\`;
            };
            
            // إنشاء الصفحات
            let successCount = 0;
            let errorCount = 0;
            
            products.forEach(product => {
              try {
                const fileName = \`products-pages/product-\${product.id}.html\`;
                const htmlContent = createProductPage(product);
                fs.writeFileSync(fileName, htmlContent, 'utf8');
                successCount++;
                
                if (successCount % 100 === 0) {
                  console.log(\`📄 تم إنشاء \${successCount} صفحة...\`);
                }
              } catch (error) {
                errorCount++;
                console.error('❌ خطأ في المنتج', product.id, ':', error.message);
              }
            });
            
            console.log(\`✅ تم الانتهاء: \${successCount} صفحة نجحت، \${errorCount} فشلت\`);
            
            // إنشاء فهرس للصفحات
            const indexContent = \`<!DOCTYPE html>
        <html lang=\"ar\" dir=\"rtl\">
        <head>
            <meta charset=\"UTF-8\">
            <title>فهرس صفحات المنتجات - سوق الكويت</title>
            <style>
            body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
            .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; }
            h1 { color: #00843d; text-align: center; margin-bottom: 30px; }
            .stats { background: #e8f5e8; padding: 20px; border-radius: 10px; text-align: center; margin: 20px 0; }
            .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
            .item { background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 4px solid #00843d; }
            .item a { color: #007bff; text-decoration: none; font-weight: bold; }
            .item a:hover { text-decoration: underline; }
            .item small { color: #666; display: block; margin-top: 5px; }
            </style>
        </head>
        <body>
            <div class=\"container\">
                <h1>📦 فهرس صفحات المنتجات</h1>
                <div class=\"stats\">
                    <h3>📊 الإحصائيات</h3>
                    <p>✅ تم إنشاء <strong>\${successCount}</strong> صفحة منتج بنجاح</p>
                    <p>📅 تاريخ الإنشاء: \${new Date().toLocaleString('ar-EG')}</p>
                </div>
                <div class=\"grid\">\${products.slice(0, 50).map(p => \`
                    <div class=\"item\">
                        <a href=\"product-\${p.id}.html\" target=\"_blank\">\${p.title}</a>
                        <small>السعر: \${p.sale_price.toFixed(2)} د.ك | رقم: SOOQ-\${p.id.toString().padStart(4, '0')}</small>
                    </div>\`).join('')}</div>
                <div style=\"text-align: center; margin-top: 30px;\">
                    <a href=\"../products-catalog.html\" style=\"background: #00843d; color: white; padding: 15px 30px; border-radius: 25px; text-decoration: none; font-weight: bold;\">عودة للكتالوج</a>
                </div>
            </div>
        </body>
        </html>\`;
            
            fs.writeFileSync('products-pages/index.html', indexContent, 'utf8');
            console.log('📋 تم إنشاء فهرس الصفحات');
            
          } catch (error) {
            console.error('❌ خطأ عام:', error.message);
            process.exit(1);
          }
          "
          
          echo "✅ تم الانتهاء من إنشاء جميع الصفحات!"

      - name: Commit and push all product pages
        run: |
          git config --local user.email "80130495+sherow1982@users.noreply.github.com"
          git config --local user.name "Sherif Salama"
          git add products-pages/
          git commit -m "📦 Add all product pages ($(find products-pages -name '*.html' | wc -l) pages)" || echo "Nothing to commit"
          git push
          
          echo "🎉 تم رفع جميع صفحات المنتجات للريبو بنجاح!"