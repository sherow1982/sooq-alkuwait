name: Final Repository Cleanup

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Complete cleanup and fix
        run: |
          echo "🧹 بدء التنظيف النهائي..."
          
          # 1. حذف جميع الملفات غير الضرورية
          echo "🗑️ حذف الملفات غير الضرورية..."
          
          # حذف ملفات الاختبار والتصحيح
          find . -name "debug-*.html" -delete 2>/dev/null || true
          find . -name "test-*.html" -delete 2>/dev/null || true
          find . -name "universal_*.html" -delete 2>/dev/null || true
          find . -name "*fixed.html" ! -name "products-catalog-fixed.html" -delete 2>/dev/null || true
          
          # حذف ملفات الماركداون المؤقتة
          rm -f BULK_*.txt CART*.md CLEANUP*.md DEPLOYMENT*.md EXECUTION*.md || true
          rm -f GITHUB*.md README_*.md RUN*.md TRIGGER*.md WORKFLOW*.md || true
          rm -f fix*.md complete*.md push*.md regenerate*.md || true
          rm -f *.py debug*.js test*.js || true
          
          # حذف الملفات المكررة
          rm -f product-feed.xml products_feed.xml || true
          rm -f products_data_clean.json products_data_full.json || true
          rm -f kuwaiti_reviews_updated.json || true
          
          # حذف ملفات JS غير ضرورية (مع الحفاظ على المهمة)
          find . -name "*.js" ! -path "./assets/*" ! -name "sw.js" -delete 2>/dev/null || true
          
          # حذف workflows قديمة غير ضرورية
          rm -f .github/workflows/regenerate-products.yml || true
          rm -f .github/workflows/clean-products-pages.yml || true
          rm -f .github/workflows/repository-cleanup.yml || true
          rm -f .github/workflows/complete-fix.yml || true
          rm -f .github/workflows/quick-fix.yml || true
          
          echo "✅ تم حذف الملفات غير الضرورية"
          
          # 2. إصلاح صفحة الكتالوج
          echo "🔧 إصلاح صفحة الكتالوج..."
          
          cat > products-catalog.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ar" dir="rtl">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>سوق الكويت 🇰🇼 - الكتالوج الشامل</title>
              <meta name="description" content="كتالوج شامل للمنتجات عالية الجودة بأفضل الأسعار في الكويت">
              <link rel="stylesheet" href="assets/css/kuwait-modern.css">
              <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
              <style>
              :root { --ku-green: #00843d; --ku-red: #ce1126; --ku-gold: #ffcd00; }
              body { font-family: 'Cairo', sans-serif; margin: 0; background: #f8f9fa; }
              .header { background: linear-gradient(135deg, var(--ku-green), var(--ku-red)); color: white; padding: 15px 0; position: sticky; top: 0; z-index: 1000; }
              .nav { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
              .logo { color: white; text-decoration: none; font-size: 28px; font-weight: 900; }
              .menu { display: flex; gap: 30px; }
              .menu a { color: white; text-decoration: none; font-weight: 600; padding: 8px 15px; border-radius: 20px; transition: all 0.3s; }
              .menu a:hover { background: rgba(255,255,255,0.2); }
              .cta { background: var(--ku-gold); color: #000; padding: 12px 25px; border-radius: 25px; text-decoration: none; font-weight: bold; }
              .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
              .hero { background: linear-gradient(135deg, var(--ku-green), var(--ku-red)); color: white; padding: 80px 0; text-align: center; }
              .hero h1 { font-size: 48px; font-weight: 900; margin-bottom: 20px; }
              .hero p { font-size: 20px; color: var(--ku-gold); }
              .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 40px 0; }
              .stat { background: white; padding: 25px; border-radius: 15px; text-align: center; border: 2px solid var(--ku-gold); }
              .stat-number { font-size: 32px; font-weight: 900; color: var(--ku-green); }
              .search-section { background: white; padding: 30px 0; }
              .search-box { max-width: 600px; margin: 0 auto; position: relative; }
              .search-input { width: 100%; padding: 15px 50px 15px 20px; border: 3px solid var(--ku-gold); border-radius: 25px; font-size: 16px; }
              .search-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: var(--ku-green); color: white; border: none; padding: 12px 16px; border-radius: 20px; cursor: pointer; }
              .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin: 30px 0; }
              .product-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: all 0.3s ease; cursor: pointer; }
              .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
              .product-image { width: 100%; height: 200px; object-fit: cover; }
              .product-info { padding: 20px; }
              .product-title { font-weight: bold; margin-bottom: 10px; color: var(--ku-green); font-size: 16px; height: 40px; overflow: hidden; }
              .price-section { background: var(--ku-red); color: white; padding: 10px; border-radius: 8px; text-align: center; margin: 10px 0; }
              .current-price { font-size: 20px; font-weight: bold; }
              .actions { display: flex; flex-direction: column; gap: 8px; }
              .whatsapp-btn { background: #25d366; color: white; padding: 10px; border-radius: 8px; text-decoration: none; text-align: center; font-weight: bold; }
              .whatsapp-btn:hover { background: #128c7e; color: white; }
              .cart-btn { background: var(--ku-gold); color: #000; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
              .cart-btn:hover { background: #f39c12; }
              .loading { text-align: center; padding: 50px; font-size: 18px; color: #666; }
              .error { text-align: center; padding: 40px; background: #fff5f5; border: 2px solid #fed7d7; border-radius: 10px; color: #c53030; margin: 20px 0; }
              .retry-btn { background: var(--ku-green); color: white; padding: 12px 25px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; margin-top: 15px; }
              .footer { background: #000; color: white; padding: 40px 0; text-align: center; margin-top: 50px; }
              .footer a { color: var(--ku-gold); text-decoration: none; margin: 0 10px; }
              </style>
          </head>
          <body>
              <header class="header">
                  <div class="nav">
                      <a class="logo" href="index.html">🇰🇼 سوق الكويت</a>
                      <nav class="menu">
                          <a href="index.html">🏠 الرئيسية</a>
                          <a href="products-catalog.html">📦 المنتجات</a>
                          <a href="cart.html">🛒 السلة</a>
                      </nav>
                      <a class="cta" href="tel:+201110760081">📱 اطلب الآن</a>
                  </div>
              </header>
              
              <section class="hero">
                  <div class="container">
                      <h1>🛒 الكتالوج الشامل</h1>
                      <p>منتجات عالية الجودة بأفضل الأسعار</p>
                  </div>
              </section>
              
              <div class="container">
                  <div class="stats">
                      <div class="stat"><div class="stat-number" id="total-products">1977</div><div>منتج متاح</div></div>
                      <div class="stat"><div class="stat-number">مجاني</div><div>التوصيل</div></div>
                      <div class="stat"><div class="stat-number">24/7</div><div>خدمة العملاء</div></div>
                  </div>
              </div>
              
              <section class="search-section">
                  <div class="container">
                      <div class="search-box">
                          <input type="text" id="search-input" class="search-input" placeholder="🔍 ابحث عن المنتج...">
                          <button class="search-btn" onclick="performSearch()">🔍</button>
                      </div>
                  </div>
              </section>
              
              <div class="container">
                  <div id="products-container"><div class="loading">⏳ جاري تحميل المنتجات...</div></div>
              </div>
              
              <footer class="footer">
                  <div class="container">
                      <p>© 2025 سوق الكويت - جميع الحقوق محفوظة</p>
                      <div>
                          <a href="https://wa.me/201110760081">💬 واتساب</a>
                          <a href="mailto:sooqalkuwait2010@gmail.com">📧 إيميل</a>
                          <a href="tel:+201110760081">📞 هاتف</a>
                      </div>
                  </div>
              </footer>
              
              <script src="assets/js/cart-fixed.js"></script>
              <script>
              let allProducts = [];
              
              async function loadProducts() {
                  try {
                      console.log('📥 تحميل من GitHub...');
                      
                      const response = await fetch('https://raw.githubusercontent.com/sherow1982/sooq-alkuwait/main/products_data.json', {
                          cache: 'no-cache'
                      });
                      
                      if (!response.ok) throw new Error(`HTTP ${response.status}`);
                      
                      const products = await response.json();
                      console.log(`✅ تم تحميل ${products.length} منتج`);
                      
                      allProducts = products;
                      displayProducts(products.slice(0, 50));
                      updateProductsCount(products.length);
                      
                  } catch (error) {
                      console.error('❌ خطأ:', error);
                      showError();
                  }
              }
              
              function displayProducts(products) {
                  const container = document.getElementById('products-container');
                  if (!products.length) {
                      container.innerHTML = '<div class="error">❌ لا توجد منتجات</div>';
                      return;
                  }
                  
                  const grid = document.createElement('div');
                  grid.className = 'products-grid';
                  
                  products.forEach(product => {
                      const card = document.createElement('div');
                      card.className = 'product-card';
                      
                      const discount = product.price > product.sale_price ? Math.round(((product.price - product.sale_price) / product.price) * 100) : 0;
                      
                      card.innerHTML = `
                          <img src="${product.image_link}" alt="Product" class="product-image" loading="lazy" 
                               onerror="this.src='https://via.placeholder.com/280x200/00843d/ffffff?text=منتج'">
                          <div class="product-info">
                              <h3 class="product-title">${product.title}</h3>
                              <div class="price-section">
                                  ${discount > 0 ? `<small style="text-decoration:line-through;opacity:0.8">${product.price.toFixed(2)} د.ك</small><br>` : ''}
                                  <div class="current-price">${product.sale_price.toFixed(2)} د.ك</div>
                                  ${discount > 0 ? `<small style="background:#ffcd00;color:#000;padding:4px 8px;border-radius:10px;margin-top:5px;display:inline-block">خصم ${discount}%</small>` : ''}
                              </div>
                              <div class="actions">
                                  <a href="https://wa.me/201110760081?text=أريد طلب: ${encodeURIComponent(product.title)} - السعر: ${product.sale_price.toFixed(2)} د.ك" 
                                     class="whatsapp-btn" target="_blank">💬 طلب عبر واتساب</a>
                                  <button class="cart-btn" 
                                          data-id="${product.id}" 
                                          data-title="${product.title.replace(/"/g, '&quot;')}" 
                                          data-price="${product.sale_price}" 
                                          data-image="${product.image_link}">
                                      🛒 أضف للسلة
                                  </button>
                              </div>
                          </div>
                      `;
                      
                      grid.appendChild(card);
                  });
                  
                  container.innerHTML = '';
                  container.appendChild(grid);
                  bindCartButtons();
              }
              
              function bindCartButtons() {
                  document.querySelectorAll('.cart-btn').forEach(btn => {
                      btn.addEventListener('click', (e) => {
                          e.stopPropagation();
                          const id = Number(btn.dataset.id);
                          const title = btn.dataset.title;
                          const price = Number(btn.dataset.price);
                          const image = btn.dataset.image;
                          
                          if (window.addToCart) {
                              window.addToCart(id, title, price, image);
                          }
                      });
                  });
              }
              
              function performSearch() {
                  const term = document.getElementById('search-input').value.toLowerCase();
                  if (!term.trim()) {
                      displayProducts(allProducts.slice(0, 50));
                      return;
                  }
                  const filtered = allProducts.filter(p => p.title.toLowerCase().includes(term));
                  displayProducts(filtered.slice(0, 50));
                  console.log(`🔍 بحث: "${term}" - ${filtered.length} نتيجة`);
              }
              
              function updateProductsCount(count) {
                  const el = document.getElementById('total-products');
                  if (el) el.textContent = count.toLocaleString('ar');
              }
              
              function showError() {
                  document.getElementById('products-container').innerHTML = '<div class="error">❌ خطأ في تحميل المنتجات<br><button class="retry-btn" onclick="loadProducts()">إعادة المحاولة</button></div>';
              }
              
              document.addEventListener('DOMContentLoaded', function() {
                  console.log('🎉 بدء تحميل الكتالوج...');
                  if (window.updateCartCounter) window.updateCartCounter();
                  loadProducts();
                  
                  const searchInput = document.getElementById('search-input');
                  if (searchInput) {
                      searchInput.addEventListener('keypress', e => {
                          if (e.key === 'Enter') performSearch();
                      });
                  }
              });
              </script>
          </body>
          </html>
          EOF
          
          echo "✅ تم إصلاح صفحة الكتالوج"
          
          # 3. إنشاء صفحات منتجات محسنة
          echo "📄 إنشاء صفحات المنتجات..."
          
          # تنظيف مجلد المنتجات
          rm -rf products-pages/*
          mkdir -p products-pages
          
          node -e "
          const fs = require('fs');
          
          try {
            const products = JSON.parse(fs.readFileSync('products_data.json', 'utf8'));
            console.log('📊 عدد المنتجات:', products.length);
            
            const createPage = (p) => \`<!DOCTYPE html>
        <html lang=\"ar\" dir=\"rtl\">
        <head>
            <meta charset=\"UTF-8\">
            <title>\${p.title} - سوق الكويت</title>
            <link rel=\"stylesheet\" href=\"../assets/css/kuwait-modern.css\">
            <style>
            body { font-family: 'Cairo', sans-serif; background: #f8f9fa; }
            .header { background: #00843d; color: white; padding: 15px 0; text-align: center; }
            .container { max-width: 800px; margin: 0 auto; padding: 20px; }
            .product { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
            .product-image { width: 100%; max-width: 400px; border-radius: 10px; margin-bottom: 20px; }
            .title { font-size: 24px; font-weight: bold; color: #00843d; margin-bottom: 20px; }
            .price { font-size: 32px; font-weight: bold; color: #ce1126; margin: 20px 0; }
            .description { line-height: 1.6; margin: 20px 0; }
            .whatsapp-btn { background: #25d366; color: white; padding: 15px 30px; border-radius: 25px; text-decoration: none; margin: 10px; display: inline-block; font-weight: bold; }
            .cart-btn { background: #ffcd00; color: #000; padding: 15px 30px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; margin: 10px; }
            .back { color: #00843d; text-decoration: none; font-weight: bold; }
            </style>
        </head>
        <body>
            <header class=\"header\">
                <div class=\"container\">
                    <a href=\"../index.html\" class=\"logo\" style=\"color:white;text-decoration:none;font-weight:bold;\">سوق الكويت</a>
                </div>
            </header>
            <div class=\"container\">
                <a href=\"../products-catalog.html\" class=\"back\">← عودة للكتالوج</a>
                <div class=\"product\">
                    <img src=\"\${p.image_link}\" alt=\"\${p.title}\" class=\"product-image\" onerror=\"this.src='https://via.placeholder.com/400x300/00843d/ffffff?text=منتج'\">
                    <h1 class=\"title\">\${p.title}</h1>
                    <div class=\"price\">\${p.sale_price.toFixed(2)} د.ك</div>
                    <div class=\"description\">\${p.description || p.title + ' - منتج عالي الجودة من سوق الكويت'}</div>
                    <div>
                        <a href=\"https://wa.me/201110760081?text=أريد طلب: \${encodeURIComponent(p.title)} - السعر: \${p.sale_price.toFixed(2)} د.ك\" class=\"whatsapp-btn\" target=\"_blank\">💬 طلب عبر واتساب</a>
                        <button class=\"cart-btn\" onclick=\"addToCartAndRedirect(\${p.id}, '\${p.title.replace(/'/g, \"\\\\'\")\\\'}', \${p.sale_price})\">🛒 أضف للسلة</button>
                    </div>
                </div>
            </div>
            <script>
            function addToCartAndRedirect(id, title, price) {
                let cart = JSON.parse(localStorage.getItem('sooq-cart') || '[]');
                const existing = cart.find(item => item.id === id);
                if (existing) {
                    existing.quantity += 1;
                } else {
                    cart.push({id, title, price, quantity: 1});
                }
                localStorage.setItem('sooq-cart', JSON.stringify(cart));
                alert('✅ تم إضافة المنتج للسلة!');
                window.location.href = '../cart.html';
            }
            </script>
        </body>
        </html>\`;
            
            let created = 0;
            products.forEach(p => {
              try {
                fs.writeFileSync(\`products-pages/product-\${p.id}.html\`, createPage(p), 'utf8');
                created++;
                if (created % 100 === 0) console.log(\`📄 \${created} صفحة...\`);
              } catch (err) {
                console.error('خطأ:', p.id, err.message);
              }
            });
            
            console.log(\`✅ تم إنشاء \${created} صفحة بنجاح\`);
            
            // فهرس الصفحات
            const indexPage = \`<!DOCTYPE html>
        <html lang=\"ar\" dir=\"rtl\">
        <head><meta charset=\"UTF-8\"><title>فهرس المنتجات</title></head>
        <body style=\"font-family:Arial;padding:20px;background:#f5f5f5\">
        <div style=\"max-width:1000px;margin:0 auto;background:white;padding:30px;border-radius:15px\">
        <h1 style=\"color:#00843d;text-align:center\">📦 فهرس صفحات المنتجات</h1>
        <p style=\"text-align:center;background:#e8f5e8;padding:15px;border-radius:8px\">✅ تم إنشاء <strong>\${created}</strong> صفحة منتج</p>
        <div style=\"text-align:center;margin:30px 0\">
        <a href=\"../products-catalog.html\" style=\"background:#00843d;color:white;padding:15px 30px;border-radius:25px;text-decoration:none;font-weight:bold\">عودة للكتالوج</a>
        </div></div></body></html>\`;
            
            fs.writeFileSync('products-pages/index.html', indexPage, 'utf8');
            
          } catch (error) {
            console.error('❌ خطأ عام:', error.message);
            process.exit(1);
          }
          "
          
          echo "✅ تم الانتهاء من إنشاء الصفحات!"

      - name: Commit and push all changes
        run: |
          git config --local user.email "80130495+sherow1982@users.noreply.github.com"
          git config --local user.name "Sherif Salama"
          git add -A
          git commit -m "🧹 FINAL CLEANUP: Remove unnecessary files and fix all issues" || echo "Nothing to commit"
          git push
          
          echo "🎉 تم الانتهاء بنجاح! الموقع جاهز 100%"