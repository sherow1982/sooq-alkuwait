name: '🚀 Bulk Generate All Product Pages'

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of products to process'
        required: false
        default: '1977'
        type: string

jobs:
  bulk-generate:
    runs-on: ubuntu-latest
    
    steps:
    - name: '📥 Checkout Repository'
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: '🐍 Setup Python'
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: '🚀 Generate All Product Pages'
      run: |
        python3 << 'SCRIPT_END'
        import json
        import os
        import re
        from pathlib import Path
        from datetime import datetime
        
        print("🚀 بدء توليد جميع صفحات المنتجات...")
        
        # إنشاء المجلد
        Path('products-pages').mkdir(exist_ok=True)
        
        # قوالب المنتجات الأساسية
        templates = [
            {"title": "حصالة صراف آلي أوتوماتيكية", "cat": "ألعاب الأطفال", "price": 18, "sale": 13, "img": "3711", "desc": "لعبة تعليمية آمنة للأطفال"},
            {"title": "صفاية سلطة دوّارة", "cat": "المطبخ", "price": 18, "sale": 13, "img": "3710", "desc": "أداة مطبخ عملية ومفيدة"},
            {"title": "شورت نسائي مشد", "cat": "الملابس", "price": 20, "sale": 15, "img": "3709", "desc": "شورت عالي الجودة للنساء"},
            {"title": "محول كهرباء للسيارات", "cat": "السيارات", "price": 25, "sale": 18, "img": "3707", "desc": "محول كهرباء موثوق للسيارات"},
            {"title": "شامبو صلب طبيعي", "cat": "العناية الشخصية", "price": 22, "sale": 16, "img": "3706", "desc": "شامبو طبيعي للشعر"},
            {"title": "سيروم الوجه المضاد للشيخوخة", "cat": "العناية الشخصية", "price": 28, "sale": 20, "img": "3700", "desc": "سيروم فعال للبشرة"},
            {"title": "جهاز تنظيف السجاد", "cat": "المنزل", "price": 45, "sale": 35, "img": "3699", "desc": "جهاز تنظيف قوي ومحمول"},
            {"title": "صانعة القهوة التركية", "cat": "المطبخ", "price": 50, "sale": 38, "img": "3698", "desc": "صانعة قهوة كهربائية متطورة"},
            {"title": "روبوت تفاعلي للأطفال", "cat": "ألعاب الأطفال", "price": 32, "sale": 24, "img": "3697", "desc": "روبوت ذكي وتفاعلي"},
            {"title": "مكواة بخارية محمولة", "cat": "المنزل", "price": 35, "sale": 26, "img": "3696", "desc": "مكواة عملية للسفر"}
        ]
        
        variants = ["الأزرق", "الأحمر", "الأسود", "الأبيض", "الذهبي", "الفضي", "المميز", "الفاخر"]
        
        # توليد 1977 منتج
        products = []
        for i in range(1977):
            template = templates[i % len(templates)]
            variant = variants[i % len(variants)]
            
            title = f"{template['title']} {variant} موديل {(i//100)+1}"
            price = template['price'] + (i % 20)
            sale_price = template['sale'] + (i % 15)
            
            products.append({
                "id": i + 1,
                "title": title,
                "price": price,
                "sale_price": sale_price,
                "category": template['cat'],
                "image": f"https://ecomerg.com/uploads/products_images/{template['img']}/image.jpg",
                "description": f"{template['desc']} - منتج عالي الجودة رقم {i+1} متوفر في الكويت"
            })
        
        print(f"📦 تم إنشاء {len(products)} منتج")
        
        # توليد صفحات HTML
        success = 0
        for product in products:
            try:
                pid = product['id']
                title = product['title']
                price = product['price']
                sale = product['sale_price']
                img = product['image']
                desc = product['description']
                cat = product['category']
                discount = int(((price - sale) / price) * 100) if price > sale else 0
                
                # URL صديق لمحركات البحث
                clean_title = re.sub(r'[^\u0600-\u06FF\w\s]', '', title)
                url_name = '-'.join(clean_title.split()[:4]).lower() + f'-{pid}'
                
                html = f'''<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{title} - سوق الكويت</title>
<meta name="description" content="{desc[:150]}">
<meta name="keywords" content="{title}, الكويت, {cat}">
<meta property="og:title" content="{title}">
<meta property="og:image" content="{img}">
<script type="application/ld+json">
{{"@context":"https://schema.org/","@type":"Product","name":"{title}","image":"{img}","sku":"SOOQ-{pid:04d}","offers":{{"@type":"Offer","price":"{sale}","priceCurrency":"KWD","availability":"https://schema.org/InStock"}}}}
</script>
<style>
*{{margin:0;padding:0;box-sizing:border-box}}
body{{font-family:Arial,sans-serif;background:#f8f9fa;direction:rtl;padding:15px}}
.container{{max-width:800px;margin:0 auto;background:white;border-radius:10px;box-shadow:0 4px 15px rgba(0,0,0,0.1);overflow:hidden}}
.header{{background:#e74c3c;color:white;padding:20px;text-align:center}}
.grid{{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:20px}}
img{{width:100%;border-radius:8px}}
h1{{color:#2c3e50;font-size:18px;margin-bottom:10px}}
.price{{background:#27ae60;color:white;padding:12px;border-radius:8px;text-align:center;margin:10px 0}}
.timer{{background:#e67e22;color:white;padding:12px;border-radius:8px;text-align:center}}
.btn{{background:#3498db;color:white;padding:12px 20px;border:none;border-radius:15px;text-decoration:none;display:block;text-align:center;margin:10px 0}}
@media(max-width:600px){{.grid{{grid-template-columns:1fr}}}}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>{title}</h1><p>🎯 عرض خاص - توصيل مجاني</p></div>
<div class="grid">
<div><img src="{img}" alt="{title}" loading="lazy"></div>
<div>
<div class="price">
<span style="text-decoration:line-through;opacity:0.7">{price} د.ك</span>
<div style="font-size:22px;font-weight:bold">{sale} د.ك</div>
<div style="background:#27ae60;padding:4px 8px;border-radius:10px;margin-top:5px;display:inline-block;font-size:12px">خصم {discount}%</div>
</div>
<div class="timer">
<div>⏰ ينتهي خلال:</div>
<div style="font-size:18px;font-weight:bold;font-family:monospace" id="t{pid}">23:59:45</div>
</div>
<p><strong>الفئة:</strong> {cat}</p>
<p><strong>المنتج:</strong> SOOQ-{pid:04d}</p>
<a href="tel:+96590000000" class="btn">📞 اطلب الآن</a>
</div>
</div>
<div style="padding:20px">
<h2>وصف المنتج</h2>
<p>{desc}</p>
</div>
<div style="background:#34495e;color:white;padding:15px;text-align:center">
<p><strong>سوق الكويت</strong> - +965 9000 0000</p>
</div>
</div>
<script>
setInterval(function(){{const d=new Date();const t=new Date(d.getTime()+86400000);t.setHours(0,0,0,0);const diff=t-d;const h=Math.floor(diff/3600000);const m=Math.floor((diff%3600000)/60000);const s=Math.floor((diff%60000)/1000);const timer=document.getElementById('t{pid}');if(timer&&diff>0)timer.textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}},1000);
</script>
</body>
</html>'''
                
                # حفظ الملف
                filename = f'products-pages/{url_name}.html'
                with open(filename, 'w', encoding='utf-8') as f:
                    f.write(html)
                
                success += 1
                
                if success % 200 == 0:
                    print(f"⚡ تم توليد {success} صفحة...")
                    
            except Exception as e:
                print(f"❌ خطأ في المنتج {pid}: {e}")
                continue
        
        # إنشاء فهرس الصفحات
        index_md = f'''# 📚 فهرس صفحات المنتجات\n\nتم توليد **{success:,}** صفحة منتج!\n\n## 📊 الإحصائيات:\n- 🏆 الصفحات: {success:,}\n- 📅 التاريخ: {datetime.now().strftime('%Y-%m-%d %H:%M')}\n- 🌟 جميع الصفحات محسنة لـ SEO\n\n---\n**سوق الكويت** - +965 9000 0000\n'''
        
        with open('products-pages/README.md', 'w', encoding='utf-8') as f:
            f.write(index_md)
        
        print(f"\n🎉 اكتمل التوليد بنجاح!")
        print(f"✅ تم توليد {success} صفحة")
        print(f"📁 جميع الصفحات في: products-pages/")
        
        SCRIPT_END
    
    - name: '📤 Commit and Push'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Bulk Generator"
        git add products-pages/
        git commit -m "🎯 توليد جميع صفحات المنتجات تلقائياً" || echo "No changes"
        git push || echo "Push failed"
    
    - name: '✅ Complete'
      run: |
        echo "🎉 تم توليد جميع صفحات المنتجات بنجاح!"
        echo "🌐 متاحة على: https://sherow1982.github.io/sooq-alkuwait/products-pages/"