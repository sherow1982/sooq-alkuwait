name: Regenerate Product Pages

on:
  workflow_dispatch:

jobs:
  regenerate-products:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Generate product pages
        run: |
          # Create products-pages directory if it doesn't exist
          mkdir -p products-pages
          
          # Generate clean product pages from JSON data
          node -e "
          const fs = require('fs');
          
          // Read products data
          const productsData = JSON.parse(fs.readFileSync('products_data.json', 'utf8'));
          
          // Product page template
          const generateProductPage = (product) => {
            return \`<!DOCTYPE html>
          <html dir='rtl' lang='ar'>
          <head>
              <meta charset='UTF-8'>
              <meta name='viewport' content='width=device-width, initial-scale=1.0'>
              <title>\${product.title} | سوق الكويت</title>
              <meta name='description' content='\${product.description}'>
              <meta name='keywords' content='\${product.title}, سوق الكويت, تسوق اونلاين'>
              <link rel='canonical' href='https://sherow1982.github.io/sooq-alkuwait/products-pages/product-\${product.id}.html'>
              <link rel='stylesheet' href='../assets/css/style.css'>
              <link rel='stylesheet' href='../assets/css/product-page.css'>
          </head>
          <body>
              <div id='loader' class='loader'>
                  <div class='spinner'></div>
              </div>
              
              <div class='container' id='content'>
                  <div class='product-page'>
                      <div class='product-header'>
                          <h1>\${product.title}</h1>
                      </div>
                      
                      <div class='product-content'>
                          <div class='product-image'>
                              <img src='\${product.image_link}' alt='\${product.title}' loading='lazy'>
                          </div>
                          
                          <div class='product-info'>
                              <div class='price-section'>
                                  <span class='original-price'>\${product.price} د.ك</span>
                                  <span class='sale-price'>\${product.sale_price} د.ك</span>
                                  <span class='discount'>وفر \${product.price - product.sale_price} د.ك</span>
                              </div>
                              
                              <div class='product-description'>
                                  <p>\${product.description}</p>
                              </div>
                              
                              <div class='product-actions'>
                                  <button class='add-to-cart' data-product-id='\${product.id}'>أضف إلى السلة</button>
                                  <button class='buy-now'>اشتري الآن</button>
                              </div>
                          </div>
                      </div>
                  </div>
                  
                  <nav class='breadcrumb'>
                      <a href='../index.html'>الرئيسية</a>
                      <span>›</span>
                      <a href='../products-catalog.html'>المنتجات</a>
                      <span>›</span>
                      <span>\${product.title}</span>
                  </nav>
              </div>
              
              <script src='../assets/js/main.js'></script>
              <script src='../assets/js/cart.js'></script>
              <script>
                  // Hide loader when page loads
                  window.addEventListener('load', function() {
                      document.getElementById('loader').style.display = 'none';
                      document.getElementById('content').style.opacity = '1';
                  });
              </script>
          </body>
          </html>\`;
          };
          
          // Generate pages for all products
          productsData.forEach(product => {
              const htmlContent = generateProductPage(product);
              const fileName = \`products-pages/product-\${product.id}.html\`;
              fs.writeFileSync(fileName, htmlContent, 'utf8');
              console.log(\`Generated: \${fileName}\`);
          });
          
          console.log(\`Generated \${productsData.length} product pages successfully!\`);
          "
          
      - name: Commit generated pages
        run: |
          git config --local user.email "80130495+sherow1982@users.noreply.github.com"
          git config --local user.name "Sherif Salama"
          git add products-pages/
          git commit -m "Regenerate clean product pages" || echo "Nothing to commit"
          git push