name: 🚀 توليد صفحات المنتجات التلقائي

on:
  # تشغيل يدوي من واجهة GitHub
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 'إعادة توليد جميع الصفحات'
        required: false
        default: 'false'
        type: boolean
  
  # تشغيل عند تحديث ملفات البيانات
  push:
    paths:
      - 'products_data.json'
      - 'kuwaiti_reviews.json'
      - '.github/workflows/generate-products.yml'
    branches:
      - main
  
  # تشغيل يومي في الساعة 3 صباحاً (لتحديث الأسعار والعروض)
  schedule:
    - cron: '0 1 * * *'  # 3 AM Kuwait time (UTC+3)

# إضافة صلاحيات للكتابة
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-pages:
    name: 📄 توليد صفحات المنتجات
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 تحميل الكود
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 🐍 إعداد Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: 📊 فحص ملفات البيانات
      run: |
        echo "🔍 فحص وجود ملفات البيانات..."
        if [ ! -f "products_data.json" ]; then
          echo "❌ خطأ: ملف products_data.json غير موجود"
          exit 1
        fi
        
        if [ ! -f "kuwaiti_reviews.json" ]; then
          echo "❌ خطأ: ملف kuwaiti_reviews.json غير موجود"
          exit 1
        fi
        
        echo "✅ جميع ملفات البيانات موجودة"
        echo "📈 عدد المنتجات: $(jq length products_data.json)"
        echo "📝 عدد مجموعات المراجعات: $(jq 'keys | length' kuwaiti_reviews.json)"
    
    - name: 🚀 إنشاء مولد صفحات المنتجات
      run: |
        cat > auto_generate_products.py << 'EOF'
        #!/usr/bin/env python3
        # -*- coding: utf-8 -*-
        """
        🚀 مولد صفحات المنتجات التلقائي - GitHub Actions
        يقوم بإنشاء صفحات احترافية ومحسنة لـ SEO لجميع المنتجات
        """
        
        import json
        import os
        import re
        from datetime import datetime
        import threading
        from concurrent.futures import ThreadPoolExecutor
        import time
        
        class ProductPageGenerator:
            def __init__(self):
                self.categories = {
                    "ألعاب الأطفال": ["لعبة", "حصالة", "كرتوني", "أطفال", "تعليمية", "للأطفال", "طفل", "روبوت", "درون", "هليكوبتر", "طائرة"],
                    "أدوات المطبخ": ["صفاية", "مطبخ", "قهوة", "مكواة", "طبخ", "مفرمة", "مطحنة", "كنكة", "صانعة", "عصارة", "خلاط"],
                    "الملابس والأزياء": ["شورت", "نسائي", "ملابس", "حقيبة", "جسم", "أزياء", "فساتين", "قميص", "بنطلون"],
                    "الصحة والجمال": ["كريم", "سيروم", "شامبو", "صابون", "بشرة", "شعر", "تجميل", "عناية", "مرطب", "تبييض", "علاج"],
                    "الإلكترونيات": ["كهربائي", "شحن", "تلفزيون", "ساعة ذكية", "كاميرا", "بلوتوث", "يدوي", "قابل للشحن", "كشاف", "مصباح"],
                    "أدوات التنظيف": ["تنظيف", "مكنسة", "منظف", "صابون", "ليفة", "غسيل", "تطهير"],
                    "السيارات": ["سيارة", "مضخة", "حامل", "عجلة", "سيارات", "محول", "مطفأة"],
                    "المنزل والديكور": ["مصباح", "ستاند", "منظم", "إضاءة", "رف", "منزل", "ديكور", "أثاث", "طاولة", "كرسي"],
                    "الرياضة واللياقة": ["رياضة", "تمارين", "لياقة", "جهاز تمارين", "مساج", "عضلات", "ظهر"],
                    "العطور ومستحضرات التجميل": ["عطر", "عطور", "رائحة", "مسك", "بخاخ جسم", "مزيل عرق"]
                }
                self.stats = {
                    'total': 0,
                    'generated': 0,
                    'errors': 0,
                    'categories': {}
                }
        
            def load_json_file(self, filename):
                """تحميل ملف JSON"""
                try:
                    with open(filename, 'r', encoding='utf-8') as file:
                        return json.load(file)
                except FileNotFoundError:
                    print(f"❌ خطأ: لم يتم العثور على ملف {filename}")
                    return None
                except json.JSONDecodeError:
                    print(f"❌ خطأ: ملف {filename} غير صحيح")
                    return None
        
            def classify_product_category(self, title):
                """تصنيف المنتج حسب الاسم"""
                title_lower = title.lower()
                
                for category, keywords in self.categories.items():
                    if any(keyword in title_lower for keyword in keywords):
                        return category
                
                return "منتجات متنوعة"
        
            def create_seo_url(self, title):
                """إنشاء رابط محسن لمحركات البحث"""
                title_clean = re.sub(r'[^\u0600-\u06FF\s\w]', '', title)
                url_slug = re.sub(r'\s+', '-', title_clean.strip())
                url_slug = re.sub(r'-+', '-', url_slug)
                return url_slug.strip('-')
        
            def generate_ai_specifications(self, product):
                """توليد مواصفات ذكية للمنتج"""
                title = product['title'].lower()
                specs_html = ""
                
                general_specs = [
                    ("العلامة التجارية", "سوق الكويت"),
                    ("بلد الصنع", "الصين/تركيا"),
                    ("ضمان المنتج", "سنة واحدة"),
                    ("حالة المنتج", "جديد"),
                    ("الشحن", "مجاني لجميع أنحاء الكويت")
                ]
                
                if any(word in title for word in ["حصالة", "لعبة", "أطفال", "طفل", "روبوت"]):
                    specific_specs = [
                        ("الفئة العمرية", "3+ سنوات"),
                        ("المواد", "بلاستيك آمن للأطفال"),
                        ("البطارية", "3 بطاريات AA (غير مدرجة)"),
                        ("الأبعاد", "20 × 15 × 25 سم"),
                        ("الوزن", "500 جرام"),
                        ("شهادة الأمان", "CE معتمدة")
                    ]
                elif any(word in title for word in ["صفاية", "مطبخ", "قهوة", "مطحنة", "خلاط"]):
                    specific_specs = [
                        ("المواد", "ستانلس ستيل + بلاستيك"),
                        ("السعة", "5 لتر"),
                        ("قابلة للغسيل", "نعم - آمنة لغسالة الأطباق"),
                        ("الأبعاد", "25 × 25 × 20 سم"),
                        ("الوزن", "800 جرام"),
                        ("مقاومة الصدأ", "نعم")
                    ]
                elif any(word in title for word in ["شورت", "ملابس", "نسائي", "حقيبة"]):
                    specific_specs = [
                        ("المواد", "95% قطن، 5% إيلاستان"),
                        ("المقاسات المتوفرة", "S, M, L, XL, XXL"),
                        ("اللون", "أسود، رمادي، أزرق"),
                        ("طريقة الغسيل", "غسيل آلة 30 درجة"),
                        ("المرونة", "عالية - 4 اتجاهات"),
                        ("مقاومة التكور", "نعم")
                    ]
                elif any(word in title for word in ["كريم", "سيروم", "شامبو", "صابون"]):
                    specific_specs = [
                        ("المكونات الفعالة", "مكونات طبيعية آمنة"),
                        ("الحجم", "100 مل / 50 جم"),
                        ("مناسب لـ", "جميع أنواع البشرة"),
                        ("طريقة الاستخدام", "يومياً صباحاً ومساءً"),
                        ("تاريخ الإنتاج", "2024"),
                        ("تاريخ الانتهاء", "3 سنوات من تاريخ الإنتاج")
                    ]
                elif any(word in title for word in ["كهربائي", "شحن", "كشاف", "مصباح"]):
                    specific_specs = [
                        ("الطاقة", "قابل لإعادة الشحن"),
                        ("البطارية", "ليثيوم أيون 2000 مللي أمبير"),
                        ("مدة التشغيل", "8-12 ساعة"),
                        ("وقت الشحن", "2-3 ساعات"),
                        ("الإضاءة", "LED عالية الكفاءة"),
                        ("مقاوم للماء", "IP65")
                    ]
                else:
                    specific_specs = [
                        ("المواد", "عالية الجودة"),
                        ("الاستخدام", "سهل ومريح"),
                        ("المتانة", "طويلة الأمد"),
                        ("التصميم", "عصري وأنيق")
                    ]
                
                all_specs = general_specs + specific_specs
                
                for spec_name, spec_value in all_specs:
                    specs_html += f'<div class="spec-item"><span class="fw-bold">{spec_name}</span><span>{spec_value}</span></div>'
                
                return specs_html
        
            def generate_product_page(self, product, reviews):
                """توليد صفحة المنتج المحسنة لـ SEO"""
                
                category = self.classify_product_category(product['title'])
                seo_url = self.create_seo_url(product['title'])
                
                if reviews:
                    avg_rating = sum(review['rating'] for review in reviews) / len(reviews)
                    total_reviews = len(reviews)
                else:
                    avg_rating = 4.8
                    total_reviews = 15
                
                discount_percent = round(((product['price'] - product['sale_price']) / product['price']) * 100)
                
                keywords = [
                    product['title'],
                    category,
                    "سوق الكويت",
                    "منتجات الكويت",
                    "تسوق اون لاين الكويت",
                    "جودة عالية",
                    "شحن مجاني الكويت",
                    "أسعار مناسبة"
                ]
                
                specs = self.generate_ai_specifications(product)
                
                html_content = f"""<!DOCTYPE html>
