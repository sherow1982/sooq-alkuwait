            def process_single_product(self, product, reviews, output_dir):
                """معالجة منتج واحد"""
                try:
                    product_reviews = reviews.get(str(product['id']), [])
                    category = self.classify_product_category(product['title'])
                    seo_url = self.create_seo_url(product['title'])
                    filename = f"product-{product['id']}-{seo_url[:50]}.html"
                    filepath = os.path.join(output_dir, filename)
                    
                    page_content = self.generate_product_page(product, product_reviews)
                    
                    with open(filepath, 'w', encoding='utf-8') as file:
                        file.write(page_content)
                    
                    with threading.Lock():
                        self.stats['generated'] += 1
                        self.stats['categories'][category] = self.stats['categories'].get(category, 0) + 1
                    
                    return {
                        'success': True,
                        'product_id': product['id'],
                        'filename': filename,
                        'category': category,
                        'reviews_count': len(product_reviews)
                    }
                    
                except Exception as e:
                    with threading.Lock():
                        self.stats['errors'] += 1
                    return {
                        'success': False,
                        'product_id': product['id'],
                        'error': str(e)
                    }
        
            def print_progress_bar(self, current, total, length=50):
                """طباعة شريط التقدم"""
                percent = (current / total) * 100
                filled_length = int(length * current // total)
                bar = '█' * filled_length + '-' * (length - filled_length)
                print(f'\\r🚀 التقدم: |{bar}| {current}/{total} ({percent:.1f}%) منتج', end='', flush=True)
        
            def run(self):
                """تشغيل السكريبت الرئيسي"""
                start_time = time.time()
                
                print("🚀 مولد صفحات المنتجات التلقائي - GitHub Actions")
                print("=" * 80)
                print("⚡ يعمل بسرعة فائقة مع معالجة متوازية!")
                print("=" * 80)
                
                # تحميل البيانات
                print("📊 تحميل بيانات المنتجات...")
                products = self.load_json_file('products_data.json')
                if not products:
                    return
                
                print("📝 تحميل بيانات المراجعات...")
                reviews = self.load_json_file('kuwaiti_reviews.json')
                if not reviews:
                    reviews = {}
                
                # إعداد المجلد
                output_dir = 'products-pages'
                if not os.path.exists(output_dir):
                    os.makedirs(output_dir)
                    print(f"✅ تم إنشاء مجلد: {output_dir}")
                
                self.stats['total'] = len(products)
                print(f"📈 عدد المنتجات: {self.stats['total']}")
                print("🔥 بدء المعالجة المتوازية...")
                print("-" * 80)
                
                # معالجة متوازية للمنتجات
                results = []
                with ThreadPoolExecutor(max_workers=4) as executor:
                    futures = []
                    
                    for product in products:
                        future = executor.submit(self.process_single_product, product, reviews, output_dir)
                        futures.append(future)
                    
                    # جمع النتائج مع شريط التقدم
                    for i, future in enumerate(futures):
                        result = future.result()
                        results.append(result)
                        self.print_progress_bar(i + 1, len(futures))
                        
                        if result['success']:
                            print(f"\\n✅ {result['filename']} - {result['category']}")
                        else:
                            print(f"\\n❌ خطأ في المنتج {result['product_id']}: {result['error']}")
                
                # حساب الوقت المستغرق
                end_time = time.time()
                total_time = end_time - start_time
                
                # طباعة التقرير النهائي
                print("\\n" + "=" * 80)
                print("🎉 اكتمال العملية بنجاح!")
                print("=" * 80)
                print(f"⏱️  الوقت المستغرق: {total_time:.2f} ثانية")
                print(f"⚡ السرعة: {self.stats['generated'] / total_time:.1f} صفحة/ثانية")
                print(f"✅ تم إنتاج: {self.stats['generated']} صفحة")
                print(f"❌ أخطاء: {self.stats['errors']}")
                print(f"📁 مجلد الحفظ: {output_dir}/")
                
                if self.stats['categories']:
                    print("\\n📊 إحصائيات التصنيفات:")
                    for category, count in sorted(self.stats['categories'].items(), key=lambda x: x[1], reverse=True):
                        percentage = (count / self.stats['total']) * 100
