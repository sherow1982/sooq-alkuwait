        .discount-badge {{ background: linear-gradient(45deg, #dc3545, #c82333); color: white; padding: 8px 20px; border-radius: 30px; font-weight: bold; font-size: 1.1em; box-shadow: 0 3px 10px rgba(220, 53, 69, 0.4); }}
        .countdown-timer {{ background: linear-gradient(45deg, #ff6b6b, #ee5a52, #ff4757); color: white; padding: 20px; border-radius: 15px; margin: 15px 0; text-align: center; box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4); }}
