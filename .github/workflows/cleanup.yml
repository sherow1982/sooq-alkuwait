name: Repository Cleanup

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Clean up unnecessary files
        run: |
          # Remove debug and test files
          find . -name "debug-*.html" -type f -delete
          find . -name "test-*.html" -type f -delete
          
          # Remove temporary markdown files
          rm -f CART*.md
          rm -f CLEANUP*.md
          rm -f DEPLOYMENT*.md
          rm -f EXECUTION*.md
          rm -f GITHUB*.md
          rm -f README*.md
          rm -f RUN*.md
          rm -f TRIGGER*.md
          rm -f WORKFLOW*.md
          rm -f fix*.md
          
          # Remove script files that shouldn't be in production
          rm -f *.js
          rm -f *.py
          
          # Remove duplicate product feeds
          rm -f product-feed.xml
          rm -f products_feed.xml
          rm -f kuwaiti_reviews_updated.json
          
          echo "Files cleaned successfully"
          
      - name: Commit cleanup changes
        run: |
          git config --local user.email "80130495+sherow1982@users.noreply.github.com"
          git config --local user.name "Sherif Salama"
          git add -A
          git commit -m "Automated cleanup: Remove unnecessary files" || echo "Nothing to commit"
          git push