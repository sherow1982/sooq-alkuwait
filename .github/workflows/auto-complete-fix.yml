name: Auto Complete Fix

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'products_data.json'
      - '.github/workflows/auto-complete-fix.yml'

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean and generate everything
        run: |
          echo "🎉 بدء الإصلاح التلقائي الشامل..."
          
          # 1. حذف الملفات غير الضرورية
          rm -rf products-pages/* 2>/dev/null || true
          rm -f debug-*.html test-*.html universal_*.html 2>/dev/null || true
          rm -f *.md BULK_*.txt CART*.md CLEANUP*.md DEPLOYMENT*.md 2>/dev/null || true
          rm -f EXECUTION*.md GITHUB*.md RUN*.md TRIGGER*.md WORKFLOW*.md fix*.md 2>/dev/null || true
          rm -f *.js *.py 2>/dev/null || true
          find . -name "*.js" ! -path "./assets/*" ! -name "sw.js" -delete 2>/dev/null || true
          
          echo "✅ تم حذف الملفات غير الضرورية"
          
          # 2. إنشاء صفحات المنتجات
          mkdir -p products-pages
          
          node -e "
          const fs = require('fs');
          
          try {
            const products = JSON.parse(fs.readFileSync('products_data.json', 'utf8'));
            console.log('📊 تم تحميل', products.length, 'منتج');
            
            const createPage = (p) => \`<!DOCTYPE html>
        <html lang=\"ar\" dir=\"rtl\">
        <head>
            <meta charset=\"UTF-8\">
            <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
            <title>\${p.title} - سوق الكويت</title>
            <meta name=\"description\" content=\"\${p.description || p.title}\">
            <link rel=\"stylesheet\" href=\"../assets/css/kuwait-modern.css\">
            <style>
            body { font-family: 'Cairo', sans-serif; background: #f8f9fa; }
            .header { background: #00843d; color: white; padding: 15px 0; text-align: center; }
            .logo { color: white; text-decoration: none; font-size: 24px; font-weight: bold; }
            .container { max-width: 800px; margin: 0 auto; padding: 20px; }
            .product-page { background: white; border-radius: 15px; padding: 30px; margin: 20px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
            .product-image { width: 100%; max-width: 400px; border-radius: 10px; margin-bottom: 20px; }
            .product-title { font-size: 24px; font-weight: bold; color: #00843d; margin-bottom: 20px; }
            .price { font-size: 32px; font-weight: bold; color: #ce1126; margin: 20px 0; }
            .description { line-height: 1.6; margin: 20px 0; color: #333; }
            .whatsapp-btn { background: #25d366; color: white; padding: 15px 30px; border-radius: 25px; text-decoration: none; display: inline-block; font-weight: bold; margin: 10px 0; }
            .whatsapp-btn:hover { background: #128c7e; color: white; }
            .cart-btn { background: #ffcd00; color: #000; padding: 15px 30px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; margin: 10px; }
            .back-link { color: #00843d; text-decoration: none; font-weight: bold; margin: 20px 0; display: inline-block; }
            </style>
        </head>
        <body>
            <header class=\"header\">
                <div class=\"container\">
                    <a href=\"../index.html\" class=\"logo\">سوق الكويت</a>
                </div>
            </header>
            <div class=\"container\">
                <a href=\"../products-catalog.html\" class=\"back-link\">← عودة للكتالوج</a>
                <div class=\"product-page\">
                    <img src=\"\${p.image_link}\" alt=\"\${p.title}\" class=\"product-image\" onerror=\"this.src='https://via.placeholder.com/400x300/00843d/ffffff?text=منتج+سوق+الكويت'\">
                    <h1 class=\"product-title\">\${p.title}</h1>
                    <div class=\"price\">\${p.sale_price.toFixed(2)} د.ك</div>
                    <div class=\"description\">\${p.description || p.title + ' - منتج عالي الجودة متوفر في سوق الكويت'}</div>
                    <div>
                        <a href=\"https://wa.me/201110760081?text=أريد طلب: \${encodeURIComponent(p.title)} - السعر: \${p.sale_price.toFixed(2)} د.ك\" 
                           class=\"whatsapp-btn\" target=\"_blank\">💬 طلب عبر واتساب</a>
                        <button class=\"cart-btn\" onclick=\"addToCart(\${p.id})\">🛒 أضف للسلة</button>
                    </div>
                </div>
            </div>
            <script>
            function addToCart(id) {
                const cart = JSON.parse(localStorage.getItem('sooq-cart') || '[]');
                const existing = cart.find(item => item.id === id);
                if (existing) {
                    existing.quantity += 1;
                } else {
                    cart.push({id: id, title: '\${p.title.replace(/'/g, "\\'")\'}', price: \${p.sale_price}, quantity: 1});
                }
                localStorage.setItem('sooq-cart', JSON.stringify(cart));
                alert('✅ تم إضافة المنتج إلى السلة!');
                window.location.href = '../cart.html';
            }
            </script>
        </body>
        </html>\`;
            
            let success = 0;
            products.forEach(p => {
              try {
                const fileName = \`products-pages/product-\${p.id}.html\`;
                fs.writeFileSync(fileName, createPage(p), 'utf8');
                success++;
              } catch (err) {
                console.error('خطأ في المنتج', p.id, ':', err.message);
              }
            });
            
            console.log(\`✅ تم إنشاء \${success} صفحة منتج بنجاح\`);
            
          } catch (error) {
            console.error('❌ خطأ:', error.message);
            process.exit(1);
          }
          "
          
          echo "✅ انتهى من الإصلاح التلقائي!"

      - name: Commit all changes
        run: |
          git config --local user.email "80130495+sherow1982@users.noreply.github.com"
          git config --local user.name "Sherif Salama"
          git add -A
          git commit -m "🎉 Auto-complete: Full site fix and optimization" || echo "Nothing to commit"
          git push
          
          echo "🎉 تم الانتهاء بنجاح! الموقع جاهز للعمل"