name: Mass Fix Cart System

# تشغيل الإصلاح الشامل لنظام السلة في جميع صفحات المنتجات
on:
  workflow_dispatch:
    inputs:
      confirm_fix:
        description: 'تأكيد الإصلاح الشامل (yes لتطبيق الإصلاح)'
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'

  push:
    paths:
      - 'mass_fix_products_pages.py'
      - '.github/workflows/mass-fix-cart.yml'

jobs:
  mass-fix-cart:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.confirm_fix == 'yes'
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 🛠️ Configure Git
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"

    - name: 🔧 Run Mass Fix Script
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python mass_fix_products_pages.py
      continue-on-error: false

    - name: 📊 Display Results
      run: |
        echo "🎯 إصلاح شامل مكتمل!"
        echo "✅ تم تطبيق نظام السلة الجديد على جميع صفحات المنتجات"
        echo "🛍️ الموقع جاهز للعمل التجاري بكفاءة عالية"
        echo ""
        echo "🔗 روابط الاختبار:"
        echo "• السلة: https://sherow1982.github.io/sooq-alkuwait/cart.html"
        echo "• اختبار نهائي: https://sherow1982.github.io/sooq-alkuwait/test-final-cart.html"
        echo "• منتج تجريبي: https://sherow1982.github.io/sooq-alkuwait/products-pages/"

    - name: 🎉 Success Notification
      if: success()
      run: |
        echo "🌟🌟🌟🌟🌟🌟🌟🌟🌟🌟🌟🌟🌟🌟🌟"
        echo "🎊 المهمة اكتملت بنجاح تام! 🎊"
        echo "🛒 جميع أزرار السلة تعمل الآن!"
        echo "📱 الموقع جاهز للعملاء!"
        echo "🌟🌟🌟🌟🌟🌟🌟🌟🌟🌟🌟🌟🌟🌟🌟"
        
