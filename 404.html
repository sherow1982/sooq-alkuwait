<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- Google tag (gtag.js) - Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YQW5LL476X"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-YQW5LL476X');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>404 - الصفحة غير موجودة | سوق الكويت 🇰🇼</title>
    <meta name="description" content="عذراً، الصفحة المطلوبة غير موجودة. ارجع إلى الصفحة الرئيسية لمتابعة التسوق في سوق الكويت">
    <meta name="robots" content="noindex, nofollow">
    
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #f093fb;
            --dark: #1e293b;
            --light: #f8fafc;
            --error: #ef4444;
            --success: #10b981;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }
        
        /* خلفية متحركة */
        .background-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: 0;
        }
        
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 20s infinite ease-in-out;
        }
        
        .circle:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 10%;
            left: 20%;
            animation-delay: 0s;
        }
        
        .circle:nth-child(2) {
            width: 120px;
            height: 120px;
            top: 60%;
            left: 80%;
            animation-delay: 2s;
        }
        
        .circle:nth-child(3) {
            width: 100px;
            height: 100px;
            top: 80%;
            left: 10%;
            animation-delay: 4s;
        }
        
        .circle:nth-child(4) {
            width: 90px;
            height: 90px;
            top: 20%;
            left: 70%;
            animation-delay: 1s;
        }
        
        .circle:nth-child(5) {
            width: 110px;
            height: 110px;
            top: 50%;
            left: 50%;
            animation-delay: 3s;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.5;
            }
            50% {
                transform: translateY(-30px) rotate(180deg);
                opacity: 0.8;
            }
        }
        
        /* المحتوى الرئيسي */
        .error-container {
            position: relative;
            z-index: 1;
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.8s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* رقم 404 */
        .error-code {
            font-size: 120px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
            text-shadow: 0 0 30px rgba(102, 126, 234, 0.3);
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }
        
        /* الأيقونة */
        .error-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }
        
        .error-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 15px;
        }
        
        .error-message {
            font-size: 18px;
            color: #64748b;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        /* الأزرار */
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }
        
        .btn {
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: none;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transition: width 0.6s, height 0.6s, top 0.6s, left 0.6s;
            transform: translate(-50%, -50%);
        }
        
        .btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .btn > * {
            position: relative;
            z-index: 1;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }
        
        .btn-secondary {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        
        .btn-secondary:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
        }
        
        /* مؤقت العد التنازلي */
        .countdown {
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border-radius: 15px;
            border: 2px dashed var(--primary);
        }
        
        .countdown-text {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 10px;
        }
        
        .countdown-timer {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary);
            font-family: 'Courier New', monospace;
        }
        
        /* روابط سريعة */
        .quick-links {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #e2e8f0;
        }
        
        .quick-links-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 15px;
        }
        
        .quick-links-list {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .quick-link {
            padding: 8px 20px;
            background: #f1f5f9;
            color: var(--primary);
            text-decoration: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .quick-link:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .error-container {
                padding: 40px 25px;
            }
            
            .error-code {
                font-size: 80px;
            }
            
            .error-icon {
                font-size: 60px;
            }
            
            .error-title {
                font-size: 24px;
            }
            
            .error-message {
                font-size: 16px;
            }
            
            .btn {
                padding: 12px 25px;
                font-size: 14px;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .countdown-timer {
                font-size: 24px;
            }
            
            .quick-links-list {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- خلفية متحركة -->
    <div class="background-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <!-- المحتوى -->
    <div class="error-container">
        <div class="error-icon">🔍</div>
        <div class="error-code">404</div>
        <h1 class="error-title">عذراً! الصفحة غير موجودة</h1>
        <p class="error-message">
            يبدو أن الصفحة التي تبحث عنها قد تم نقلها أو حذفها.<br>
            لا تقلق، يمكنك العودة للصفحة الرئيسية أو تصفح منتجاتنا المميزة.
        </p>

        <!-- الأزرار -->
        <div class="button-group">
            <a href="/" class="btn btn-primary">
                <span>🏠</span>
                <span>العودة للرئيسية</span>
            </a>
            <a href="/products-catalog.html" class="btn btn-secondary">
                <span>🛍️</span>
                <span>تصفح المنتجات</span>
            </a>
        </div>

        <!-- مؤقت العد التنازلي -->
        <div class="countdown" id="countdown">
            <div class="countdown-text">سيتم توجيهك تلقائياً للصفحة الرئيسية خلال:</div>
            <div class="countdown-timer" id="timer">10</div>
        </div>

        <!-- روابط سريعة -->
        <div class="quick-links">
            <div class="quick-links-title">روابط سريعة مفيدة:</div>
            <div class="quick-links-list">
                <a href="/products-catalog.html" class="quick-link">كل المنتجات</a>
                <a href="/products-catalog.html?category=home" class="quick-link">المنزل</a>
                <a href="/products-catalog.html?category=electronics" class="quick-link">إلكترونيات</a>
                <a href="/products-catalog.html?category=fashion" class="quick-link">أزياء</a>
                <a href="https://wa.me/201110760081" class="quick-link" target="_blank">تواصل معنا</a>
            </div>
        </div>
    </div>

    <script>
        // مؤقت العد التنازلي
        let timeLeft = 10;
        const timerElement = document.getElementById('timer');
        const countdownElement = document.getElementById('countdown');
        
        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.textContent = timeLeft;
            
            // تغيير اللون عند اقتراب النهاية
            if (timeLeft <= 3) {
                timerElement.style.color = 'var(--error)';
                countdownElement.style.borderColor = 'var(--error)';
            }
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                window.location.href = '/';
            }
        }, 1000);
        
        // إيقاف المؤقت عند التفاعل
        document.querySelectorAll('.btn, .quick-link').forEach(element => {
            element.addEventListener('click', () => {
                clearInterval(countdown);
            });
        });
        
        // تتبع 404 في Google Analytics
        if (typeof gtag !== 'undefined') {
            gtag('event', 'page_view', {
                page_title: '404 Error',
                page_location: window.location.href,
                page_path: window.location.pathname
            });
            
            gtag('event', 'exception', {
                description: '404 Error - Page Not Found',
                fatal: false
            });
        }
    </script>
</body>
</html>
