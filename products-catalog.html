<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاتالوج المنتجات - سوق الكويت</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="site-components.css">
    <link rel="stylesheet" href="floating-cart.css">
    
    

<style>
/* إصلاح شامل للموبايل */
@media (max-width: 768px) {
    /* إصلاح الصور - أهم شيء */
    img, .product-image, .product-image img {
        max-width: 100% !important;
        max-height: 350px !important;
        width: auto !important;
        height: auto !important;
        object-fit: contain !important;
        margin: 0 auto !important;
        display: block !important;
    }
    
    /* إصلاح العناوين */
    h1, h2, h3 {
        font-size: 1.3rem !important;
        line-height: 1.5 !important;
        word-wrap: break-word !important;
        overflow-wrap: break-word !important;
        white-space: normal !important;
    }
    
    /* إصلاح بطاقات المنتجات - بطاقة واحدة في الصف */
    .product-card,
    .catalog-item,
    .grid-item,
    .col-6,
    .col-md-4,
    .col-md-6,
    .col-lg-3,
    .col-lg-4 {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 100% !important;
        flex: 0 0 100% !important;
        margin: 0 0 20px 0 !important;
    }
    
    /* إصلاح Grid */
    .products-grid,
    .catalog-grid,
    .row {
        display: flex !important;
        flex-direction: column !important;
        gap: 20px !important;
    }
    
    /* إصلاح الأزرار */
    .btn,
    button,
    .whatsapp-btn,
    a.button {
        width: 100% !important;
        max-width: 100% !important;
        font-size: 1.1rem !important;
        padding: 15px 20px !important;
        margin: 10px 0 !important;
    }
    
    /* إصلاح الأسعار */
    .price-section,
    .sale-price {
        font-size: 1.8rem !important;
    }
    
    /* إصلاح Container العام */
    .container,
    .product-container {
        padding: 15px !important;
        max-width: 100% !important;
    }
    
    /* إصلاح الوصف */
    .product-description {
        padding: 20px !important;
        font-size: 1rem !important;
        line-height: 1.7 !important;
    }
    
    /* إصلاح Header/Navbar */
    nav, header {
        padding: 10px !important;
    }
    
    .navbar-brand {
        font-size: 1.2rem !important;
    }
    
    /* إصلاح Footer */
    footer {
        padding: 20px 15px !important;
    }
    
    .footer-section {
        margin-bottom: 20px !important;
    }
    
    /* إزالة Overflow المزعج */
    body {
        overflow-x: hidden !important;
    }
    
    * {
        max-width: 100vw !important;
    }
}
</style>

</head>
<body>
    <div id="site-header"></div>
    
    <div class="container">
        <header>
            <h1>🛍️ كاتالوج المنتجات</h1>
            <p class="subtitle">تصفح أكثر من 1900 منتج بأفضل الأسعار - شحن مجاني</p>
        </header>
        
        <div class="categories-bar">
            <button class="category-btn active" onclick="filterByCategory('all'); setActiveBtn(this)">جميع المنتجات</button>
            <button class="category-btn" onclick="filterByCategory('العاب'); setActiveBtn(this)">ألعاب الأطفال</button>
            <button class="category-btn" onclick="filterByCategory('الكترونيات'); setActiveBtn(this)">إلكترونيات</button>
            <button class="category-btn" onclick="filterByCategory('ادوات'); setActiveBtn(this)">أدوات منزلية</button>
        </div>
        
        <div class="search-bar">
            <input type="text" id="search-input" class="search-input" placeholder="🔍 ابحث عن منتج..." autocomplete="off">
        </div>
        
        <div class="products-counter" id="products-counter">⏳ جاري التحميل...</div>
        <div id="products-container">⏳ جاري تحميل المنتجات...</div>
        
        <div class="load-more-section">
            <button id="load-more-btn" style="display: none;">تحميل المزيد</button>
        </div>
    </div>
    
    <button id="back-to-top" onclick="scrollToTop()">
        <i class="fas fa-arrow-up"></i>
    </button>
    
    <div id="site-footer"></div>
    
    <script src="site-header.js"></script>
    <script src="site-footer.js"></script>
    <script src="floating-cart.js"></script>
    <script src="catalog-products.js"></script>
    
    <script>
        window.addEventListener('scroll', function() {
            const backToTop = document.getElementById('back-to-top');
            if (window.pageYOffset > 300) {
                backToTop.classList.add('show');
            } else {
                backToTop.classList.remove('show');
            }
        });
        
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
