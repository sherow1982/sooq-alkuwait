<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق الكويت - الكتالوج الشامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
    :root { --ku-green: #00843d; --ku-red: #ce1126; --ku-gold: #ffcd00; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: #f8f9fa; }
    .header { background: linear-gradient(135deg, var(--ku-green), var(--ku-red)); color: white; padding: 15px 0; position: sticky; top: 0; z-index: 1000; }
    .nav { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    .logo { color: white; text-decoration: none; font-size: 28px; font-weight: 900; }
    .menu { display: flex; gap: 30px; }
    .menu a { color: white; text-decoration: none; font-weight: 600; padding: 8px 15px; border-radius: 20px; transition: all 0.3s; }
    .menu a:hover { background: rgba(255,255,255,0.2); }
    .cta { background: var(--ku-gold); color: #000; padding: 12px 25px; border-radius: 25px; text-decoration: none; font-weight: bold; }
    .hero { background: linear-gradient(135deg, var(--ku-green), var(--ku-red)); color: white; padding: 60px 0; text-align: center; }
    .hero h1 { font-size: 42px; font-weight: 900; margin-bottom: 20px; }
    .hero p { font-size: 18px; color: var(--ku-gold); }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin: 30px 0; }
    .stat { background: white; padding: 20px; border-radius: 15px; text-align: center; border: 2px solid var(--ku-gold); }
    .stat-number { font-size: 28px; font-weight: 900; color: var(--ku-green); }
    .products-section { padding: 40px 0; }
    .section-title { text-align: center; font-size: 32px; color: var(--ku-green); margin-bottom: 40px; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
    .product-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.1); transition: all 0.3s; cursor: pointer; position: relative; }
    .product-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.15); }
    .product-image { width: 100%; height: 220px; object-fit: cover; }
    .product-info { padding: 20px; }
    .product-title { font-weight: bold; margin-bottom: 12px; color: var(--ku-green); font-size: 16px; height: 45px; overflow: hidden; }
    .price-section { background: var(--ku-red); color: white; padding: 12px; border-radius: 10px; text-align: center; margin: 12px 0; }
    .current-price { font-size: 22px; font-weight: 900; }
    .actions { display: flex; flex-direction: column; gap: 8px; }
    .whatsapp-btn { background: #25d366; color: white; padding: 10px; border-radius: 8px; text-decoration: none; text-align: center; font-weight: bold; }
    .whatsapp-btn:hover { background: #128c7e; color: white; }
    .cart-btn { background: var(--ku-gold); color: #000; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .loading { text-align: center; padding: 80px; font-size: 20px; color: #666; background: white; border-radius: 15px; margin: 30px 0; }
    .error { text-align: center; padding: 50px; background: #fff5f5; border: 2px solid #fed7d7; border-radius: 15px; color: #c53030; margin: 30px 0; }
    .retry-btn { background: var(--ku-green); color: white; padding: 15px 30px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    .footer { background: #000; color: white; padding: 50px 0; text-align: center; margin-top: 60px; }
    .footer a { color: var(--ku-gold); text-decoration: none; margin: 0 15px; }
    @media (max-width: 768px) { .nav { flex-direction: column; gap: 15px; padding: 20px; } .hero h1 { font-size: 32px; } .products-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); } }
    </style>
</head>
<body>
    <header class="header">
        <div class="nav">
            <a class="logo" href="index.html">سوق الكويت</a>
            <nav class="menu">
                <a href="index.html">الرئيسية</a>
                <a href="products-catalog.html">المنتجات</a>
                <a href="cart.html">السلة</a>
            </nav>
            <a class="cta" href="tel:+201110760081">اطلب الآن</a>
        </div>
    </header>
    
    <section class="hero">
        <div class="container">
            <h1>الكتالوج الشامل</h1>
            <p>منتجات عالية الجودة بأفضل الأسعار</p>
            <div class="stats">
                <div class="stat"><div class="stat-number" id="total-products">1977</div><div>منتج</div></div>
                <div class="stat"><div class="stat-number">مجاني</div><div>التوصيل</div></div>
                <div class="stat"><div class="stat-number">24/7</div><div>خدمة عملاء</div></div>
            </div>
        </div>
    </section>
    
    <section class="products-section">
        <div class="container">
            <h2 class="section-title">جميع المنتجات</h2>
            <div id="products-container"><div class="loading">جاري تحميل المنتجات...</div></div>
        </div>
    </section>
    
    <footer class="footer">
        <div class="container">
            <p>سوق الكويت - تجربة تسوق حديثة</p>
            <div>
                <a href="https://wa.me/201110760081">واتساب</a>
                <a href="mailto:sooqalkuwait2010@gmail.com">إيميل</a>
                <a href="tel:+201110760081">هاتف</a>
            </div>
        </div>
    </footer>
    
    <script>
    let allProducts = [];
    
    async function loadProducts() {
        try {
            console.log('تحميل المنتجات...');
            const response = await fetch('https://raw.githubusercontent.com/sherow1982/sooq-alkuwait/main/products_data.json');
            const products = await response.json();
            allProducts = products;
            displayProducts(products);
            document.getElementById('total-products').textContent = products.length;
            console.log('تم تحميل', products.length, 'منتج');
        } catch (error) {
            console.error('خطأ:', error);
            document.getElementById('products-container').innerHTML = '<div class="error">خطأ في تحميل المنتجات<br><button class="retry-btn" onclick="loadProducts()">إعادة المحاولة</button></div>';
        }
    }
    
    function displayProducts(products) {
        const container = document.getElementById('products-container');
        const grid = document.createElement('div');
        grid.className = 'products-grid';
        
        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            
            const whatsappUrl = 'https://wa.me/201110760081?text=' + encodeURIComponent('مرحبا، أريد طلب: ' + product.title + ' - السعر: ' + product.sale_price.toFixed(2) + ' د.ك');
            
            card.innerHTML = 
                '<img src="' + product.image_link + '" alt="منتج" class="product-image" loading="lazy" onerror="this.src=\'https://via.placeholder.com/280x220/00843d/ffffff?text=منتج\'">' +
                '<div class="product-info">' +
                    '<h3 class="product-title">' + product.title + '</h3>' +
                    '<div class="price-section">' +
                        '<div class="current-price">' + product.sale_price.toFixed(2) + ' د.ك</div>' +
                    '</div>' +
                    '<div class="actions">' +
                        '<a href="' + whatsappUrl + '" class="whatsapp-btn" target="_blank" onclick="event.stopPropagation()">طلب عبر واتساب</a>' +
                        '<button class="cart-btn" onclick="event.stopPropagation(); addToCart(' + product.id + ', \'' + product.title.replace(/'/g, "\\\\\'")\ + '\', ' + product.sale_price + ')">أضف للسلة</button>' +
                    '</div>' +
                '</div>';
            
            // ربط بطاقة المنتج بصفحة المنتج
            card.addEventListener('click', function() {
                window.open('products-pages/product-' + product.id + '.html', '_blank');
            });
            
            grid.appendChild(card);
        });
        
        container.innerHTML = '';
        container.appendChild(grid);
    }
    
    function addToCart(id, title, price) {
        let cart = JSON.parse(localStorage.getItem('sooq-cart') || '[]');
        const existing = cart.find(item => item.id === id);
        
        if (existing) {
            existing.quantity += 1;
        } else {
            cart.push({id: id, title: title, price: price, quantity: 1});
        }
        
        localStorage.setItem('sooq-cart', JSON.stringify(cart));
        
        const notification = document.createElement('div');
        notification.style.cssText = 'position:fixed;top:20px;right:20px;background:#28a745;color:white;padding:15px 25px;border-radius:10px;z-index:9999;font-weight:bold';
        notification.textContent = 'تم إضافة ' + title + ' إلى السلة';
        document.body.appendChild(notification);
        
        setTimeout(function() {
            notification.remove();
        }, 2000);
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        loadProducts();
    });
    </script>
</body>
</html>
