<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ШіЩҲЩӮ Ш§Щ„ЩғЩҲЩҠШӘ рҹҮ°рҹҮј - Ш§Щ„ЩғШӘШ§Щ„ЩҲШ¬ Ш§Щ„ШҙШ§Щ…Щ„</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--ku-green:#00843d;--ku-red:#ce1126;--ku-gold:#ffcd00}
    body{font-family:'Cairo',sans-serif;background:#f8f9fa;margin:0}
    .container{max-width:1200px;margin:0 auto;padding:22px}
    .filters{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 16px}
    .chip{background:#fff;border:2px solid #e9ecef;color:#333;border-radius:25px;padding:8px 14px;cursor:pointer;font-weight:700;transition:all 0.2s}
    .chip:hover{border-color:var(--ku-green);background:#f8f9fa}
    .chip.active{border-color:var(--ku-green);background:#e9f7ef;color:#0b7550}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(284px,1fr));gap:24px;min-height:400px}
    .card{background:#fff;border-radius:16px;box-shadow:0 6px 18px rgba(0,0,0,.08);padding:16px;position:relative;border:2px solid transparent;transition:.2s;overflow:hidden}
    .card:hover{transform:translateY(-6px);border-color:var(--ku-gold)}
    .pseudo-cover{position:absolute;inset:0;z-index:2;cursor:pointer}
    img.productimg{width:100%;height:220px;object-fit:cover;border-radius:12px;border:1px solid #eee;background:#fafafa;display:block}
    .img-fallback{width:100%;height:220px;display:flex;align-items:center;justify-content:center;background:#e2e7ea;color:#888;border-radius:12px;font-size:18px;font-weight:bold;border:1px solid #eee;}
    .title{margin:10px 0 6px; color:var(--ku-green); font-weight:800; font-size:18px; height:46px;overflow:hidden}
    .price-box{margin-top:10px;text-align:center}
    .price-current{background:#fff2f2; color:#ce1126; font-weight:bold; border-radius:9px; padding:8px 14px; font-size:20px; display:inline-block}
    .price-orig{color:#999; font-size:14px; text-decoration:line-through; margin-left:9px}
    .discount-badge{background:var(--ku-gold);color:#333;padding:2px 12px;border-radius:15px;font-weight:800;margin-right:7px}
    .actions{display:flex;gap:8px;margin-top:12px;z-index:3;position:relative}
    .wa{background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;border:none;border-radius:9px;padding:10px 14px;text-decoration:none;font-weight:700;flex:1;text-align:center}
    .cart{background:var(--ku-gold);color:#222;border:none;border-radius:9px;padding:10px 14px;font-weight:800;cursor:pointer;flex:1}
    .loading{grid-column:1/-1;text-align:center;padding:50px;color:#666;font-size:18px}
    .error{grid-column:1/-1;text-align:center;padding:50px;color:#ce1126;font-size:18px}
    .no-products{grid-column:1/-1;text-align:center;padding:50px;color:#666;font-size:18px}
  </style>
</head>
<body>
  <div class="container">
    <h1 style="text-align:center;color:var(--ku-green);margin-bottom:20px;">рҹ“Ұ Ш§Щ„ЩғШӘШ§Щ„ЩҲШ¬ Ш§Щ„ШҙШ§Щ…Щ„</h1>

    <!-- ШҙШұЩҠШ· Ш§Щ„ШӘШөЩҒЩҠШ© ШЁШ§Щ„ЩҒШҰШ§ШӘ -->
    <div id="filters" class="filters">
      <button class="chip active" data-key="all">Ш§Щ„ЩғЩ„ (Ш¬Ш§ШұЩҠ Ш§Щ„ШӘШӯЩ…ЩҠЩ„...)</button>
    </div>

    <div id="grid" class="grid">
      <div class="loading">вҸі Ш¬Ш§ШұЩҠ ШӘШӯЩ…ЩҠЩ„ Ш§Щ„Щ…ЩҶШӘШ¬Ш§ШӘ...</div>
    </div>
  </div>
  
  <script>
    // Ш§ШіШӘШ®ШҜШ§Щ… GitHub API ШЁШҜЩ„Ш§ЩӢ Щ…ЩҶ raw links Щ„ШӯЩ„ Щ…ШҙЩғЩ„Ш© CORS
    const API_URL='https://api.github.com/repos/sherow1982/sooq-alkuwait/contents/products_data.json';
    const stripNum=t=>(t||'').replace(/^\s*\d+\s*[-вҖ“вҖ”]?\s*/, '');

    // ШӘШ№ШұЩҠЩҒ Ш§Щ„ЩҒШҰШ§ШӘ Ш§Щ„ШҜЩӮЩҠЩӮШ© Ш§Щ„Щ…ШӘЩҒЩӮ Ш№Щ„ЩҠЩҮШ§
    const CATS=[
      {key:'all',       name:'Ш§Щ„ЩғЩ„',                   test: t=>true},
      {key:'kids',      name:'Ш§Щ„ШЈШ·ЩҒШ§Щ„ ЩҲШ§Щ„ШЈЩ„Ш№Ш§ШЁ',       test: t=>/(ШЈШ·ЩҒШ§Щ„|Ш·ЩҒЩ„|Щ„Ш№ШЁШ©|ШӯШөШ§Щ„Ш©|ШұЩҲШЁЩҲШӘ|ЩҒЩӮШ§Ш№Ш§ШӘ|ЩғШұШӘЩҲЩҶЩҠ|ШӘШ№Щ„ЩҠЩ…ЩҠШ©|ШЁШ§ЩҶШҜШ§|ЩҮЩ„ЩҠЩғЩҲШЁШӘШұ|Ш·Ш§ШҰШұШ©|ЩӮШ·Ш§Шұ|ШіШЁШ§ЩӮ|Щ…ШіШҜШі ЩҒЩӮШ§Ш№Ш§ШӘ)/i.test(t)},
      {key:'kitchen',   name:'Ш§Щ„Щ…Ш·ШЁШ® ЩҲШЈШҜЩҲШ§ШӘ Ш§Щ„Ш·Ш№Ш§Щ…',  test: t=>/(Щ…Ш·ШЁШ®|ЩӮЩҮЩҲШ©|ШөЩҒШ§ЩҠШ©|ШіЩ„Ш·Ш©|Ш®Щ„Ш§Ш·|Ш№ШөШ§ШұШ©|Щ…ЩҒШұЩ…Ш©|Ш·ШЁШ®|Щ…ЩӮЩ„Ш§Ш©|ЩҒШұЩҶ|Щ…Ш·ШӯЩҶШ©|Ш·Ш§ЩҲЩ„Ш©|ШЈШҜЩҲШ§ШӘ Ш§Щ„Щ…Ш§ШҰШҜШ©|ШәЩ„Ш§ЩҠШ©|ЩғЩҶЩғШ©|ШҙЩҲШ§ЩҠШ©)/i.test(t)},
      {key:'fashion',   name:'Ш§Щ„Щ…Щ„Ш§ШЁШі ЩҲШ§Щ„ШҘЩғШіШіЩҲШ§ШұШ§ШӘ',  test: t=>/(ШҙЩҲШұШӘ|ШӯЩӮЩҠШЁШ©|ШӯЩӮЩҠШЁЩҮ|Щ…Щ„Ш§ШЁШі|ЩӮЩ…ЩҠШө|ЩҒШіШӘШ§ЩҶ|ШӯШ°Ш§ШЎ|ЩҶШёШ§ШұШ©|ШіШ§Ш№Ш©|Щ…ЩҲШ¶Ш©|Ш§ЩғШіШіЩҲШ§Шұ|Ш·ЩӮЩ…|ШёЩҮШұ)/i.test(t)},
      {key:'auto',      name:'Ш§Щ„ШіЩҠШ§ШұШ§ШӘ ЩҲШ§Щ„Щ…Щ„ШӯЩӮШ§ШӘ',    test: t=>/(ШіЩҠШ§ШұШ©|ШіЩҠШ§ШұШ§ШӘ|Щ…ШӯЩҲЩ„|ЩғШ§Щ…ЩҠШұШ§|ШӯШ§Щ…Щ„|Щ…Ш·ЩҒШЈШ©|ЩҒЩҲЩ„ШӘ|ЩҲЩ„Ш§Ш№Ш©|Щ…ШұШўШ©|ШҙШ§ШӯЩҶ Щ„Щ„ШіЩҠШ§ШұШ©|Щ…ШұЩҲШӯШ© ШіЩҠШ§ШұШ©|ШәШ·Ш§ШЎ ШіЩҠШ§ШұШ©)/i.test(t)},
      {key:'beauty',    name:'Ш§Щ„Ш№ЩҶШ§ЩҠШ© ЩҲШ§Щ„ШӘШ¬Щ…ЩҠЩ„',      test: t=>/(ШҙШ§Щ…ШЁЩҲ|ШіЩҠШұЩҲЩ…|ЩғШұЩҠЩ…|Ш№Ш·Шұ|ШӯЩ„Ш§ЩӮШ©|ШӘШ¬Щ…ЩҠЩ„|ШЁШҙШұШ©|ШҙШ№Шұ|Ш№ЩҶШ§ЩҠШ©|Щ…ЩғЩҠШ§Ш¬|Щ…Ш§ШіЩғ|ШөШ§ШЁЩҲЩҶ|Щ„ЩҲШҙЩҶ|ШІЩҠШӘ|ШЁЩҲШҜШұШ©|ШәШіЩҲЩ„)/i.test(t)},
      {key:'home',      name:'Ш§Щ„Щ…ЩҶШІЩ„ ЩҲШ§Щ„ШӘЩҶШёЩҠЩҒ',       test: t=>/(Щ…ЩҶШІЩ„|ШӯШҜЩҠЩӮШ©|ШӘЩҶШёЩҠЩҒ|ШәШіЩҠЩ„|Щ…ЩғЩҶШіШ©|ШЈШ«Ш§Ш«|ШҜЩҠЩғЩҲШұ|ШҘШ¶Ш§ШЎШ©|Щ…ШұШӘШЁШ©|Щ…ЩҒШұШҙ|ШіШӘШ§ШұШ©|Щ…ЩҶШёЩҒ|ШұЩҒ|Ш·Ш§ЩҲЩ„Ш©|ЩғШұШіЩҠ|Щ…ШөШЁШ§Шӯ|Щ…ШұЩҲШӯШ©)/i.test(t)},
      {key:'electronics',name:'Ш§Щ„ШҘЩ„ЩғШӘШұЩҲЩҶЩҠШ§ШӘ',         test: t=>/(ЩҮШ§ШӘЩҒ|ШҙШ§ШӯЩҶ|ШЁШ·Ш§ШұЩҠШ©|ЩғШ§ШЁЩ„|ШіЩ…Ш§Ш№Ш©|ШҙШ§ШҙШ©|ШҘЩ„ЩғШӘШұЩҲЩҶЩҠ|USB|Type-C|ШӘЩ„ЩҒШІЩҠЩҲЩҶ|ШіШ§Ш№Ш© Ш°ЩғЩҠШ©|Щ…Ш«ЩӮШ§ШЁ|Щ…ЩҶЩҒШ§Ш®)/i.test(t)},
      {key:'sport',     name:'Ш§Щ„ШұЩҠШ§Ш¶Ш© ЩҲШ§Щ„Щ„ЩҠШ§ЩӮШ©',      test: t=>/(ШұЩҠШ§Ш¶Ш©|Щ„ЩҠШ§ЩӮШ©|Ш¬ШұЩҠ|ШӘЩ…Ш§ШұЩҠЩҶ|ЩғШұШ©|ШҜШұШ§Ш¬Ш©|ЩҲШІЩҶ|ШҙШҜ|ЩҠЩҲШәШ§|Ш·ЩӮЩ… ШұЩҠШ§Ш¶ЩҠ)/i.test(t)},
      {key:'other',     name:'Щ…ЩҶШӘШ¬Ш§ШӘ Щ…ШӘЩҶЩҲШ№Ш©',         test: t=>true}
    ];

    let ALL=[];
    let ACTIVE='all';

    function buildFilters(){
      const f=document.getElementById('filters');
      const btn=(key,name,count)=>`<button class="chip ${key===ACTIVE?'active':''}" data-key="${key}">${name} (${count})</button>`;
      
      // ШӯШіШ§ШЁ Ш§Щ„ШЈШ№ШҜШ§ШҜ Щ„ЩғЩ„ ЩҒШҰШ©
      const counts={};
      for(const c of CATS){ counts[c.key]=0; }
      
      for(const p of ALL){
        const t=p.title;
        let matched = false;
        for(const cat of CATS.slice(1, -1)){ // ШӘШ¬Ш§ЩҮЩ„ 'all' ЩҲ 'other'
          if(cat.test(t)){
            counts[cat.key]++;
            matched = true;
            break;
          }
        }
        if(!matched) counts['other']++;
        counts['all']++;
      }
      
      f.innerHTML = CATS.filter(c => counts[c.key] > 0).map(c=>btn(c.key,c.name,counts[c.key]||0)).join('');
      
      f.querySelectorAll('.chip').forEach(b=>{
        b.addEventListener('click',(e)=>{ 
          e.preventDefault();
          setActive(b.dataset.key); 
        });
      });
    }

    function setActive(key){
      ACTIVE=key;
      document.querySelectorAll('.chip').forEach(b=>b.classList.toggle('active', b.dataset.key===key));
      render();
    }

    function addToCart(item){
      try{
        const cart=JSON.parse(localStorage.getItem('sooq-cart')||'[]');
        const i=cart.findIndex(x=>x.id===item.id);
        if(i>-1)cart[i].quantity+=1;else cart.push({...item,quantity:1});
        localStorage.setItem('sooq-cart',JSON.stringify(cart));
        
        const n=document.createElement('div');
        n.style.cssText='position:fixed;top:20px;right:20px;background:#00843d;color:#fff;padding:12px 18px;border-radius:10px;font-weight:700;z-index:9999;box-shadow:0 6px 18px rgba(0,0,0,.2);max-width:300px';
        n.textContent='вң… ШӘЩ… ШҘШ¶Ш§ЩҒШ© '+item.title+' ШҘЩ„Щү Ш§Щ„ШіЩ„Ш©';
        document.body.appendChild(n);
        setTimeout(()=>n.remove(),3000);
      }catch(e){
        console.error('Error adding to cart:', e);
      }
    }

    function render(){
      const grid=document.getElementById('grid');
      let list;
      
      if(ACTIVE==='all'){
        list = ALL;
      } else if(ACTIVE==='other'){
        list = ALL.filter(p=>{
          const t=p.title;
          return !CATS.slice(1, -1).some(c=>c.test(t));
        });
      } else {
        const category = CATS.find(c=>c.key===ACTIVE);
        list = category ? ALL.filter(p=>category.test(p.title)) : [];
      }

      if(list.length === 0){
        grid.innerHTML='<div class="no-products">Щ„Ш§ ШӘЩҲШ¬ШҜ Щ…ЩҶШӘШ¬Ш§ШӘ ЩҒЩҠ ЩҮШ°ЩҮ Ш§Щ„ЩҒШҰШ©</div>';
        return;
      }

      grid.innerHTML='';
      list.forEach(p=>{
        const title=stripNum(p.title);
        const img=(p.image_link||'').trim();
        const hasDiscount=Number(p.price)>Number(p.sale_price);
        const wa='https://wa.me/201110760081?text='+encodeURIComponent('Щ…ШұШӯШЁШ§ЩӢШҢ ШЈШұЩҠШҜ Ш·Щ„ШЁ: '+title+' - Ш§Щ„ШіШ№Шұ: '+Number(p.sale_price).toFixed(2)+' ШҜ.Щғ');
        let discount='';
        if(hasDiscount){
          const d=Math.round((Number(p.price)-Number(p.sale_price))/Number(p.price)*100);
          if(d>0) discount=`<span class="discount-badge">Ш®ШөЩ… ${d}%</span>`;
        }
        
        // ШҘЩҶШҙШ§ШЎ ШұШ§ШЁШ· ШөЩҒШӯШ© Ш§Щ„Щ…ЩҶШӘШ¬
        const productPageUrl = `products-pages/${title.replace(/[^a-zA-Z0-9\u0600-\u06FF\s-]/g, '').replace(/\s+/g, '-').toLowerCase()}-${p.id}.html`;
        
        grid.innerHTML+=`
        <article itemscope itemtype='http://schema.org/Product' class='card'>
          <a href="${productPageUrl}" target="_blank" rel="noopener" class="pseudo-cover" title="ШӘЩҒШ§ШөЩҠЩ„ ${title}" aria-label="ШӘЩҒШ§ШөЩҠЩ„ ${title}"></a>
          <img class="productimg" itemprop="image" src="${img}"
            alt="${title}" title="${title}"
            loading="lazy"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
          <div class="img-fallback" style="display:none">ШөЩҲШұШ© Ш§Щ„Щ…ЩҶШӘШ¬ ШәЩҠШұ Щ…ШӘЩҲЩҒШұШ©</div>
          <h2 class="title" itemprop="name">${title}</h2>
          <div class="price-box">
            ${hasDiscount?`<span class='price-orig'>${Number(p.price).toFixed(2)} ШҜ.Щғ</span>`:''}
            <span class="price-current" itemprop="price">${Number(p.sale_price).toFixed(2)} ШҜ.Щғ</span>
            ${discount}
          </div>
          <div class="actions">
            <a class="wa" href="${wa}" target="_blank" rel="noopener" onclick="event.stopPropagation()">ЩҲШ§ШӘШіШ§ШЁ</a>
            <button class="cart" onclick='event.stopPropagation();addToCart({id:${p.id},title:"${title.replace(/"/g,"&quot;")}",price:Number(${p.sale_price}),image:"${img}"})'>ШЈШ¶ЩҒ Щ„Щ„ШіЩ„Ш©</button>
          </div>
        </article>`;
      });
    }

    async function load(){
      try{
        console.log('Fetching products from GitHub API...');
        
        // Ш§ШіШӘШ®ШҜШ§Щ… GitHub API ШЁШҜЩ„Ш§ЩӢ Щ…ЩҶ raw link
        const response = await fetch(API_URL, {
          method: 'GET',
          headers: {
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
          }
        });
        
        if(!response.ok){
          throw new Error(`GitHub API Error ${response.status}: ${response.statusText}`);
        }
        
        const apiResponse = await response.json();
        
        // ЩҒЩғ ШӘШҙЩҒЩҠШұ Ш§Щ„ШЁЩҠШ§ЩҶШ§ШӘ Щ…ЩҶ base64
        const jsonContent = atob(apiResponse.content);
        const data = JSON.parse(jsonContent);
        
        console.log('Products loaded successfully:', data.length);
        
        if(!Array.isArray(data) || data.length === 0){
          throw new Error('Ш§Щ„ШЁЩҠШ§ЩҶШ§ШӘ ЩҒШ§ШұШәШ© ШЈЩҲ ШәЩҠШұ ШөШӯЩҠШӯШ©');
        }
        
        ALL = data;
        buildFilters();
        render();
        
      }catch(e){
        console.error('Error loading products:', e);
        document.getElementById('grid').innerHTML=`
          <div class="error">
            вқҢ Ш®Ш·ШЈ ЩҒЩҠ ШӘШӯЩ…ЩҠЩ„ Ш§Щ„Щ…ЩҶШӘШ¬Ш§ШӘ<br>
            <small>${e.message}</small><br>
            <button onclick="location.reload()" style="margin-top:10px;padding:8px 16px;background:var(--ku-green);color:white;border:none;border-radius:5px;cursor:pointer">
              ШҘШ№Ш§ШҜШ© Ш§Щ„Щ…ШӯШ§ЩҲЩ„Ш©
            </button>
          </div>`;
      }
    }

    // ШЁШҜШЎ Ш§Щ„ШӘШӯЩ…ЩҠЩ„ Ш№ЩҶШҜ Ш¬Ш§ЩҮШІЩҠШ© Ш§Щ„ШөЩҒШӯШ©
    if(document.readyState === 'loading'){
      document.addEventListener('DOMContentLoaded', load);
    } else {
      load();
    }
  </script>
</body>
</html>
