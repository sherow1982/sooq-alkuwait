            <p class="hero-subtitle">اكتشف أكثر من 1977 منتج أصلي بأفضل الأسعار في الكويت</p>
            <div class="hero-stats">
                <div class="stat-item">
                    <span class="stat-number" id="total-products">1977</span>
                    <span class="stat-label">منتج متنوع</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number">11</span>
                    <span class="stat-label">فئة مختلفة</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number">⭐ 4.9</span>
                    <span class="stat-label">تقييم العملاء</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number">شحن مجاني</span>
                    <span class="stat-label">لجميع الكويت</span>
                </div>
            </div>
        </div>
    </section>
    
    <!-- Main Container -->
    <div class="container">
        
        <!-- Filter Bar -->
        <div class="filter-bar">
            <!-- Search -->
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input 
                    type="search" 
                    class="search-input" 
                    id="search-input" 
                    placeholder="ابحث عن منتج..."
                    autocomplete="off"
                    aria-label="بحث عن منتج"
                >
            </div>
            
            <!-- Categories -->
            <div class="categories-grid" id="categories"></div>
        </div>
        
        <!-- Toolbar -->
        <div class="toolbar">
            <div class="results-count">
                عرض <span id="showing-count">0</span> من <span id="total-count">0</span> منتج
            </div>
            
            <div style="display: flex; gap: 1rem; align-items: center;">
                <div class="view-options">
                    <button class="view-btn active" onclick="setGridView()" title="عرض شبكي">
                        <i class="fas fa-th"></i>
                    </button>
                    <button class="view-btn" onclick="setListView()" title="عرض قائمة">
                        <i class="fas fa-list"></i>
                    </button>
                </div>
                
                <select class="sort-select" id="sort-select" onchange="sortProducts()">
                    <option value="default">الترتيب الافتراضي</option>
                    <option value="price-low">السعر: من الأقل للأعلى</option>
                    <option value="price-high">السعر: من الأعلى للأقل</option>
                    <option value="name-asc">الاسم: أ - ي</option>
                    <option value="name-desc">الاسم: ي - أ</option>
                </select>
            </div>
        </div>
        
        <!-- Products Grid -->
        <div class="products-grid" id="products-container">
            <!-- Loading State -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>جاري تحميل المنتجات...</p>
            </div>
        </div>
        
        <!-- Pagination -->
        <div class="pagination" id="pagination" style="display: none;"></div>
        
    </div>
    
    <!-- Back to Top Button -->
    <button class="back-to-top" id="back-to-top" onclick="scrollToTop()">
        <i class="fas fa-arrow-up"></i>
    </button>
    
    <script>
        // سأضيف الـ JavaScript في الملف التالي
    </script>
</body>
