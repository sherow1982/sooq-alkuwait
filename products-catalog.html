<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق الكويت 🇰🇼 - الكتالوج الشامل | 1977 منتج بأفضل الأسعار</title>
    <meta name="description" content="كتالوج شامل يضم 1977 منتج حقيقي بأفضل الأسعار في الكويت مع التوصيل المجاني خلال 24-48 ساعة. جودة عالية وضمان شامل.">
    <meta name="keywords" content="سوق الكويت, كتالوج المنتجات, توصيل مجاني, أفضل الأسعار, الكويت, تسوق إلكتروني">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="سوق الكويت - الكتالوج الشامل">
    <meta property="og:description" content="1977 منتج بأفضل الأسعار">
    <meta property="og:image" content="https://ecomerg.com/uploads/products_images/3711/VGYHOWKJV1B2EQDm1AbQxrUkvYMQQdpzpbSxaIdC.jpg">
    
    <link rel="stylesheet" href="assets/css/kuwait-modern.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
    /* ... نفس الستايلات الحالية بدون تغيير ... */
    </style>
</head>
<body>
    <!-- ... نفس الهيكل مع tabs ... -->

    <script>
        // تحميل كامل المنتجات من JSON (1977)
        const PRODUCTS_URL = './products_data.json';
        let allProducts = [];
        let cart = JSON.parse(localStorage.getItem('sooq-cart')) || [];

        function updateCartCount(){
            const el = document.getElementById('cart-count');
            if (el) el.textContent = cart.reduce((sum, i)=> sum + (i.quantity||1), 0);
        }

        function createProductSlug(title){
            return title.replace(/[\s\u00A0]+/g, '-').replace(/[^\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFFa-zA-Z0-9\-]/g,'').replace(/-+/g,'-').replace(/^-|-$/g,'');
        }

        // تصنيف محسن ومتسق مع صفحات الفئات
        function categorizeProduct(title, description){
            const text = (title + ' ' + (description||'')).toLowerCase();
            const map = {
                'الأطفال': ['طفل','أطفال','لعب','لعبة','حصالة','روبوت','تعليمية','ترفيهية','كرتوني','فقاعات','مسدس'],
                'المطبخ': ['مطبخ','صانعة','قهوة','صفاية','طعام','خلاط','ميزان','مقطعة','عصارة','سكاكين','طبخ','غلاية','فراير','طاحونة','كسارة'],
                'الملابس': ['شورت','ملابس','حقيبة','نسائي','رجالي','سروال','قبعة','حقائب','ظهر','يد','سفر','جلدية','مقاومة للماء'],
                'السيارات': ['سيارة','السيارة','محول','كهرباء','220 فولت','12 فولت','حامل هاتف','مغناطيسي','مرآة','زجاج','بطارية السيارة','شاحن بطارية','مسّاحة','منظف زجاج'],
                'العناية': ['شامبو','سيروم','كريم','عناية','شعر','بشرة','تجميل','جمال','عطر','مشط','ماكينة حلاقة','أظافر','لحية','تنعيم','تفتيح']
            };
            for (const [cat, keys] of Object.entries(map)){
                if (keys.some(k => text.includes(k.toLowerCase()))) return cat;
            }
            return 'الكل';
        }

        async function loadProducts(){
            try{
                const res = await fetch(PRODUCTS_URL);
                const data = await res.json();
                allProducts = data;
                document.getElementById('total-products').textContent = allProducts.length;
                render(allProducts);
                setupSearchAndFilter();
            }catch(e){
                console.error('فشل تحميل المنتجات', e);
            }
        }

        function productCard(product){
            const slug = createProductSlug(product.title);
            const page = `products-pages/product-${product.id}-${slug}.html`;
            const discount = Math.max(0, Math.round(((product.price - product.sale_price)/product.price)*100));
            const category = categorizeProduct(product.title, product.description);
            return `
                <div class="product-card" onclick="window.open('${page}','_blank')">
                    <img src="${product.image_link}" alt="${product.title}" class="product-image" loading="lazy" onerror="this.src='https://via.placeholder.com/300x220/2d5230/ffffff?text=منتج'">
                    <div class="product-info">
                        <h3 class="product-title">${product.title}</h3>
                        <div class="price-section">
                            <div class="original-price">${product.price} د.ك</div>
                            <div class="current-price">${product.sale_price} د.ك</div>
                            <div style="background:var(--ku-gold);color:var(--ku-black);padding:4px 8px;border-radius:8px;margin-top:6px;font-size:12px;font-weight:bold;">خصم ${discount}%</div>
                        </div>
                        <div class="product-meta">📂 الفئة: ${category}<br>🏷️ رقم المنتج: SOOQ-${String(product.id).padStart(4,'0')}</div>
                        <div class="product-buttons">
                            <a href="https://wa.me/201110760081?text=${encodeURIComponent('مرحباً، أريد طلب: ' + product.title + ' - السعر: ' + product.sale_price + ' د.ك - رقم: SOOQ-' + String(product.id).padStart(4,'0'))}" class="whatsapp-order-btn" target="_blank" onclick="event.stopPropagation()">💬 طلب عبر واتساب</a>
                            <a href="${page}" class="view-btn" target="_blank" onclick="event.stopPropagation()">👁️ عرض تفاصيل المنتج</a>
                            <a href="cart.html?added=${product.id}" class="cart-btn" onclick="event.stopPropagation()">🛒 أضف إلى السلة</a>
                        </div>
                    </div>
                </div>`;
        }

        function render(list){
            const container = document.getElementById('products-container');
            container.innerHTML = list.map(productCard).join('');
            const countEl = document.getElementById('products-count');
            if (countEl) countEl.textContent = list.length.toLocaleString('ar');
        }

        function setupSearchAndFilter(){
            const searchInput = document.getElementById('search-input');
            const tabs = document.querySelectorAll('.filter-tab');
            let currentCategory = 'الكل';

            const run = () => {
                const q = (searchInput?.value || '').toLowerCase();
                let list = [...allProducts];
                if (currentCategory !== 'الكل'){
                    list = list.filter(p => categorizeProduct(p.title, p.description) === currentCategory);
                }
                if (q){
                    list = list.filter(p => p.title.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q));
                }
                render(list);
            };

            searchInput?.addEventListener('input', run);
            tabs.forEach(tab => tab.addEventListener('click', function(){
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.category;
                run();
            }));
        }

        document.addEventListener('DOMContentLoaded', function(){
            updateCartCount();
            loadProducts();
        });
    </script>
</body>
</html>
