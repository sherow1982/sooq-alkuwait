<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاتالوج المنتجات - سوق الكويت</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="site-components.css">
    <link rel="stylesheet" href="floating-cart.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 20px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        header { text-align: center; margin-bottom: 40px; }
        h1 { color: #667eea; font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { color: #666; font-size: 1.1em; }
        
        .categories-bar { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 20px 0; padding: 20px; background: #f8f9fa; border-radius: 15px; }
        .category-btn { padding: 10px 20px; background: white; border: 2px solid #667eea; border-radius: 25px; color: #667eea; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .category-btn:hover, .category-btn.active { background: #667eea; color: white; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3); }
        
        .search-bar { margin: 30px 0; text-align: center; }
        .search-input { width: 100%; max-width: 600px; padding: 15px 20px; font-size: 1.1em; border: 2px solid #667eea; border-radius: 50px; outline: none; transition: all 0.3s; }
        
        .products-counter { text-align: center; color: #667eea; font-size: 1.2em; margin: 20px 0; font-weight: 700; }
        
        #products-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; }
        .product-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: all 0.3s; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(102, 126, 234, 0.3); }
        
        .load-more-section { text-align: center; margin: 40px 0; }
        #load-more-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 15px 40px; font-size: 1.1em; font-weight: bold; border-radius: 50px; cursor: pointer; transition: all 0.3s; box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3); }
        #load-more-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(102, 126, 234, 0.5); }
        
        #back-to-top { position: fixed; bottom: 30px; left: 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 1.5em; cursor: pointer; box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); transition: all 0.3s; z-index: 999; display: none; align-items: center; justify-content: center; }
        #back-to-top.show { display: flex; }
        
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 20px; }
            h1 { font-size: 1.8em; }
            #products-container { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
            .product-actions { flex-direction: column; }
        }
        
        @media (max-width: 480px) {
            #products-container { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }
    </style>
</head>
<body>
    <div id="site-header"></div>
    
    <div class="container">
        <header>
            <h1>🛍️ كاتالوج المنتجات</h1>
            <p class="subtitle">تصفح أكثر من 1900 منتج بأفضل الأسعار - شحن مجاني</p>
        </header>
        
        <div class="categories-bar">
            <button class="category-btn active" onclick="filterByCategory('all'); setActiveBtn(this)">جميع المنتجات</button>
            <button class="category-btn" onclick="filterByCategory('العاب'); setActiveBtn(this)">ألعاب الأطفال</button>
            <button class="category-btn" onclick="filterByCategory('الكترونيات'); setActiveBtn(this)">إلكترونيات</button>
            <button class="category-btn" onclick="filterByCategory('ادوات'); setActiveBtn(this)">أدوات منزلية</button>
        </div>
        
        <div class="search-bar">
            <input type="text" id="search-input" class="search-input" placeholder="🔍 ابحث عن منتج..." autocomplete="off">
        </div>
        
        <div class="products-counter" id="products-counter">⏳ جاري التحميل...</div>
        <div id="products-container">⏳ جاري تحميل المنتجات...</div>
        
        <div class="load-more-section">
            <button id="load-more-btn" style="display: none;">تحميل المزيد</button>
        </div>
    </div>
    
    <button id="back-to-top" onclick="scrollToTop()">
        <i class="fas fa-arrow-up"></i>
    </button>
    
    <div id="site-footer"></div>
    
    <script src="site-header.js"></script>
    <script src="site-footer.js"></script>
    <script src="floating-cart.js"></script>
    <script src="catalog-products.js"></script>
    
    <script>
        window.addEventListener('scroll', function() {
            const backToTop = document.getElementById('back-to-top');
            if (window.pageYOffset > 300) {
                backToTop.classList.add('show');
            } else {
                backToTop.classList.remove('show');
            }
        });
        
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
