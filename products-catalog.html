    <style>
        :root {
            /* ألوان علم الكويت */
            --kuwait-green: #007A3D;
            --kuwait-red: #CE1126;
            --kuwait-black: #000000;
            --kuwait-white: #FFFFFF;
            
            /* تدرجات مشتقة */
            --kuwait-green-light: #00B359;
            --kuwait-green-dark: #005A2D;
            --kuwait-red-light: #E7344A;
            --kuwait-red-dark: #A80D1F;
            --kuwait-gold: #FFD700;
            --kuwait-gold-dark: #DAA520;
            
            /* ألوان مساعدة */
            --shadow-light: rgba(0, 122, 61, 0.1);
            --shadow-medium: rgba(0, 122, 61, 0.2);
            --shadow-dark: rgba(0, 122, 61, 0.3);
            --gradient-kuwait: linear-gradient(135deg, var(--kuwait-green) 0%, var(--kuwait-red) 100%);
            --gradient-kuwait-reverse: linear-gradient(135deg, var(--kuwait-red) 0%, var(--kuwait-green) 100%);
            --gradient-subtle: linear-gradient(145deg, rgba(255,255,255,0.98) 0%, rgba(248,248,248,0.95) 100%);
            --gradient-cards: linear-gradient(145deg, var(--kuwait-white) 0%, #f8f9fa 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: 'IBM Plex Sans Arabic', 'Cairo', 'Segoe UI', Tahoma, sans-serif;
            background: var(--gradient-kuwait);
            min-height: 100vh;
            line-height: 1.6;
            position: relative;
            color: var(--kuwait-black);
            font-display: swap;
        }

        /* خلفية زخرفية كويتية مبهرة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 15% 85%, rgba(206, 17, 38, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 15%, rgba(0, 122, 61, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 215, 0, 0.04) 0%, transparent 70%),
                linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0.02) 100%);
            z-index: -1;
        }

        /* شريط علوي ثابت محسّن للجوال */
        .mobile-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: var(--gradient-kuwait);
            color: var(--kuwait-white);
            padding: 12px 20px;
            box-shadow: 0 4px 20px var(--shadow-dark);
            backdrop-filter: blur(15px);
        }

        .mobile-header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1400px;
            margin: 0 auto;
        }

        .mobile-logo {
            font-size: 1.3em;
            font-weight: 800;
            color: var(--kuwait-white);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Cairo', sans-serif;
        }

        .mobile-nav {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mobile-nav-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: var(--kuwait-white);
            padding: 8px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 1em;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            min-height: 40px;
            min-width: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .mobile-nav-btn:hover, .mobile-nav-btn:active {
            background: rgba(255,255,255,0.25);
            transform: scale(1.05);
        }

        .cart-counter {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--kuwait-red);
            color: var(--kuwait-white);
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            font-weight: 700;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 70px 20px 20px;
        }

        /* رأس الصفحة المبهر */
        .hero-section {
            text-align: center;
            margin-bottom: 40px;
            background: var(--gradient-subtle);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 
                0 25px 50px var(--shadow-medium),
                inset 0 1px 0 rgba(255,255,255,0.9);
            border: 4px solid transparent;
            background-clip: padding-box;
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            background: var(--gradient-kuwait);
            border-radius: 28px;
            z-index: -1;
        }

        .hero-section::after {
            content: '🇰🇼';
            position: absolute;
            top: 25px;
            right: 30px;
            font-size: 3em;
            opacity: 0.3;
            filter: drop-shadow(2px 2px 4px var(--shadow-light));
        }

        .hero-title {
            color: var(--kuwait-black);
            font-size: 3.2em;
            margin-bottom: 20px;
            text-shadow: 4px 4px 8px var(--shadow-light);
            font-weight: 800;
            background: var(--gradient-kuwait);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            letter-spacing: -1px;
            font-family: 'Cairo', sans-serif;
        }

        .hero-subtitle {
            color: var(--kuwait-green-dark);
            font-size: 1.3em;
            margin-bottom: 25px;
            font-weight: 600;
            text-shadow: 1px 1px 3px var(--shadow-light);
            line-height: 1.5;
        }

        .hero-stats {
            background: var(--gradient-kuwait-gold);
            color: var(--kuwait-black);
            padding: 15px;
            border-radius: 15px;
            margin: 20px 0;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        /* شريط بحث محسّن */
        .search-section {
            background: var(--gradient-subtle);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 
                0 15px 40px var(--shadow-medium),
                inset 0 1px 0 rgba(255,255,255,0.9);
            margin-bottom: 30px;
            border: 3px solid var(--kuwait-white);
            position: relative;
        }

        .search-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-kuwait);
            border-radius: 25px 25px 0 0;
        }

        .search-controls {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
            align-items: end;
        }

        .search-box {
            padding: 16px 25px;
            border: 3px solid var(--kuwait-green-light);
            border-radius: 25px;
            font-size: 16px;
            font-weight: 500;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--kuwait-white);
            color: var(--kuwait-black);
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            min-height: 56px;
        }

        .search-box:focus {
            border-color: var(--kuwait-red);
            box-shadow: 
                0 0 15px rgba(206, 17, 38, 0.3),
                0 5px 15px var(--shadow-medium);
            transform: translateY(-2px);
        }

        .search-box::placeholder {
            color: #999;
        }

        .category-select, .sort-select {
            padding: 16px 20px;
            border: 3px solid var(--kuwait-green-light);
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--kuwait-white);
            color: var(--kuwait-black);
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            cursor: pointer;
            min-height: 56px;
        }

        .category-select:focus, .sort-select:focus {
            border-color: var(--kuwait-red);
            box-shadow: 
                0 0 15px rgba(206, 17, 38, 0.3),
                0 5px 15px var(--shadow-medium);
            transform: translateY(-2px);
        }

        /* فئات المنتجات */
        .categories-section {
            background: var(--gradient-subtle);
            padding: 35px;
            border-radius: 25px;
            box-shadow: 
                0 20px 40px var(--shadow-medium),
                inset 0 1px 0 rgba(255,255,255,0.9);
            margin-bottom: 30px;
            position: relative;
            border: 3px solid var(--kuwait-white);
        }

        .categories-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--gradient-kuwait);
            border-radius: 25px 25px 0 0;
        }

        .categories-title {
            text-align: center;
            color: var(--kuwait-black);
            font-size: 2.2em;
            margin-bottom: 30px;
            text-shadow: 3px 3px 6px var(--shadow-light);
            font-weight: 800;
            position: relative;
            font-family: 'Cairo', sans-serif;
        }

        .categories-title::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: var(--gradient-kuwait);
            border-radius: 2px;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .category-card {
            background: var(--gradient-kuwait);
            color: var(--kuwait-white);
            padding: 25px 15px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 12px 30px var(--shadow-medium),
                inset 0 1px 0 rgba(255,255,255,0.25);
            position: relative;
            overflow: hidden;
            border: 3px solid transparent;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            touch-action: manipulation;
        }

        .category-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: all 0.8s;
        }

        .category-card:hover::before {
            left: 100%;
        }

        .category-card:hover, .category-card:active {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 
                0 20px 50px var(--shadow-dark),
                inset 0 1px 0 rgba(255,255,255,0.4);
            border-color: var(--kuwait-gold);
        }

        .category-card h3 {
            font-size: 1.3em;
            margin-bottom: 8px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-family: 'Cairo', sans-serif;
        }

        .category-card p {
            font-size: 0.9em;
            opacity: 0.9;
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        /* شبكة المنتجات */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .product-card {
            background: var(--gradient-cards);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 
                0 15px 35px var(--shadow-light),
                inset 0 1px 0 rgba(255,255,255,0.8);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            border: 3px solid transparent;
            overflow: hidden;
            touch-action: manipulation;
        }

        .product-card:hover, .product-card:active {
            transform: translateY(-10px);
            box-shadow: 
                0 25px 50px var(--shadow-dark),
                inset 0 1px 0 rgba(255,255,255,0.9);
            border-color: var(--kuwait-green);
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--gradient-kuwait);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .product-card:hover::before {
            opacity: 1;
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            border: 2px solid #f0f0f0;
            background: var(--kuwait-white);
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
            border-color: var(--kuwait-green-light);
            box-shadow: 0 10px 25px var(--shadow-medium);
        }

        .product-title {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--kuwait-black);
            margin-bottom: 10px;
            line-height: 1.4;
            text-shadow: 1px 1px 2px var(--shadow-light);
            min-height: 2.8em;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
        }

        .product-price {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .current-price {
            font-size: 1.6em;
            font-weight: 800;
            color: var(--kuwait-red);
            text-shadow: 2px 2px 4px var(--shadow-light);
            font-family: 'Cairo', sans-serif;
        }

        .original-price {
            font-size: 1em;
            text-decoration: line-through;
            color: #999;
            font-weight: 500;
            margin-right: 8px;
        }

        .discount-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--gradient-kuwait-reverse);
            color: var(--kuwait-white);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(206, 17, 38, 0.4);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .product-description {
            color: #555;
            font-size: 0.9em;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
            font-weight: 400;
        }

        /* أزرار العمل */
        .product-actions {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            align-items: center;
        }

        .add-to-cart-btn {
            background: var(--gradient-kuwait);
            color: var(--kuwait-white);
            border: none;
            border-radius: 20px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            font-family: 'Cairo', sans-serif;
            min-height: 44px;
            touch-action: manipulation;
        }

        .add-to-cart-btn:hover, .add-to-cart-btn:active {
            background: var(--gradient-kuwait-reverse);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 122, 61, 0.4);
        }

        .quick-order-btn {
            background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
            color: var(--kuwait-white);
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            touch-action: manipulation;
        }

        .quick-order-btn:hover, .quick-order-btn:active {
            background: linear-gradient(135deg, var(--kuwait-green) 0%, var(--kuwait-green-dark) 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4);
        }

        /* معلومات النتائج */
        .results-info {
            text-align: center;
            background: var(--gradient-subtle);
            padding: 18px;
            border-radius: 15px;
            margin-bottom: 25px;
            color: var(--kuwait-green-dark);
            box-shadow: 0 8px 25px var(--shadow-light);
            font-weight: 600;
            border: 2px solid var(--kuwait-white);
            font-family: 'Cairo', sans-serif;
        }

        /* Pagination محسّن */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 40px 0;
            background: var(--gradient-subtle);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px var(--shadow-medium);
            border: 2px solid var(--kuwait-white);
            flex-wrap: wrap;
        }

        .pagination button {
            background: var(--gradient-kuwait);
            color: var(--kuwait-white);
            border: none;
            padding: 12px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            min-height: 44px;
            min-width: 44px;
            touch-action: manipulation;
        }

        .pagination button:hover:not(:disabled), .pagination button:active:not(:disabled) {
            background: var(--gradient-kuwait-reverse);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(206, 17, 38, 0.4);
        }

        .pagination button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            opacity: 0.6;
        }

        .pagination .current-page {
            background: var(--kuwait-gold);
            color: var(--kuwait-black);
            font-weight: 800;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }

        /* رسالة عدم وجود نتائج */
        .no-results {
            text-align: center;
            background: var(--gradient-subtle);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 15px 40px var(--shadow-medium);
            color: var(--kuwait-red);
            font-size: 1.2em;
            border: 3px solid var(--kuwait-white);
        }

        .no-results h3 {
            color: var(--kuwait-red);
            font-size: 1.8em;
            margin-bottom: 15px;
            font-weight: 800;
            font-family: 'Cairo', sans-serif;
        }

        .no-results p {
            color: var(--kuwait-green-dark);
            font-weight: 500;
        }

        /* زر الواتساب المحسّن */
        .whatsapp-float {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
            color: var(--kuwait-white);
            border: 3px solid var(--kuwait-white);
            border-radius: 50px;
            padding: 16px 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 
                0 10px 30px rgba(37, 211, 102, 0.4),
                0 5px 20px var(--shadow-medium);
            z-index: 999;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(15px);
            touch-action: manipulation;
        }

        .whatsapp-float:hover, .whatsapp-float:active {
            background: linear-gradient(135deg, var(--kuwait-green) 0%, var(--kuwait-green-dark) 100%);
            transform: translateY(-5px) scale(1.08);
            box-shadow: 
                0 15px 40px rgba(37, 211, 102, 0.5),

    <script>
        // بيانات المتغيرات العامة
        let products = [];
        let currentPage = 1;
        const productsPerPage = 12;
        let filteredProducts = [];
        let isSearching = false;
        let searchTimeout;

        // الفئات الرئيسية مع كلمات بحث محسّنة
        const categories = [
            { 
                name: 'أجهزة إلكترونية', 
                count: 0, 
                keywords: ['جهاز', 'كهربائي', 'إلكتروني', 'هاتف', 'كمبيوتر', 'ساعة', 'شاحن', 'بطارية', 'كاميرا', 'سماعة'] 
            },
            { 
                name: 'عناية بشرة وجمال', 
                count: 0, 
                keywords: ['كريم', 'بشرة', 'وجه', 'تفتيح', 'ترطيب', 'تبييض', 'عناية', 'سيروم', 'ماسك', 'جمال', 'مرطب', 'مقشر'] 
            },
            { 
                name: 'عناية شعر وطبيعية', 
                count: 0, 
                keywords: ['شعر', 'شامبو', 'زيت', 'علاج', 'تساقط', 'نمو', 'صبغة', 'تلوين', 'بلسم', 'طبيعي', 'عشبي'] 
            },
            { 
                name: 'ادوات منزلية ومطبخ', 
                count: 0, 
                keywords: ['منزل', 'مطبخ', 'تنظيف', 'منظف', 'أدوات', 'حفظ', 'تخزين', 'منظم', 'طبخ', 'قهوة', 'شاي'] 
            },
            { 
                name: 'ملابس واكسسوارات', 
                count: 0, 
                keywords: ['حقيبة', 'شنطة', 'محفظة', 'حزام', 'قفازات', 'ملابس', 'نظارة', 'ساعة', 'شورت', 'جاكيت'] 
            },
            { 
                name: 'رياضة ولياقة', 
                count: 0, 
                keywords: ['رياضة', 'تمارين', 'لياقة', 'جري', 'تدريب', 'عضلات', 'رياضي', 'مساج', 'تدليك'] 
            },
            { 
                name: 'اطفال والعاب', 
                count: 0, 
                keywords: ['طفل', 'أطفال', 'لعبة', 'ألعاب', 'صغير', 'طفولة', 'روبوت', 'سيارة', 'حصالة'] 
            },
            { 
                name: 'صحة وعلاج طبيعي', 
                count: 0, 
                keywords: ['صحة', 'طبي', 'علاج', 'دواء', 'طبيعي', 'صحي', 'مساج', 'تدليك', 'لصقات', 'مفاصل'] 
            },
            { 
                name: 'عطور ومنظفات', 
                count: 0, 
                keywords: ['عطر', 'رائحة', 'معطر', 'صابون', 'منظف', 'تنظيف', 'مسك', 'عطور', 'زيت'] 
            },
            { 
                name: 'سيارات واكسسوارات', 
                count: 0, 
                keywords: ['سيارة', 'قيادة', 'مركبة', 'سائق', 'محرك', 'كاميرا', 'حامل', 'ضاغط', 'هواء'] 
            }
        ];

        // دالة لإنشاء slug المنتج
        function getProductPageSlug(product) {
            const slug = product.title
                .replace(/[\s\-\+\(\)\[\]\{\}\|\\\/:*?"<>]/g, '-')
                .replace(/\-+/g, '-')
                .replace(/^\-|\-$/g, '');
            
            return `${slug}-${product.id}.html`;
        }

        // تحميل البيانات
        async function loadProducts() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/sherow1982/sooq-alkuwait/main/products_data.json');
                if (!response.ok) {
                    throw new Error('فشل في تحميل البيانات');
                }
                const data = await response.json();
                
                products = data.map(product => ({
                    ...product,
                    discount: product.price && product.sale_price ? 
                        Math.round(((product.price - product.sale_price) / product.price) * 100) : 0,
                    pageSlug: getProductPageSlug(product),
                    displayPrice: product.sale_price || product.price,
                    searchKeywords: generateSearchKeywords(product)
                }));

                console.log(`✅ تم تحميل ${products.length} منتج بنجاح`);
                
                calculateCategoryCounts();
                filteredProducts = [...products];
                displayProducts();
                displayCategories();
                populateCategorySelect();
                updateResultsInfo();
                updateCartCounter();
                
            } catch (error) {
                console.error('خطأ في تحميل المنتجات:', error);
                showError();
            }
        }

        // إنشاء كلمات بحث محسّنة للسيو
        function generateSearchKeywords(product) {
            const titleWords = product.title.split(' ');
            const descWords = product.description.split(' ').slice(0, 5);
            const priceRange = product.displayPrice < 5 ? 'رخيص' : 
                              product.displayPrice > 50 ? 'فاخر' : 'متوسط';
            
            return [
                ...titleWords,
                ...descWords,
                priceRange,
                'الكويت',
                'اونلاين',
                'توصيل مجاني'
            ].join(' ').toLowerCase();
        }

        // حساب عدد المنتجات في كل فئة
        function calculateCategoryCounts() {
            categories.forEach(category => {
                category.count = products.filter(product => 
                    category.keywords.some(keyword => 
                        product.title.includes(keyword) || 
                        product.description.includes(keyword)
                    )
                ).length;
            });
        }

        // عرض الفئات
        function displayCategories() {
            const categoriesGrid = document.getElementById('categoriesGrid');
            const validCategories = categories.filter(category => category.count > 0);
            
            categoriesGrid.innerHTML = validCategories.map(category => `
                <div class="category-card" onclick="filterByCategory('${category.name}')">
                    <h3>${category.name}</h3>
                    <p>${category.count} منتج متوفر</p>
                </div>
            `).join('');
        }

        // تصفية حسب الفئة
        function filterByCategory(categoryName) {
            const category = categories.find(cat => cat.name === categoryName);
            if (!category) return;

            document.getElementById('searchBox').value = '';
            document.getElementById('categorySelect').value = categoryName;
            
            filteredProducts = products.filter(product => 
                category.keywords.some(keyword => 
                    product.title.includes(keyword) || 
                    product.description.includes(keyword)
                )
            );

            currentPage = 1;
            isSearching = true;
            hideCategories();
            displayProducts();
            updateResultsInfo();
            
            // تتبع الحدث
            trackEvent('category_filter', { category_name: categoryName, results_count: filteredProducts.length });
        }

        // إخفاء/إظهار الفئات
        function hideCategories() {
            document.getElementById('categoriesSection').classList.add('hidden');
        }

        function showCategories() {
            document.getElementById('categoriesSection').classList.remove('hidden');
        }

        // ملء قائمة الفئات
        function populateCategorySelect() {
            const categorySelect = document.getElementById('categorySelect');
            const validCategories = categories.filter(category => category.count > 0);
            
            validCategories.forEach(category => {
                const option = document.createElement('option');
                option.value = category.name;
                option.textContent = `${category.name} (${category.count})`;
                categorySelect.appendChild(option);
            });
        }

        // فتح صفحة المنتج
        function openProductPage(product) {
            const pageUrl = `https://sherow1982.github.io/sooq-alkuwait/products-pages/${product.pageSlug}`;
            window.location.href = pageUrl; // فتح في نفس التبويب لتحسين SEO
        }

        // إضافة للسلة
        function addToCart(product, event) {
            if (event) {
                event.stopPropagation();
            }
            
            try {
                let cart = JSON.parse(localStorage.getItem('sooq-alkuwait-cart') || '[]');
                
                const existingIndex = cart.findIndex(item => item.id === product.id);
                
                if (existingIndex !== -1) {
                    cart[existingIndex].quantity += 1;
                } else {
                    cart.push({
                        id: product.id,
                        title: product.title,
                        price: product.displayPrice,
                        image: product.image_link,
                        quantity: 1
                    });
                }
                
                localStorage.setItem('sooq-alkuwait-cart', JSON.stringify(cart));
                updateCartCounter();
                showAddToCartFeedback(product.title);
                
                // تتبع الحدث
                trackEvent('add_to_cart', {
                    item_name: product.title,
                    item_id: product.id,
                    price: product.displayPrice,
                    currency: 'KWD'
                });
                
            } catch (error) {
                console.error('خطأ في إضافة المنتج:', error);
                alert('حدث خطأ في إضافة المنتج. الرجاء المحاولة مرة أخرى.');
            }
        }

        // تحديث عداد السلة
        function updateCartCounter() {
            try {
                const cart = JSON.parse(localStorage.getItem('sooq-alkuwait-cart') || '[]');
                const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
                
                const cartCounter = document.getElementById('cart-counter');
                if (totalItems > 0) {
                    cartCounter.textContent = totalItems > 99 ? '99+' : totalItems;
                    cartCounter.style.display = 'flex';
                } else {
                    cartCounter.style.display = 'none';
                }
            } catch (error) {
                console.error('خطأ في تحديث عداد السلة:', error);
            }
        }

        // عرض المنتجات
        function displayProducts() {
            const grid = document.getElementById('productsGrid');
            const start = (currentPage - 1) * productsPerPage;
            const end = start + productsPerPage;
            const currentProducts = filteredProducts.slice(start, end);

            if (currentProducts.length === 0) {
                grid.innerHTML = '';
                document.getElementById('noResults').classList.remove('hidden');
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            document.getElementById('noResults').classList.add('hidden');

            grid.innerHTML = currentProducts.map(product => `
                <div class="product-card" onclick="openProductPage(${JSON.stringify(product).replace(/"/g, '&quot;')})">
                    ${product.discount > 0 ? `<div class="discount-badge">-${product.discount}%</div>` : ''}
                    <img src="${product.image_link}" 
                         alt="${product.title} - اشتري اونلاين في الكويت" 
                         class="product-image" 
                         loading="lazy"
                         width="300" 
                         height="200"
                         onerror="this.src='https://via.placeholder.com/300x200/007A3D/FFFFFF?text=${encodeURIComponent(product.title)}'">
                    <h3 class="product-title">${product.title}</h3>
                    <div class="product-price">
                        <span class="current-price">${product.displayPrice.toFixed(3)} د.ك</span>
                        ${product.discount > 0 ? 
                            `<span class="original-price">${product.price.toFixed(3)} د.ك</span>` : ''}
                    </div>
                    <p class="product-description">${product.description}</p>
                    <div class="product-actions">
                        <button class="add-to-cart-btn" onclick="addToCart(${JSON.stringify(product).replace(/"/g, '&quot;')}, event)">
                            🛒 أضف للسلة
                        </button>
                        <a href="https://wa.me/+96565443322?text=مرحباٌ %20أريد%20شراء:%20${encodeURIComponent(product.title)}%20-%20السعر:%20${product.displayPrice.toFixed(3)}%20د.ك" 
                           target="_blank" 
                           rel="noopener noreferrer"
                           class="quick-order-btn"
                           onclick="event.stopPropagation(); trackEvent('quick_whatsapp_order', {item_name: '${product.title.replace(/'/g, '')}', item_id: ${product.id}});">
                            💬
                        </a>
                    </div>
                </div>
            `).join('');

            displayPagination();
            setupLazyLoading();
        }

        // عرض الصفحات
        function displayPagination() {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.ceil(filteredProducts.length / productsPerPage);

            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let paginationHTML = '';

            if (currentPage > 1) {
                paginationHTML += `<button onclick="goToPage(${currentPage - 1})">السابق</button>`;
            }

            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);

            if (startPage > 1) {
                paginationHTML += `<button onclick="goToPage(1)">1</button>`;
                if (startPage > 2) {
                    paginationHTML += `<span style="padding: 12px; color: var(--kuwait-green-dark); font-weight: 700;">...</span>`;
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                paginationHTML += `<button onclick="goToPage(${i})" ${i === currentPage ? 'class="current-page"' : ''}>${i}</button>`;
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    paginationHTML += `<span style="padding: 12px; color: var(--kuwait-green-dark); font-weight: 700;">...</span>`;
                }
                paginationHTML += `<button onclick="goToPage(${totalPages})">${totalPages}</button>`;
            }

            if (currentPage < totalPages) {
                paginationHTML += `<button onclick="goToPage(${currentPage + 1})">التالي</button>`;
            }

            pagination.innerHTML = paginationHTML;
        }

        // الانتقال إلى صفحة
        function goToPage(page) {
            currentPage = page;
            displayProducts();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            // تتبع الصفحات
            trackEvent('page_view', { page_number: page });
        }

        // تحديث معلومات النتائج
        function updateResultsInfo() {
            const resultsInfo = document.getElementById('resultsInfo');
            const start = Math.min((currentPage - 1) * productsPerPage + 1, filteredProducts.length);
            const end = Math.min(currentPage * productsPerPage, filteredProducts.length);
            const total = filteredProducts.length;

            if (total > 0) {
                resultsInfo.innerHTML = `📊 عرض <strong>${start}-${end}</strong> من أصل <strong>${total}</strong> منتج متوفر في الكويت`;
            } else {
                resultsInfo.textContent = 'لا توجد نتائج مطابقة';
            }
        }

        // البحث الذكي
        function performSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const searchTerm = document.getElementById('searchBox').value.toLowerCase().trim();
                const categoryFilter = document.getElementById('categorySelect').value;

                if (!searchTerm && !categoryFilter) {
                    filteredProducts = [...products];
                    isSearching = false;
                    showCategories();
                } else {
                    let filtered = [...products];

                    if (searchTerm) {
                        filtered = filtered.filter(product =>
                            product.title.toLowerCase().includes(searchTerm) ||
                            product.description.toLowerCase().includes(searchTerm) ||
                            product.searchKeywords.includes(searchTerm)
                        );
                    }

                    if (categoryFilter) {
                        const category = categories.find(cat => cat.name === categoryFilter);
                        if (category) {
                            filtered = filtered.filter(product => 
                                category.keywords.some(keyword => 
                                    product.title.includes(keyword) || 
                                    product.description.includes(keyword)
                                )
                            );
                        }
                    }

                    filteredProducts = filtered;
                    isSearching = true;
                    hideCategories();
                    
                    // تتبع البحث
                    if (searchTerm) {
                        trackEvent('search', { search_term: searchTerm, results_count: filtered.length });
                    }
                }

                currentPage = 1;
                displayProducts();
                updateResultsInfo();
            }, 300);
        }

        // الترتيب
        function sortProducts() {
            const sortBy = document.getElementById('sortSelect').value;

            switch (sortBy) {
                case 'name':
                    filteredProducts.sort((a, b) => a.title.localeCompare(b.title, 'ar'));
                    break;
                case 'price-low':
                    filteredProducts.sort((a, b) => a.displayPrice - b.displayPrice);
                    break;
                case 'price-high':
                    filteredProducts.sort((a, b) => b.displayPrice - a.displayPrice);
                    break;
                case 'discount':
                    filteredProducts.sort((a, b) => b.discount - a.discount);
                    break;
            }

            currentPage = 1;
            displayProducts();
            
            trackEvent('sort_products', { sort_by: sortBy });
        }

        // عرض رسالة خطأ
        function showError() {
            document.getElementById('noResults').classList.remove('hidden');
            document.getElementById('noResults').innerHTML = `
                <h3>⚠️ خطأ في تحميل البيانات</h3>
                <p>يرجى إعادة تحميل الصفحة أو المحاولة لاحقاً</p>
                <button onclick="location.reload()" style="padding: 15px 30px; background: var(--kuwait-green); color: white; border: none; border-radius: 25px; cursor: pointer; margin-top: 15px; font-weight: 700;">إعادة المحاولة</button>
            `;
        }

        // عرض رسالة إضافة للسلة
        function showAddToCartFeedback(productTitle) {
            const feedback = document.createElement('div');
            feedback.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: var(--kuwait-green);
                color: var(--kuwait-white);
                padding: 20px 30px;
                border-radius: 25px;
                font-weight: 700;
                font-size: 16px;
                z-index: 10000;
                box-shadow: 0 15px 40px var(--shadow-dark);
                text-align: center;
                animation: addToCartFeedback 3s ease-in-out;
            `;
            feedback.innerHTML = `✅ تمت إضافة المنتج للسلة!<br><small style="opacity: 0.9;">اضغط على 🛒 للمراجعة</small>`;
            document.body.appendChild(feedback);
            setTimeout(() => feedback.remove(), 3000);
        }

        // إعداد Lazy Loading
        function setupLazyLoading() {
            if ('IntersectionObserver' in window) {
                const imageObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const img = entry.target;
                            img.classList.add('loaded');
                            imageObserver.unobserve(img);
                        }
                    });
                }, { threshold: 0.1, rootMargin: '50px' });

                document.querySelectorAll('img[loading="lazy"]').forEach(img => {
                    img.classList.add('lazy-load');
                    imageObserver.observe(img);
                });
            }
        }

        // تتبع الأحداث
        function trackEvent(eventName, data = {}) {
            if (typeof gtag !== 'undefined') {
                gtag('event', eventName, {
                    ...data,
                    page_title: document.title,
                    page_location: window.location.href
                });
            }
            console.log('تتبع الحدث:', eventName, data);
        }

        // إعداد أحداث التفاعل
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 بدء تحميل كتالوج المنتجات المحسّن...');
            loadProducts();

            const searchBox = document.getElementById('searchBox');
            const categorySelect = document.getElementById('categorySelect');
            const sortSelect = document.getElementById('sortSelect');

            searchBox.addEventListener('input', performSearch);
            categorySelect.addEventListener('change', performSearch);
            sortSelect.addEventListener('change', sortProducts);

            // مراقبة إذا كان المستخدم يبحث أم لا
            searchBox.addEventListener('input', function() {
                if (this.value.trim() === '' && categorySelect.value === '') {
                    isSearching = false;
                    showCategories();
                } else {
                    this.classList.add('active-filter');
                }
            });

            categorySelect.addEventListener('change', function() {
                if (this.value === '' && searchBox.value.trim() === '') {
                    isSearching = false;
                    showCategories();
                    this.classList.remove('active-filter');
                } else {
                    this.classList.add('active-filter');
                }
            });

            console.log('✅ تم تحميل الكتالوج بتصميم كويتي احترافي بنجاح!');
        });

        // إضافة CSS للأنيميشن
        const animationStyles = document.createElement('style');
        animationStyles.textContent = `
            @keyframes addToCartFeedback {
                0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
                15% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
                30% { transform: translate(-50%, -50%) scale(1); }
                85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
                100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            }
        `;
        document.head.appendChild(animationStyles);
    </script>
</body>
</html>
