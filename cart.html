<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة التسوق - سوق الكويت | إنهاء الطلب بسهولة</title>
    <meta name="description" content="إنهاء طلبك من سوق الكويت بسهولة. مراجعة مشترياتك وإرسال الطلب عبر واتساب فوراً.">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --kuwait-green: #007A3D; --kuwait-red: #CE1126; --kuwait-black: #000000; --kuwait-white: #FFFFFF;
            --kuwait-green-light: #00B359; --kuwait-green-dark: #005A2D; --kuwait-red-dark: #A80D1F; --kuwait-gold: #FFD700;
            --shadow-light: rgba(0, 122, 61, 0.15); --shadow-medium: rgba(0, 122, 61, 0.25); --shadow-dark: rgba(0, 122, 61, 0.35);
            --gradient-kuwait: linear-gradient(135deg, var(--kuwait-green) 0%, var(--kuwait-red) 100%);
            --gradient-subtle: linear-gradient(145deg, rgba(255,255,255,0.98) 0%, rgba(248,248,248,0.95) 100%);
            --gradient-cards: linear-gradient(145deg, var(--kuwait-white) 0%, #f8f9fa 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--gradient-kuwait); min-height: 100vh; line-height: 1.7; color: var(--kuwait-black); }
        .container { max-width: 1000px; margin: 0 auto; padding: 30px; }
        .header { background: var(--gradient-subtle); padding: 40px; border-radius: 25px; text-align: center; margin-bottom: 40px; box-shadow: 0 20px 40px var(--shadow-medium); border: 3px solid var(--kuwait-white); position: relative; }
        .header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: var(--gradient-kuwait); border-radius: 25px 25px 0 0; }
        .back-btn { display: inline-flex; align-items: center; gap: 10px; background: var(--kuwait-green); color: var(--kuwait-white); text-decoration: none; padding: 15px 30px; border-radius: 25px; font-weight: 700; margin-bottom: 25px; transition: all 0.3s ease; box-shadow: 0 8px 20px var(--shadow-medium); }
        .back-btn:hover { background: var(--kuwait-green-dark); transform: translateY(-3px); }
        h1 { font-size: 2.8em; color: var(--kuwait-black); margin-bottom: 15px; font-weight: 800; text-shadow: 3px 3px 6px var(--shadow-light); }
        .cart-content { background: var(--gradient-subtle); padding: 50px; border-radius: 25px; box-shadow: 0 20px 40px var(--shadow-medium); border: 3px solid var(--kuwait-white); position: relative; margin-bottom: 30px; }
        .cart-content::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--gradient-kuwait); border-radius: 25px 25px 0 0; }
        .cart-item { display: grid; grid-template-columns: 80px 1fr auto; gap: 20px; padding: 25px; background: var(--gradient-cards); border-radius: 20px; margin-bottom: 20px; box-shadow: 0 8px 25px var(--shadow-light); border: 2px solid transparent; transition: all 0.3s ease; }
        .cart-item:hover { border-color: var(--kuwait-green); transform: translateY(-3px); }
        .item-image { width: 80px; height: 80px; object-fit: cover; border-radius: 15px; border: 2px solid var(--kuwait-green-light); }
        .item-info h3 { color: var(--kuwait-black); font-size: 1.3em; margin-bottom: 10px; font-weight: 700; }
        .item-price { color: var(--kuwait-red); font-size: 1.4em; font-weight: 800; }
        .quantity-controls { display: flex; align-items: center; gap: 15px; }
        .qty-btn { background: var(--kuwait-green); color: var(--kuwait-white); border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; }
        .qty-btn:hover { background: var(--kuwait-green-dark); transform: scale(1.1); }
        .quantity { font-size: 1.3em; font-weight: 700; min-width: 40px; text-align: center; }
        .remove-btn { background: var(--kuwait-red); color: var(--kuwait-white); border: none; border-radius: 15px; padding: 8px 15px; cursor: pointer; font-weight: 700; transition: all 0.3s ease; }
        .remove-btn:hover { background: var(--kuwait-red-dark); transform: translateY(-2px); }
        .cart-summary { background: var(--gradient-cards); padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 15px 35px var(--shadow-medium); border: 3px solid var(--kuwait-green); margin-bottom: 30px; }
        .total-amount { font-size: 2.5em; color: var(--kuwait-red); font-weight: 800; margin-bottom: 20px; text-shadow: 2px 2px 4px var(--shadow-light); }
        .checkout-btn { background: var(--gradient-kuwait); color: var(--kuwait-white); border: 3px solid var(--kuwait-white); border-radius: 35px; padding: 20px 40px; font-size: 1.4em; font-weight: 800; cursor: pointer; transition: all 0.4s ease; text-decoration: none; display: inline-flex; align-items: center; gap: 15px; box-shadow: 0 12px 30px var(--shadow-medium); }
        .checkout-btn:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 20px 50px var(--shadow-dark); border-color: var(--kuwait-gold); }
        .empty-cart { text-align: center; padding: 80px 40px; color: var(--kuwait-green-dark); font-size: 1.3em; }
        .empty-cart-icon { font-size: 5em; margin-bottom: 25px; opacity: 0.6; }
        .shop-now-btn { background: var(--gradient-kuwait); color: var(--kuwait-white); border: 3px solid var(--kuwait-white); border-radius: 30px; padding: 18px 35px; font-size: 1.2em; font-weight: 700; text-decoration: none; display: inline-flex; align-items: center; gap: 12px; margin-top: 25px; transition: all 0.3s ease; box-shadow: 0 10px 25px var(--shadow-medium); }
        .shop-now-btn:hover { transform: translateY(-4px) scale(1.05); border-color: var(--kuwait-gold); }
        .whatsapp-btn { position: fixed; bottom: 30px; left: 30px; background: linear-gradient(135deg, #25d366 0%, #128c7e 100%); color: var(--kuwait-white); border: 3px solid var(--kuwait-white); border-radius: 60px; padding: 20px 28px; font-size: 17px; font-weight: 700; z-index: 1001; transition: all 0.4s ease; text-decoration: none; display: flex; align-items: center; gap: 12px; }
        .whatsapp-btn:hover { background: linear-gradient(135deg, var(--kuwait-green) 0%, var(--kuwait-green-dark) 100%); transform: translateY(-5px) scale(1.08); border-color: var(--kuwait-gold); }
        @media (max-width: 768px) { .container { padding: 20px; } .cart-item { grid-template-columns: 60px 1fr; gap: 15px; } .quantity-controls { grid-column: 1 / -1; justify-self: center; margin-top: 15px; } h1 { font-size: 2.2em; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="products-catalog.html" class="back-btn">← متابعة التسوق</a>
            <h1>🛒 سلة التسوق</h1>
            <p>مراجعة مشترياتك وإنهاء الطلب</p>
        </div>
        
        <div class="cart-content">
            <div id="cartItems"></div>
            
            <div class="empty-cart" id="emptyCart" style="display: none;">
                <div class="empty-cart-icon">🛒</div>
                <h2>سلة التسوق فارغة</h2>
                <p>لم تقم بإضافة أي منتجات بعد</p>
                <a href="products-catalog.html" class="shop-now-btn">🛍️ ابدأ التسوق الآن</a>
            </div>
        </div>
        
        <div class="cart-summary" id="cartSummary" style="display: none;">
            <h2>📊 ملخص الطلب</h2>
            <div class="total-amount" id="totalAmount">0 د.ك</div>
            <p id="itemCount">0 منتج</p>
            <button class="checkout-btn" onclick="proceedToWhatsAppOrder()">💬 إرسال الطلب عبر واتساب</button>
        </div>
    </div>
    
    <a href="https://wa.me/201110760081" target="_blank" class="whatsapp-btn">💬 تواصل معنا</a>

    <script>
        let cart = [];
        function loadCart() {
            const savedCart = localStorage.getItem('cart');
            if (savedCart) { cart = JSON.parse(savedCart); }
            displayCart();
        }
        function displayCart() {
            const cartItemsContainer = document.getElementById('cartItems');
            const emptyCart = document.getElementById('emptyCart');
            const cartSummary = document.getElementById('cartSummary');
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = ''; emptyCart.style.display = 'block'; cartSummary.style.display = 'none'; return;
            }
            emptyCart.style.display = 'none'; cartSummary.style.display = 'block';
            cartItemsContainer.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <img src="${item.image_link}" alt="${item.title}" class="item-image">
                    <div class="item-info"><h3>${item.title}</h3><div class="item-price">${item.sale_price || item.price} د.ك</div></div>
                    <div class="quantity-controls">
                        <button class="qty-btn" onclick="updateQuantity(${index}, -1)">-</button>
                        <span class="quantity">${item.quantity}</span>
                        <button class="qty-btn" onclick="updateQuantity(${index}, 1)">+</button>
                        <button class="remove-btn" onclick="removeFromCart(${index})">🗑️</button>
                    </div>
                </div>`).join('');
            updateCartSummary();
        }
        function updateQuantity(index, change) {
            if (cart[index]) {
                cart[index].quantity += change;
                if (cart[index].quantity <= 0) { cart.splice(index, 1); }
                saveCart(); displayCart();
            }
        }
        function removeFromCart(index) { cart.splice(index, 1); saveCart(); displayCart(); }
        function saveCart() { localStorage.setItem('cart', JSON.stringify(cart)); }
        function updateCartSummary() {
            const totalAmount = cart.reduce((sum, item) => sum + (item.sale_price || item.price) * item.quantity, 0);
            const itemCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('totalAmount').textContent = totalAmount.toFixed(2) + ' د.ك';
            document.getElementById('itemCount').textContent = itemCount + ' منتج';
        }
        function proceedToWhatsAppOrder() {
            if (cart.length === 0) return;
            let message = 'مرحباً! أريد طلب المنتجات التالية:\n\n';
            cart.forEach((item, index) => {
                message += `${index + 1}. ${item.title}\n   الكمية: ${item.quantity}\n   السعر: ${((item.sale_price || item.price) * item.quantity).toFixed(2)} د.ك\n\n`;
            });
            const total = cart.reduce((sum, item) => sum + (item.sale_price || item.price) * item.quantity, 0);
            message += `إجمالي الطلب: ${total.toFixed(2)} د.ك\n\nشكراً لك!'`;
            window.open(`https://wa.me/201110760081?text=${encodeURIComponent(message)}`, '_blank');
            setTimeout(() => {
                if (confirm('هل تريد مسح السلة بعد إرسال الطلب؟')) {
                    cart = []; saveCart(); displayCart();
                }
            }, 2000);
        }
        document.addEventListener('DOMContentLoaded', loadCart);
    </script>
</body>
</html>
