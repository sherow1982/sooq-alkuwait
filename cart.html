<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,viewport-fit=cover"><title>سلة التسوق | سوق الكويت</title><meta name="robots" content="noindex"><style>:root{--g:#007A3D;--r:#CE1126}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#f8fafc,#e2e8f0)}.fab{position:fixed;right:14px;bottom:14px;z-index:1000;width:60px;height:60px;border:none;border-radius:50%;background:linear-gradient(135deg,var(--g),#00a651);color:#fff;font-size:20px;box-shadow:0 10px 28px rgba(0,122,61,.35)}.badge{position:absolute;top:-6px;right:-6px;background:var(--r);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900}header{background:linear-gradient(135deg,var(--g),#00a651);color:#fff;text-align:center;padding:20px 12px}.container{max-width:1100px;margin:0 auto;padding:16px}.card{background:#fff;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08);overflow:hidden;margin:16px 0}.row{display:grid;grid-template-columns:80px 1fr auto;gap:10px;padding:14px;border-bottom:1px solid #eef2f7;align-items:center}.thumb{width:80px;height:80px;border-radius:12px;object-fit:cover}.title{font-weight:800;color:#111827}.meta{font-size:12px;color:#6b7280}.price{color:var(--g);font-weight:900}.qty{display:flex;gap:8px;align-items:center;background:#f1f5f9;border-radius:999px;padding:4px 8px}.qty button{width:30px;height:30px;border:none;border-radius:50%;background:var(--g);color:#fff;font-weight:900}.remove{border:none;background:var(--r);color:#fff;padding:6px 10px;border-radius:10px}#totals{background:#111827;color:#fff;text-align:center;padding:22px;border-radius:14px}.amount{font-size:32px;font-weight:900;color:#ffd700}.cta{background:#fff;border:3px solid var(--g);border-radius:16px;text-align:center;padding:22px;box-shadow:0 14px 40px rgba(0,122,61,.15)}.cta h2{color:var(--g);margin-bottom:6px}.checkout{background:linear-gradient(135deg,var(--g),#00a651,#ffd700);color:#fff;border:none;border-radius:14px;padding:16px 22px;font-weight:900;box-shadow:0 18px 60px rgba(0,122,61,.35)}@media(min-width:640px){.row{grid-template-columns:100px 1fr auto auto auto}.thumb{width:100px;height:100px}}</style><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/></head><body><button class="fab" onclick="location.href='/cart.html'">🛒<span id="b" class="badge" style="display:none">0</span></button><header><h1>🛒 سلة التسوق</h1><p>تجاوب كامل • دفع مُشجّع</p></header><main class="container"><section class="card" id="list"><div id="items"></div></section><section id="totals" class="card" style="display:none"><div>إجمالي الطلب</div><div id="amount" class="amount">0 د.ك</div><div id="ship" style="opacity:.9;margin-top:6px">🚚 الشحن مجاني فوق 100 د.ك</div></section><section id="cta" class="card cta" style="display:none"><h2>🎉 اتمم طلبك الآن</h2><p>توصيل 24 ساعة • دفع عند الاستلام • ضمان</p><button class="checkout" onclick="go()">اتمام الطلب الآن</button></section><section id="empty" class="card" style="display:none;text-align:center;padding:28px 16px;color:#6b7280"><i class="fa fa-shopping-basket" style="font-size:44px;color:#cbd5e1"></i><h3>سلة التسوق فارغة</h3><a href="/" style="display:inline-block;margin-top:10px;background:var(--g);color:#fff;padding:10px 16px;border-radius:12px;font-weight:800;text-decoration:none">ابدأ التسوق</a></section></main><script>const FREE=100,b=document.getElementById('b'),items=document.getElementById('items'),tot=document.getElementById('totals'),amt=document.getElementById('amount'),ship=document.getElementById('ship'),cta=document.getElementById('cta'),empty=document.getElementById('empty');function load(){const c=JSON.parse(localStorage.getItem('cart')||'[]');const k=c.reduce((s,i)=>s+i.quantity,0);b.style.display=k?'flex':'none';b.textContent=k;if(!c.length){empty.style.display='block';tot.style.display='none';cta.style.display='none';items.innerHTML='';return}empty.style.display='none';tot.style.display='block';cta.style.display='block';let html='',t=0;c.forEach((p,i)=>{const it=(p.sale_price||p.price)*p.quantity;t+=it;html+=`<div class='row'><img class='thumb' src='${p.image}' alt='${p.title}'/><div><div class='title'>${p.title}</div><div class='meta'>${p.category||'منتجات عامة'}</div></div><div class='price'>${p.sale_price||p.price} د.ك</div><div class='qty'><button onclick='qty(${i},-1)'>-</button><span>${p.quantity}</span><button onclick='qty(${i},1)'>+</button></div><button class='remove' onclick='rm(${i})'>حذف</button></div>`});items.innerHTML=html;amt.textContent=t.toFixed(1)+' د.ك';if(t>=FREE){ship.innerHTML='✅ <b>الشحن مجاني</b>';ship.style.color='#10b981'}else{ship.innerHTML=`🚛 أضف ${(FREE-t).toFixed(1)} د.ك لتحصل على <b>الشحن المجاني</b>`;ship.style.color='#d97706'}}function qty(i,d){let c=JSON.parse(localStorage.getItem('cart')||'[]');c[i].quantity+=d;if(c[i].quantity<=0)c.splice(i,1);localStorage.setItem('cart',JSON.stringify(c));load()}function rm(i){let c=JSON.parse(localStorage.getItem('cart')||'[]');c.splice(i,1);localStorage.setItem('cart',JSON.stringify(c));load()}function go(){const c=JSON.parse(localStorage.getItem('cart')||'[]');if(!c.length)return;let m='🇰🇼 *طلب جديد*\n\n',t=0;c.forEach((p,i)=>{const it=(p.sale_price||p.price)*p.quantity;t+=it;m+=`${i+1}. *${p.title}*\n   ${p.sale_price||p.price} د.ك × ${p.quantity} = ${it.toFixed(1)} د.ك\n\n`});m+=`الإجمالي: ${t.toFixed(1)} د.ك\nالشحن: ${t>=FREE?'مجاني ✅':'2 د.ك'}\n\nالاسم:\nالهاتف:\nالمنطقة:\nالعنوان:\n`;window.open('https://wa.me/201110760081?text='+encodeURIComponent(m),'_blank')}document.addEventListener('DOMContentLoaded',load)</script></body></html>
