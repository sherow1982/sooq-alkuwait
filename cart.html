<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>🛒 سلة التسوق | سوق الكويت</title>
  <meta name="description" content="سلة التسوق - راجع منتجاتك واتمم طلبك بسهولة من سوق الكويت">
  <meta name="robots" content="noindex, follow">
  <style>
    :root{--g:#007A3D;--r:#CE1126;--gold:#FFD700;--bg:#0b1220}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{font-family:'Cairo','Segoe UI',sans-serif;background:linear-gradient(135deg,#f8fafc,#e2e8f0);color:#1f2937}
    header{background:linear-gradient(135deg,var(--g),#00a651);color:#fff;padding:24px 16px;text-align:center;position:sticky;top:0;z-index:1000}
    header h1{margin:0 0 6px;font-size:clamp(20px,5vw,36px);font-weight:900}
    header p{margin:0;font-size:clamp(12px,3.5vw,16px);opacity:.9}
    .container{max-width:1100px;margin:20px auto;padding:0 12px}
    .card{background:#fff;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.08);overflow:hidden}
    .cart-item{display:grid;grid-template-columns:80px 1fr auto;gap:12px;padding:14px;border-bottom:1px solid #eef2f7;align-items:center}
    .cart-item:last-child{border-bottom:none}
    .thumb{width:80px;height:80px;border-radius:12px;object-fit:cover;box-shadow:0 4px 10px rgba(0,0,0,.08)}
    .title{font-size:clamp(14px,3.5vw,18px);font-weight:700;color:#111827;margin:0 0 4px}
    .meta{font-size:12px;color:#6b7280}
    .price{color:var(--g);font-weight:800;font-size:clamp(14px,4vw,20px)}
    .qty{display:flex;align-items:center;gap:8px;background:#f3f4f6;border-radius:999px;padding:4px 8px}
    .qty button{width:32px;height:32px;border:none;border-radius:50%;background:var(--g);color:#fff;font-weight:900;box-shadow:0 4px 10px rgba(0,122,61,.3)}
    .qty span{min-width:22px;text-align:center;font-weight:700}
    .remove{border:none;background:var(--r);color:#fff;padding:6px 10px;border-radius:10px}
    .totals{background:linear-gradient(145deg,#111827,#1f2937);color:#fff;text-align:center;padding:28px;border-radius:16px;margin:16px 0}
    .amount{font-size:clamp(26px,6vw,44px);font-weight:900;color:var(--gold)}
    .ship-note{margin-top:10px;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.08)}
    .cta{background:#fff;border-radius:18px;padding:24px;text-align:center;border:3px solid var(--g);box-shadow:0 14px 40px rgba(0,122,61,.15)}
    .cta h2{margin:0 0 8px;color:var(--g);font-size:clamp(18px,5vw,28px)}
    .cta p{margin:0 0 22px;color:#6b7280;font-size:clamp(12px,4vw,16px)}
    .checkout{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--g),#00a651,var(--gold));color:#fff;border:none;border-radius:16px;padding:16px 24px;font-weight:900;font-size:clamp(14px,4.5vw,18px);box-shadow:0 18px 60px rgba(0,122,61,.35)}
    .empty{padding:48px 16px;text-align:center;color:#6b7280}
    .empty i{font-size:48px;color:#cbd5e1}
    .primary{display:inline-block;margin-top:16px;background:var(--g);color:#fff;text-decoration:none;padding:12px 18px;border-radius:12px;font-weight:800}
    /* Mobile-first responsive grid */
    @media(min-width:640px){.cart-item{grid-template-columns:100px 1fr auto auto auto}.thumb{width:100px;height:100px}}
    /* Safe-area for iPhone notches */
    .safe{padding-bottom:env(safe-area-inset-bottom)}
    /* Floating cart button globally reusable */
    .fab{position:fixed;right:16px;bottom:16px;width:64px;height:64px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--g),#00a651);color:#fff;font-size:22px;box-shadow:0 12px 30px rgba(0,122,61,.35);z-index:1100}
    .badge{position:absolute;top:-6px;right:-6px;background:var(--r);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900}
  </style>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <button class="fab safe" onclick="location.href='/cart.html'">🛒<span id="cart-badge" class="badge" style="display:none">0</span></button>
  <header>
    <h1>🛒 سلة التسوق</h1>
    <p>تجاوب كامل على الجوال والكمبيوتر • تجربة دفع مشجعة</p>
  </header>
  <main class="container">
    <section class="card" id="cart-list"><div id="items"></div></section>
    <section id="totals" class="totals" style="display:none">
      <div>إجمالي الطلب</div>
      <div id="amount" class="amount">0 د.ك</div>
      <div id="ship" class="ship-note">🚚 الشحن مجاني فوق 100 د.ك</div>
    </section>
    <section id="cta" class="cta" style="display:none">
      <h2>🎉 اتمم طلبك الآن</h2>
      <p>توصيل خلال 24 ساعة • دفع عند الاستلام • ضمان استبدال</p>
      <button class="checkout" onclick="completeOrder()">اتمام الطلب الآن <i class="fa fa-arrow-left"></i></button>
    </section>
    <section id="empty" class="card empty" style="display:none">
      <i class="fa fa-shopping-basket"></i>
      <h3>سلة التسوق فارغة</h3>
      <a class="primary" href="/">ابدأ التسوق</a>
    </section>
  </main>
  <script>
    const KWD_FREE = 100;
    const BADGE = document.getElementById('cart-badge');
    const itemsEl = document.getElementById('items');
    const totalsEl = document.getElementById('totals');
    const amountEl = document.getElementById('amount');
    const shipEl = document.getElementById('ship');
    const ctaEl = document.getElementById('cta');
    const emptyEl = document.getElementById('empty');

    function load(){
      const cart = JSON.parse(localStorage.getItem('cart')||'[]');
      const count = cart.reduce((s,i)=>s+i.quantity,0);
      BADGE.style.display = count? 'flex':'none';
      BADGE.textContent = count;

      if(!cart.length){ emptyEl.style.display='block'; totalsEl.style.display='none'; ctaEl.style.display='none'; itemsEl.innerHTML=''; return; }
      emptyEl.style.display='none'; totalsEl.style.display='block'; ctaEl.style.display='block';

      let html='', total=0;
      cart.forEach((p,idx)=>{
        const t = (p.sale_price||p.price)*p.quantity; total += t;
        html += `
          <div class="cart-item">
            <img class="thumb" src="${p.image}" alt="${p.title}">
            <div>
              <h3 class="title">${p.title}</h3>
              <div class="meta">${p.category||'منتجات عامة'}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
              <div class="price">${p.sale_price||p.price} د.ك</div>
              <div class="qty">
                <button aria-label="تقليل" onclick="qty(${idx},-1)">-</button>
                <span>${p.quantity}</span>
                <button aria-label="زيادة" onclick="qty(${idx},1)">+</button>
              </div>
              <button class="remove" onclick="removeItem(${idx})">حذف</button>
            </div>
          </div>`
      });
      itemsEl.innerHTML = html;
      amountEl.textContent = total.toFixed(1)+' د.ك';
      if(total>=KWD_FREE){ shipEl.innerHTML = '✅ <b>الشحن مجاني</b> تم تطبيق الشحن المجاني'; shipEl.style.background='rgba(16,185,129,.18)'; }
      else { const rem=(KWD_FREE-total).toFixed(1); shipEl.innerHTML = `🚛 أضف ${rem} د.ك لتحصل على <b>الشحن المجاني</b>`; shipEl.style.background='rgba(251,146,60,.18)'; }
    }
    function qty(i, d){ const cart=JSON.parse(localStorage.getItem('cart')||'[]'); cart[i].quantity+=d; if(cart[i].quantity<=0) cart.splice(i,1); localStorage.setItem('cart',JSON.stringify(cart)); load(); }
    function removeItem(i){ const cart=JSON.parse(localStorage.getItem('cart')||'[]'); cart.splice(i,1); localStorage.setItem('cart',JSON.stringify(cart)); load(); }
    function completeOrder(){
      const cart=JSON.parse(localStorage.getItem('cart')||'[]'); if(!cart.length) return;
      let total=0, msg='🇰🇼 *طلب جديد من سوق الكويت*\n\n';
      cart.forEach((p,i)=>{ const t=(p.sale_price||p.price)*p.quantity; total+=t; msg+=`${i+1}. *${p.title}*\n   ${p.sale_price||p.price} د.ك × ${p.quantity} = ${t.toFixed(1)} د.ك\n\n`; });
      msg+=`الإجمالي: ${total.toFixed(1)} د.ك\nالشحن: ${total>=KWD_FREE?'مجاني ✅':'2 د.ك'}\n\n`; msg+=`الاسم:\nالهاتف:\nالمنطقة:\nالعنوان:\n`;
      window.open('https://wa.me/201110760081?text='+encodeURIComponent(msg),'_blank');
    }
    document.addEventListener('DOMContentLoaded',load);
  </script>
</body>
</html>
