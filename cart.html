<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة التسوق - سوق الكويت</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="site-header"></div>

    <main class="container" style="padding: 140px 0 80px;">
        <div style="max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <h2 style="color: var(--kuwait-black); margin-bottom: 2rem; text-align: center;">
                <i class="fas fa-shopping-cart" style="color: var(--kuwait-green);"></i> سلة التسوق
            </h2>

            <div id="cartItems"></div>
            
            <div id="cartSummary" style="background: rgba(0,166,81,0.1); padding: 1.5rem; border-radius: 15px; margin-top: 2rem; display: none;">
                <div style="display: flex; justify-content: space-between; font-weight: 600; font-size: 1.2rem; margin-bottom: 1rem;">
                    <span>الإجمالي:</span>
                    <span id="cartTotal">0 د.ك</span>
                </div>
                <a href="checkout.html" style="display: block; width: 100%; padding: 1.5rem; background: var(--kuwait-green); color: white; text-decoration: none; text-align: center; border-radius: 15px; font-size: 1.3rem; font-weight: 700;">
                    <i class="fas fa-credit-card"></i> إتمام الطلب
                </a>
            </div>

            <div id="emptyCart" style="text-align: center; padding: 3rem 0; color: #666;">
                <i class="fas fa-shopping-cart" style="font-size: 4rem; color: #ddd; margin-bottom: 1rem;"></i>
                <h3>سلة التسوق فارغة</h3>
                <p>قم بإضافة بعض المنتجات للبدء بالتسوق</p>
                <a href="/" style="display: inline-block; margin-top: 1rem; padding: 1rem 2rem; background: var(--kuwait-green); color: white; text-decoration: none; border-radius: 10px; font-weight: 600;">
                    <i class="fas fa-shopping-bag"></i> تابع التسوق
                </a>
            </div>
        </div>
    </main>

    <div id="site-footer"></div>

    <script>
        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const cartItemsContainer = document.getElementById('cartItems');
            const cartSummary = document.getElementById('cartSummary');
            const emptyCart = document.getElementById('emptyCart');
            const cartTotal = document.getElementById('cartTotal');

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '';
                cartSummary.style.display = 'none';
                emptyCart.style.display = 'block';
                return;
            }

            emptyCart.style.display = 'none';
            cartSummary.style.display = 'block';

            let total = 0;
            let itemsHtml = '';

            cart.forEach((item, index) => {
                const itemTotal = (item.sale_price || item.price) * (item.quantity || 1);
                total += itemTotal;
                
                itemsHtml += `
                    <div class="cart-item" style="display: flex; align-items: center; gap: 1rem; padding: 1rem; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 1rem; background: #f9f9f9;">
                        <img src="${item.image}" alt="${item.title}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px;">
                        <div style="flex: 1;">
                            <h4 style="margin: 0 0 0.5rem 0; color: var(--kuwait-black);">${item.title}</h4>
                            <div style="font-weight: 600; color: var(--kuwait-green); font-size: 1.1rem;">${item.sale_price || item.price} د.ك</div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <button onclick="updateQuantity(${index}, -1)" style="width: 30px; height: 30px; border: 1px solid #ddd; background: white; border-radius: 5px; cursor: pointer;">-</button>
                            <span style="min-width: 30px; text-align: center; font-weight: 600;">${item.quantity || 1}</span>
                            <button onclick="updateQuantity(${index}, 1)" style="width: 30px; height: 30px; border: 1px solid #ddd; background: white; border-radius: 5px; cursor: pointer;">+</button>
                        </div>
                        <button onclick="removeItem(${index})" style="background: #dc2626; color: white; border: none; padding: 0.5rem; border-radius: 5px; cursor: pointer;">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
            });

            cartItemsContainer.innerHTML = itemsHtml;
            cartTotal.textContent = total.toFixed(2) + ' د.ك';
        }

        function updateQuantity(index, change) {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            if (cart[index]) {
                cart[index].quantity = Math.max(1, (cart[index].quantity || 1) + change);
                localStorage.setItem('cart', JSON.stringify(cart));
                renderCart();
                window.dispatchEvent(new CustomEvent('cart:updated'));
            }
        }

        function removeItem(index) {
            if (confirm('هل تريد حذف هذا المنتج من السلة؟')) {
                const cart = JSON.parse(localStorage.getItem('cart') || '[]');
                cart.splice(index, 1);
                localStorage.setItem('cart', JSON.stringify(cart));
                renderCart();
                window.dispatchEvent(new CustomEvent('cart:updated'));
            }
        }

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
    <script src="partials/partials-loader.js" defer></script>
    <script src="cart-core.js" defer></script>
    <script src="countdown-timer.js" defer></script>
    <script src="purchase-notifications.js" defer></script>
</body>
</html>
