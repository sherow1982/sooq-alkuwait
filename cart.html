<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة التسوق - سوق الكويت</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <h1><a href="index.html" style="color: var(--luxury-gold); text-decoration: none;"><i class="fas fa-shopping-bag"></i> سوق الكويت</a></h1>
                </div>
            </div>
        </div>
    </header>

    <main class="container" style="padding: 140px 0 80px; min-height: 100vh;">
        <div style="max-width: 800px; margin: 0 auto;">
            <h2 style="color: var(--kuwait-black); margin-bottom: 2rem; text-align: center;">
                <i class="fas fa-shopping-cart" style="color: var(--kuwait-green);"></i> سلة التسوق
            </h2>

            <div id="cartItems"></div>
            
            <div id="cartSummary" style="background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 2rem;">
                <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 1.3rem; color: var(--kuwait-black);">
                    <span>الإجمالي:</span>
                    <span id="cartTotal">0 د.ك</span>
                </div>
                <p style="color: var(--kuwait-green); margin: 1rem 0; font-weight: 600;">
                    <i class="fas fa-truck"></i> توصيل مجاني للطلبات فوق 100 د.ك
                </p>
                
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button onclick="window.location.href='index.html'" style="flex: 1; padding: 1rem; background: var(--dark-gray); color: white; border: none; border-radius: 12px; font-weight: 600;">
                        <i class="fas fa-arrow-left"></i> متابعة التسوق
                    </button>
                    <button onclick="window.location.href='checkout.html'" style="flex: 1; padding: 1rem; background: var(--kuwait-green); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 1.1rem;">
                        <i class="fas fa-credit-card"></i> إتمام الطلب
                    </button>
                </div>
            </div>
            
            <div id="emptyCart" style="display: none; text-align: center; padding: 4rem; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                <i class="fas fa-shopping-cart" style="font-size: 3rem; color: #ccc; margin-bottom: 1rem;"></i>
                <h3 style="color: var(--kuwait-black); margin-bottom: 1rem;">السلة فارغة</h3>
                <p style="color: #666; margin-bottom: 2rem;">لم تقم بإضافة أي منتجات للسلة بعد</p>
                <button onclick="window.location.href='index.html'" style="padding: 1rem 2rem; background: var(--kuwait-green); color: white; border: none; border-radius: 25px; font-weight: 700;">
                    <i class="fas fa-shopping-bag"></i> ابدأ التسوق الآن
                </button>
            </div>
        </div>
    </main>

    <script>
        let idleTimer;
        let userActive = true;
        
        function resetIdleTimer() {
            clearTimeout(idleTimer);
            userActive = true;
            idleTimer = setTimeout(() => {
                const cart = JSON.parse(localStorage.getItem('cart') || '[]');
                if (cart.length > 0 && userActive) {
                    window.location.href = 'checkout.html';
                }
            }, 30000);
        }
        
        ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart', 'click'].forEach(event => {
            document.addEventListener(event, resetIdleTimer, true);
        });

        function loadCart() {
            try {
                const cart = JSON.parse(localStorage.getItem('cart') || '[]');
                const cartItemsEl = document.getElementById('cartItems');
                const cartSummaryEl = document.getElementById('cartSummary');
                const emptyCartEl = document.getElementById('emptyCart');
                
                if (cart.length === 0) {
                    cartItemsEl.style.display = 'none';
                    cartSummaryEl.style.display = 'none';
                    emptyCartEl.style.display = 'block';
                    return;
                }
                
                let total = 0;
                let itemsHtml = '';
                
                cart.forEach((item, index) => {
                    const itemTotal = item.sale_price * item.quantity;
                    total += itemTotal;
                    
                    itemsHtml += `
                        <div class="cart-item" style="display: flex; align-items: center; gap: 1rem; padding: 1.5rem; background: white; border-radius: 15px; margin-bottom: 1rem; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
                            <img src="${item.image}" alt="${item.title}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 10px;">
                            <div style="flex: 1;">
                                <h4 style="margin-bottom: 0.5rem; color: var(--kuwait-black);">${item.title}</h4>
                                <div style="display: flex; align-items: center; gap: 1rem; margin: 1rem 0;">
                                    <button onclick="changeQuantity(${index}, -1)" style="background: var(--kuwait-red); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: 700;">-</button>
                                    <span style="font-weight: 600; font-size: 1.1rem;">${item.quantity}</span>
                                    <button onclick="changeQuantity(${index}, 1)" style="background: var(--kuwait-green); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: 700;">+</button>
                                </div>
                                <div style="font-weight: 700; color: var(--kuwait-green); font-size: 1.2rem;">${itemTotal.toFixed(2)} د.ك</div>
                            </div>
                            <button onclick="removeItem(${index})" style="background: var(--kuwait-red); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 1.1rem;"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                });
                
                cartItemsEl.innerHTML = itemsHtml;
                document.getElementById('cartTotal').textContent = total.toFixed(2) + ' د.ك';
                
                resetIdleTimer();
                
            } catch (error) {
                console.error('خطأ في تحميل السلة:', error);
            }
        }
        
        function changeQuantity(index, change) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart[index].quantity += change;
            
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            loadCart();
            resetIdleTimer();
        }
        
        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            loadCart();
            resetIdleTimer();
        }
        
        window.addEventListener('load', loadCart);
    </script>
</body>
</html>
