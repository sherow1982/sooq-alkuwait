<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛒 سلة التسوق - سوق الكويت 🇰🇼</title>
    <meta name="description" content="سلة التسوق في سوق الكويت - راجع منتجاتك وأتمم طلبك بسهولة">
    <link rel="stylesheet" href="assets/css/kuwait-modern.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
    .cart-header {
        background: linear-gradient(135deg, var(--ku-green) 0%, var(--ku-red) 50%, var(--ku-black) 100%);
        color: var(--ku-white);
        padding: 60px 0;
        text-align: center;
    }
    
    .cart-title {
        font-size: 36px;
        font-weight: 900;
        margin-bottom: 15px;
        text-shadow: 2px 2px 6px rgba(0,0,0,0.4);
    }
    
    .cart-content {
        background: var(--ku-white);
        border-radius: 20px;
        padding: 30px;
        margin: 30px 0;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    
    .cart-item {
        display: flex;
        align-items: center;
        padding: 20px;
        border-bottom: 2px solid #eef2f7;
        gap: 20px;
        border-radius: 15px;
        margin-bottom: 15px;
        background: #f8f9fa;
        transition: all 0.3s ease;
    }
    
    .cart-item:hover {
        background: var(--ku-white);
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        transform: translateX(5px);
    }
    
    .cart-item-image {
        width: 100px;
        height: 100px;
        object-fit: cover;
        border-radius: 15px;
        border: 2px solid var(--ku-gold);
    }
    
    .cart-item-details {
        flex: 1;
    }
    
    .cart-item-title {
        font-weight: bold;
        color: var(--ku-green);
        font-size: 18px;
        margin-bottom: 8px;
    }
    
    .cart-item-price {
        color: var(--ku-red);
        font-weight: bold;
        font-size: 16px;
    }
    
    .quantity-controls {
        display: flex;
        align-items: center;
        gap: 15px;
    }
    
    .quantity-btn {
        background: var(--ku-green);
        color: white;
        border: none;
        border-radius: 50%;
        width: 35px;
        height: 35px;
        cursor: pointer;
        font-weight: bold;
        font-size: 18px;
    }
    
    .quantity-display {
        font-weight: bold;
        font-size: 18px;
        min-width: 40px;
        text-align: center;
    }
    
    .cart-total {
        text-align: center;
        margin: 30px 0;
        padding: 30px;
        background: linear-gradient(135deg, var(--ku-green), #27ae60);
        color: white;
        border-radius: 20px;
    }
    
    .cart-total-amount {
        font-size: 36px;
        font-weight: 900;
    }
    
    .checkout-btn {
        background: linear-gradient(135deg, #25d366, #128c7e);
        color: white;
        padding: 18px 35px;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-size: 18px;
        font-weight: bold;
        text-decoration: none;
        display: inline-block;
        text-align: center;
        transition: all 0.3s ease;
        width: 100%;
        margin-top: 20px;
    }
    
    .checkout-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4);
        color: white;
    }
    
    .empty-cart {
        text-align: center;
        padding: 60px;
        color: #666;
    }
    </style>
</head>
<body>
    <header class="header">
        <div class="container nav">
            <a class="logo" href="index.html">
                <span class="logo-badge"></span>
                <span>سوق الكويت</span>
            </a>
            <nav class="menu">
                <a href="index.html">الرئيسية</a>
                <a href="products-catalog.html">المنتجات</a>
                <a href="about.html">من نحن</a>
                <a href="contact.html">اتصل بنا</a>
            </nav>
            <a class="cta" href="tel:+201110760081">اطلب الآن</a>
        </div>
    </header>
    
    <section class="cart-header">
        <div class="container">
            <h1 class="cart-title">🛒 سلة التسوق</h1>
            <p style="font-size: 18px; color: var(--ku-gold);">راجع منتجاتك وأتمم طلبك بسهولة</p>
        </div>
    </section>
    
    <section class="section">
        <div class="container">
            <div class="cart-content" id="cart-main-content">
                <!-- سيتم تحميل محتوى السلة هنا -->
            </div>
        </div>
    </section>
    
    <footer class="footer">
        <div class="container cols">
            <div>
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
                    <span class="logo-badge"></span>
                    <strong style="font-size:20px">سوق الكويت</strong>
                </div>
                <p>تجربة تسوّق حديثة بألوان العلم</p>
            </div>
            <div>
                <h4 style="color:#c9d1d9;margin-bottom:12px">تواصل مباشر</h4>
                <p style="color:#8b949e;line-height:1.8">📱 الهاتف: +201110760081</p>
                <p style="color:#8b949e;line-height:1.8">📧 البريد: sooqalkuwait2010@gmail.com</p>
            </div>
        </div>
    </footer>
    
    <script>
        let cart = JSON.parse(localStorage.getItem('sooq-cart')) || [];
        
        function displayCart() {
            const container = document.getElementById('cart-main-content');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <div style="font-size: 80px; margin-bottom: 20px; color: var(--ku-gold);">🛒</div>
                        <h3 style="color: var(--ku-green);">السلة فارغة!</h3>
                        <p style="margin-bottom: 30px;">لم تقم بإضافة أي منتجات بعد.</p>
                        <a href="products-catalog.html" class="cta">🛍️ تصفح المنتجات</a>
                    </div>
                `;
                return;
            }
            
            let total = 0;
            let cartItemsHtml = cart.map(item => {
                const itemTotal = item.sale_price * item.quantity;
                total += itemTotal;
                
                return `
                    <div class="cart-item">
                        <img src="${item.image_link}" class="cart-item-image" alt="${item.title}"
                             onerror="this.src='https://via.placeholder.com/100x100/2d5230/ffffff?text=منتج'">
                        
                        <div class="cart-item-details">
                            <div class="cart-item-title">${item.title}</div>
                            <div class="cart-item-price">السعر: ${item.sale_price} د.ك</div>
                            <div style="font-size: 12px; color: #666; margin-top: 5px;">
                                🏷️ رقم المنتج: SOOQ-${item.id.toString().padStart(4, '0')}<br>
                                💰 المجموع: ${itemTotal.toFixed(2)} د.ك
                            </div>
                        </div>
                        
                        <div class="quantity-controls">
                            <button class="quantity-btn" onclick="changeQuantity(${item.id}, -1)">-</button>
                            <span class="quantity-display">${item.quantity}</span>
                            <button class="quantity-btn" onclick="changeQuantity(${item.id}, 1)">+</button>
                            <button onclick="removeFromCart(${item.id})" 
                                    style="background: var(--ku-red); color: white; border: none; padding: 8px 12px; border-radius: 10px; margin-right: 15px; cursor: pointer; font-size: 12px;">
                                🗑️ حذف
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            
            container.innerHTML = `
                <h2 style="color: var(--ku-green); text-align: center; margin-bottom: 25px; font-size: 28px;">
                    📋 منتجاتك المختارة (${cart.length})
                </h2>
                
                ${cartItemsHtml}
                
                <div style="background: linear-gradient(135deg, var(--ku-gold), #f39c12); color: var(--ku-black); padding: 20px; border-radius: 15px; margin: 20px 0; text-align: center;">
                    <h4 style="margin-bottom: 15px;">📦 معلومات الشحن</h4>
                    <p style="margin-bottom: 10px;">✅ الشحن مجاني لجميع أنحاء الكويت</p>
                    <p style="margin-bottom: 10px;">⏰ التوصيل خلال 24-48 ساعة</p>
                    <p style="margin-bottom: 0;">📞 خدمة العملاء متاحة 24/7</p>
                </div>
                
                <div class="cart-total">
                    <div style="font-size: 22px; margin-bottom: 10px;">المجموع النهائي:</div>
                    <div class="cart-total-amount">${total.toFixed(2)} د.ك</div>
                    <small style="opacity: 0.9; margin-top: 10px; display: block;">شامل الضريبة والشحن المجاني</small>
                </div>
                
                <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                    <a href="products-catalog.html" class="cta" style="min-width: 200px;">
                        🛍️ متابعة التسوق
                    </a>
                    <button class="checkout-btn" onclick="proceedToCheckout()" style="min-width: 200px;">
                        📞 إتمام الطلب عبر واتساب
                    </button>
                </div>
                
                <button onclick="clearCart()" 
                        style="background: var(--ku-red); color: white; padding: 10px 20px; border: none; border-radius: 20px; font-size: 14px; margin: 20px auto; display: block; cursor: pointer;">
                    🧹 مسح السلة بالكامل
                </button>
            `;
        }
        
        function changeQuantity(productId, change) {
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    localStorage.setItem('sooq-cart', JSON.stringify(cart));
                    displayCart();
                }
            }
        }
        
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            localStorage.setItem('sooq-cart', JSON.stringify(cart));
            displayCart();
            
            // إشعار بصري
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed; 
                top: 20px; 
                right: 20px; 
                background: linear-gradient(135deg, #e74c3c, #c0392b);
                color: white; 
                padding: 15px 25px; 
                border-radius: 10px; 
                z-index: 1001; 
                font-weight: bold;
            `;
            notification.textContent = `🗑️ تم حذف المنتج من السلة`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                if (document.body.contains(notification)) {
                    document.body.removeChild(notification);
                }
            }, 3000);
        }
        
        function proceedToCheckout() {
            if (cart.length === 0) {
                alert('السلة فارغة!');
                return;
            }
            
            let total = 0;
            let cartDetails = cart.map((item, index) => {
                const itemTotal = item.sale_price * item.quantity;
                total += itemTotal;
                return `${index + 1}. ${item.title}%0A   الكمية: ${item.quantity}%0A   السعر: ${item.sale_price} د.ك%0A   المجموع: ${itemTotal.toFixed(2)} د.ك%0A   رقم المنتج: SOOQ-${item.id.toString().padStart(4, '0')}%0A`;
            }).join('%0A');
            
            const orderSummary = `🛒 طلب جديد من سوق الكويت:%0A%0A${cartDetails}%0A━━━━━━━━━━━━━━━━━━%0A📊 المجموع النهائي: ${total.toFixed(2)} د.ك%0A%0A📦 شحن مجاني لجميع أنحاء الكويت%0A⏰ التوصيل خلال 24-48 ساعة%0A%0A📱 يرجى تأكيد الطلب وإرسال عنوان التوصيل`;
            
            window.open(`https://wa.me/201110760081?text=${orderSummary}`, '_blank');
        }
        
        function clearCart() {
            if (confirm('هل تريد مسح جميع المنتجات من السلة؟')) {
                cart = [];
                localStorage.removeItem('sooq-cart');
                displayCart();
                
                const notification = document.createElement('div');
                notification.style.cssText = `
                    position: fixed; 
                    top: 20px; 
                    right: 20px; 
                    background: linear-gradient(135deg, #f39c12, #e67e22);
                    color: white; 
                    padding: 15px 25px; 
                    border-radius: 10px; 
                    z-index: 1001; 
                    font-weight: bold;
                `;
                notification.textContent = `🧹 تم مسح السلة بالكامل`;
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    if (document.body.contains(notification)) {
                        document.body.removeChild(notification);
                    }
                }, 3000);
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🛒 تحميل صفحة السلة...');
            displayCart();
        });
        
        // إشعار عند إضافة منتج جديد
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('added')) {
            setTimeout(() => {
                const notification = document.createElement('div');
                notification.style.cssText = `
                    position: fixed; 
                    top: 20px; 
                    right: 20px; 
                    background: linear-gradient(135deg, #27ae60, #2ecc71);
                    color: white; 
                    padding: 15px 25px; 
                    border-radius: 10px; 
                    z-index: 1001; 
                    font-weight: bold;
                `;
                notification.textContent = `✅ تمت إضافة المنتج بنجاح!`;
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    if (document.body.contains(notification)) {
                        document.body.removeChild(notification);
                    }
                    // إزالة parameter من URL
                    const newUrl = window.location.pathname;
                    window.history.replaceState({}, document.title, newUrl);
                }, 3000);
            }, 500);
        }
    </script>
</body>
</html>
