<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سوق الكويت | جميع المنتجات</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root { --ku-green:#00843d; --ku-red:#ce1126; --ku-gold:#ffcd00; --ku-black:#222 }
    body{font-family:'Cairo',Arial,sans-serif;background:#f8f9fa;margin:0}
    .header{background:linear-gradient(135deg,var(--ku-green),var(--ku-red));color:#fff;padding:22px 0 15px;text-align:center}
    .header-title{font-size:2.2rem;font-weight:900}
    .container{max-width:1200px;margin:0 auto;padding:28px 12px 60px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:22px}
    .card{background:#fff;border-radius:16px;box-shadow:0 6px 18px rgba(0,0,0,.08);padding:14px;position:relative;border:2px solid transparent;transition:.25s}
    .card:hover{transform:translateY(-6px);border-color:var(--ku-gold)}
    .img{width:100%;height:200px;object-fit:cover;border-radius:12px;border:1px solid #eee;background:#fafafa}
    .title{margin:10px 0 6px;color:var(--ku-green);font-weight:800;font-size:18px;height:46px;overflow:hidden}
    .price{background:#fff2f2;color:var(--ku-red);font-weight:bold;text-align:center;border-radius:8px;padding:8px 0;margin-top:6px}
    .actions{display:flex;gap:8px;margin-top:10px}
    .wa{background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;border:none;border-radius:9px;padding:10px 14px;text-decoration:none;font-weight:700;flex:1;text-align:center}
    .cart{background:var(--ku-gold);color:#222;border:none;border-radius:9px;padding:10px 14px;font-weight:800;cursor:pointer;flex:1}
    .footer{background:#222;color:#eee;text-align:center;padding:30px 0;margin-top:40px}
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">سوق الكويت 🇰🇼</div>
    <div>عرض مباشر لكل المنتجات من ملف البيانات</div>
  </div>
  <div class="container">
    <div id="grid" class="grid"><div style="grid-column:1 / -1;text-align:center;font-size:20px;color:#666">⏳ جاري تحميل المنتجات...</div></div>
  </div>
  <div class="footer">© 2025 سوق الكويت - جميع الحقوق محفوظة</div>

  <script>
    const DATA_URL = 'https://raw.githubusercontent.com/sherow1982/sooq-alkuwait/main/products_data.json';

    function stripNum(t){ return (t||'').replace(/^\s*\d+\s+/, ''); }

    function addToCart(item){
      try{
        const cart = JSON.parse(localStorage.getItem('sooq-cart')||'[]');
        const idx = cart.findIndex(x=>x.id===item.id);
        if(idx>-1){ cart[idx].quantity += 1; }
        else{ cart.push({...item, quantity:1}); }
        localStorage.setItem('sooq-cart', JSON.stringify(cart));
        notify('✅ تم إضافة "'+item.title+'" إلى السلة');
      }catch(e){ console.error(e); }
    }

    function notify(msg){
      const n=document.createElement('div');
      n.style.cssText='position:fixed;top:20px;right:20px;background:#00843d;color:#fff;padding:12px 18px;border-radius:10px;font-weight:700;z-index:9999;box-shadow:0 6px 18px rgba(0,0,0,.2)';
      n.textContent=msg;document.body.appendChild(n);setTimeout(()=>n.remove(),2200);
    }

    async function load(){
      try{
        const r = await fetch(DATA_URL, {cache:'no-cache'});
        if(!r.ok) throw new Error('HTTP '+r.status);
        const products = await r.json();
        const grid = document.getElementById('grid');
        let html='';
        products.forEach(p=>{
          const title = stripNum(p.title);
          const img = (p.image_link||'').trim();
          const wa = 'https://wa.me/201110760081?text='+encodeURIComponent('مرحبا، أريد طلب: '+title+' - السعر: '+Number(p.sale_price).toFixed(2)+' د.ك');
          html += `
          <div class="card" onclick="window.open('products-pages/product-${p.id}.html','_blank')">
            <img class="img" src="${img}" onerror="this.src='https://via.placeholder.com/400x300/00843d/ffffff?text=منتج'" alt="${title}">
            <div class="title">${title}</div>
            <div class="price">${Number(p.sale_price).toFixed(2)} د.ك</div>
            <div class="actions" onclick="event.stopPropagation()">
              <a class="wa" href="${wa}" target="_blank">واتساب</a>
              <button class="cart" onclick='addToCart({id:${p.id},title:"${title.replace(/"/g, "&quot;")}",price:${Number(p.sale_price)},image:"${img}"})'>أضف للسلة</button>
            </div>
          </div>`;
        });
        grid.innerHTML = html || '<div style="grid-column:1/-1;text-align:center">لا توجد منتجات</div>';
      }catch(e){
        document.getElementById('grid').innerHTML='<div style="grid-column:1/-1;color:#c53030;text-align:center">❌ خطأ في تحميل المنتجات</div>';
        console.error(e);
      }
    }
    document.addEventListener('DOMContentLoaded', load);
  </script>
</body>
</html>
