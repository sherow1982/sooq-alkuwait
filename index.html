<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سوق الكويت | جميع المنتجات</title>
  <meta name="description" content="كتالوج سوق الكويت - تصفح جميع المنتجات مباشرة من المستودع">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --ku-green: #00843d; --ku-red: #ce1126; --ku-gold: #ffcd00; --ku-black: #222; }
    body { font-family: 'Cairo', Arial, sans-serif; margin: 0; background: #f8f9fa; color: var(--ku-black); }
    .header { background: linear-gradient(135deg, var(--ku-green), var(--ku-red)); color: white; padding: 22px 0 15px 0; text-align: center; letter-spacing: 1px; }
    .header-title { font-size: 2.5rem; font-weight: bold; }
    .subtitle { font-weight: 400; font-size: 1.15rem; color: var(--ku-gold); }
    .container { max-width: 1200px; margin: 0 auto; padding: 30px 15px 60px 15px; }
    .products-listing { display: grid; grid-template-columns: repeat(auto-fill,minmax(270px,1fr)); gap: 28px; }
    .product-card { background: white; border-radius: 18px; box-shadow: 0 7px 19px rgba(0,0,0,0.07); padding: 18px; display: flex; flex-direction: column; align-items: center; cursor: pointer; border: 2px solid transparent; transition: .28s all; position: relative; }
    .product-card:hover { border-color: var(--ku-gold); box-shadow: 0 10px 30px rgba(0,132,61,.07); transform: translateY(-5px) scale(1.015); }
    .product-image { width: 100%; max-width: 185px; height: 165px; object-fit: contain; border-radius: 14px; margin-bottom: 16px; background: #fafbfc; border: 1px solid #eee; }
    .product-title { color: var(--ku-green); font-weight: 800; font-size: 19px; margin-bottom: 9px; text-align: center; height: 47px; overflow: hidden; }
    .product-details { color: #333; margin-bottom: 7px; text-align:center; font-size:15px; min-height:36px;}
    .product-link { position:absolute; inset:0; z-index:2; border-radius:inherit; text-indent:-9999px }
    .product-price { width: 100%; color: var(--ku-red); background: #fff2f2; font-weight: bold; border-radius: 8px; font-size: 18px; text-align: center; margin: 4px 0 10px 0; padding: 8px 0; }
    .product-actions { display: flex; gap: 8px; width: 100%; justify-content: center; margin-top:6px; }
    .wa-btn { background: linear-gradient(135deg, #25d366,#128c7e); color:white; border:none; border-radius:9px; font-weight:bold; padding:10px 25px; text-decoration:none; transition:0.2s; }
    .wa-btn:hover { background:linear-gradient(135deg,#128c7e,#25d366); color:white; }
    .view-link { background: var(--ku-gold); color: #222; border:none; border-radius:9px; font-weight:700; padding:10px 18px; text-decoration:none; }
    .view-link:hover { background: #ffec80; color: #222; }
    .footer { background: var(--ku-black); color: #ececec; text-align:center; font-size:15px; padding:32px 0;margin-top:38px; border-radius:20px 20px 0 0;}
    @media(max-width: 820px){.products-listing{grid-template-columns:1fr 1fr}}@media(max-width: 490px){.products-listing{grid-template-columns:1fr} .container{padding:10px 2px}!important;}
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">سوق الكويت 🇰🇼</div>
    <div class="subtitle">كتالوج شامل لجميع المنتجات مباشرة من المستودع</div>
  </div>
  <div class="container">
    <h2 style="color:var(--ku-green);font-weight:900;text-align:center;font-size:29px;margin-bottom:30px">📦 كل المنتجات</h2>
    <div id="products-list" class="products-listing">
      <div style="font-size:22px;text-align:center;width:100%;">⏳ جاري تحميل قائمة المنتجات من GitHub ...</div>
    </div>
  </div>
  <div class="footer">© 2025 سوق الكويت - جميع الحقوق محفوظة</div>
  <script>
    // قراءة محتوى المجلد من GitHub API
    async function fetchProductPages() {
      try {
        const response = await fetch('https://api.github.com/repos/sherow1982/sooq-alkuwait/contents/products-pages');
        if (!response.ok) throw new Error('تعذر تحميل المنتجات');
        const data = await response.json();
        return data.filter(f=>f.name.endsWith('.html'));
      } catch (e) {
        return null;
      }
    }
    
    async function showProducts() {
      const listEl = document.getElementById('products-list');
      let pages = await fetchProductPages();
      if (!pages) {
        listEl.innerHTML='<div style="color:#d32f2f;font-size:22px">❌ خطأ في تحميل المنتجات من GitHub</div>';
        return;
      }
      let html = '';
      for (let file of pages) {
        const idMatch = file.name.match(/product-(\d+)\.html/);
        const id = idMatch ? idMatch[1] : file.name;
        html += `<div class="product-card">
          <a class="product-link" href="products-pages/${file.name}" target="_blank">${file.name}</a>
          <img class="product-image" src="https://raw.githubusercontent.com/sherow1982/sooq-alkuwait/main/products-pages/${file.name.replace('.html','.jpg')}" onerror="this.src='https://via.placeholder.com/185x165/00843d/fff?text=منتج'" />
          <div class="product-title">منتج رقم ${id}</div>
          <div class="product-price">انقر للعرض &raquo;</div>
          <div class="product-actions">
            <a href="products-pages/${file.name}" class="view-link" target="_blank">صفحة المنتج</a>
          </div>
        </div>`;
      }
      listEl.innerHTML=html||'<div style="font-size:22px">لا توجد منتجات حالياً</div>';
    }
    document.addEventListener('DOMContentLoaded',showProducts);
  </script>
</body>
</html>
