<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سوق الكويت 🇰🇼 - الرئيسية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--ku-green:#00843d;--ku-red:#ce1126;--ku-gold:#ffcd00;--ku-black:#222}
    body{font-family:'Cairo',sans-serif;background:#f8f9fa;margin:0}
    .header{background:linear-gradient(135deg,var(--ku-green),var(--ku-red));color:#fff;padding:22px 0 15px;text-align:center}
    .header-title{font-size:2.4rem;font-weight:900}
    .container{max-width:1200px;margin:0 auto;padding:28px 12px 60px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:22px}
    .cat{background:#fff;border-radius:16px;box-shadow:0 6px 18px rgba(0,0,0,.08);padding:18px;position:relative;border:2px solid transparent;transition:.25s}
    .cat:hover{transform:translateY(-6px);border-color:var(--ku-gold)}
    .cat h3{margin:10px 0 6px;color:var(--ku-green)}
    .cat p{margin:0;color:#555;min-height:44px}
    .num{display:inline-block;background:#fff2c2;color:#222;padding:4px 10px;border-radius:12px;font-weight:800;margin-top:10px}
    .cta{display:inline-block;background:var(--ku-gold);color:#222;text-decoration:none;border-radius:10px;padding:10px 18px;margin-top:12px;font-weight:800}
  </style>
</head>
<body>
  <header class="header">
    <div class="header-title">سوق الكويت 🇰🇼</div>
    <div>استكشف فئات المنتجات بدقة وبأسعار مميزة</div>
  </header>
  <main class="container">
    <section>
      <h2 style="text-align:center;color:var(--ku-green);margin-bottom:20px">🏷️ الفئات</h2>
      <div id="cats" class="grid"></div>
    </section>
  </main>
  <footer style="background:#222;color:#eee;text-align:center;padding:26px 0">© 2025 سوق الكويت - جميع الحقوق محفوظة</footer>

  <script>
    const DATA_URL='https://raw.githubusercontent.com/sherow1982/sooq-alkuwait/main/products_data.json';
    const stripNum=t=>(t||'').replace(/^\s*\d+\s+/, '');

    const rules=[
      {name:'الأطفال', kw:['أطفال','طفل','لعبة','حصالة','روبوت','فقاعات','كرتوني','تعليمية']},
      {name:'المطبخ', kw:['مطبخ','قهوة','صفاية','سلطة','خلاط','عصارة','مفرمة','طبخ','مطحنة','مقلاة','فرن']},
      {name:'الملابس والإكسسوارات', kw:['شورت','حقيبة','حقيبه','ملابس','قميص','فستان','حذاء','نظارة','ساعة','موضة','اكسسوار']},
      {name:'السيارات', kw:['سيارة','سيارات','محول','كاميرا','حامل','مطفأة','فولت','ولاعة','مرآة']},
      {name:'العناية الشخصية', kw:['شامبو','سيروم','كريم','عطر','حلاقة','تجميل','بشرة','شعر','عناية','مكياج','ماسك']},
      {name:'المنزل والحديقة', kw:['منزل','حديقة','تنظيف','غسيل','مكنسة','أثاث','ديكور','إضاءة','مرتبة','مفرش','ستارة']},
      {name:'الإلكترونيات', kw:['إلكتروني','هاتف','كمبيوتر','شاحن','بطارية','كابل','سماعة','شاشة','سماعات','USB','Type-C']},
      {name:'الرياضة واللياقة', kw:['رياضة','لياقة','جري','تمارين','كرة','دراجة','جهاز','وزن','شد','يوغا']},
    ];

    function detectCategory(title){
      const t=title.toLowerCase();
      for(const r of rules){ if(r.kw.some(k=>t.includes(k.toLowerCase()))) return r.name; }
      return 'منتجات أخرى';
    }

    async function load(){
      const catsEl=document.getElementById('cats');
      try{
        const r=await fetch(DATA_URL,{cache:'no-cache'}); if(!r.ok) throw new Error('HTTP '+r.status);
        const items=await r.json();
        // بناء خريطة الفئات
        const map=new Map();
        for(const it of items){
          const name=detectCategory(it.title);
          if(!map.has(name)) map.set(name,{count:0, samples:[]});
          const entry=map.get(name);
          entry.count++;
          if(entry.samples.length<3){
            entry.samples.push({id:it.id,title:stripNum(it.title),img:(it.image_link||'').trim(),price:Number(it.sale_price)});
          }
        }
        // تحويل إلى بطاقات
        const order=[...rules.map(r=>r.name),'منتجات أخرى'];
        const cards=[];
        for(const catName of order){
          const d=map.get(catName); if(!d) continue;
          const sampleImgs=d.samples.map(s=>`<img src="${s.img}" alt="${s.title}" loading="lazy" onerror="this.style.display='none'" style="width:64px;height:64px;object-fit:cover;border:1px solid #eee;border-radius:8px">`).join('');
          cards.push(`
            <article class="cat" itemscope itemtype="http://schema.org/CollectionPage">
              <h3 itemprop="name">${catName}</h3>
              <p>${d.samples.length? 'أمثلة: '+d.samples.map(s=>s.title).join(' • '):'منتجات متنوعة'}</p>
              <div style="display:flex;gap:6px;margin:10px 0">${sampleImgs}</div>
              <span class="num">${d.count.toLocaleString('ar')} منتج</span><br>
              <a class="cta" href="products-catalog.html" title="عرض ${catName}">عرض المنتجات</a>
            </article>`);
        }
        catsEl.innerHTML = cards.join('') || '<div style="grid-column:1/-1;text-align:center">لا توجد بيانات</div>';
      }catch(e){
        catsEl.innerHTML='<div style="grid-column:1/-1;color:#c53030;text-align:center">❌ خطأ في تحميل البيانات</div>';
        console.error(e);
      }
    }
    document.addEventListener('DOMContentLoaded',load);
  </script>
</body>
</html>
