<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الطلب - سوق الكويت</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="geo-location.js"></script>
    <style>
    .checkout-note {
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 16px;
        font-weight: 600;
    }
    .checkout-note.success {
        background: #dcfce7;
        color: #166534;
        border: 1px solid #bbf7d0;
    }
    .checkout-note.error {
        background: #fecaca;
        color: #dc2626;
        border: 1px solid #f87171;
    }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <main class="container" style="padding: 140px 0 80px;">
        <div style="max-width: 640px; margin: 0 auto; background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <h2 style="color: var(--kuwait-black); margin-bottom: 2rem; text-align: center;">
                <i class="fas fa-credit-card" style="color: var(--kuwait-green);"></i> إتمام الطلب
            </h2>

            <form id="checkout-form" style="margin-bottom: 2rem;">
                <div class="form-group">
                    <label for="name">الاسم الكامل <span style="color: red;">*</span></label>
                    <input type="text" id="name" name="name" required style="width: 100%; padding: 1rem; border: 2px solid #ddd; border-radius: 10px; font-family: Cairo;">
                </div>

                <div class="form-group">
                    <label for="phone">رقم الهاتف الكويتي <span style="color: red;">*</span></label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="text" value="+965" readonly style="width: 90px; padding: 1rem; border: 2px solid #ddd; border-radius: 10px; background: #f7f7f7; font-weight: 700; text-align: center;">
                        <input type="tel" id="phone" name="phone" inputmode="numeric" pattern="[569][0-9]{7}" maxlength="8" placeholder="مثال: 55123456" required style="flex: 1; padding: 1rem; border: 2px solid #ddd; border-radius: 10px; font-family: Cairo;">
                    </div>
                    <small style="color: #666; display: block; margin-top: 0.5rem;">يجب أن يبدأ بـ 5 أو 6 أو 9 ويتكون من 8 أرقام</small>
                </div>

                <div class="form-group">
                    <label for="governorate">المحافظة <span style="color: red;">*</span></label>
                    <select id="governorate" name="governorate" required style="width: 100%; padding: 1rem; border: 2px solid #ddd; border-radius: 10px; font-family: Cairo;">
                        <option value="">اختر المحافظة</option>
                        <option value="العاصمة">العاصمة</option>
                        <option value="حولي">حولي</option>
                        <option value="الفروانية">الفروانية</option>
                        <option value="الأحمدي">الأحمدي</option>
                        <option value="الجهراء">الجهراء</option>
                        <option value="مبارك الكبير">مبارك الكبير</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="address">عنوان التوصيل بالتفصيل <span style="color: red;">*</span></label>
                    <textarea id="address" name="address" required rows="3" placeholder="القطعة، الشارع، المنزل/الشقة..." style="width: 100%; padding: 1rem; border: 2px solid #ddd; border-radius: 10px; font-family: Cairo; resize: vertical;"></textarea>
                </div>

                <div class="order-summary" style="background: rgba(0,166,81,0.1); padding: 1.5rem; border-radius: 15px; margin: 2rem 0;">
                    <h3 style="margin-bottom: 1rem; color: var(--kuwait-black);">ملخص الطلب</h3>
                    <div id="orderItems"></div>
                    <hr style="margin: 1rem 0; border: 1px solid #ddd;">
                    <div style="display: flex; justify-content: space-between; font-weight: 600; font-size: 1.2rem;">
                        <span>الإجمالي:</span>
                        <span id="finalTotal">0 د.ك</span>
                    </div>
                </div>

                <button type="submit" id="submitBtn" style="width: 100%; padding: 1.5rem; background: var(--kuwait-green); color: white; border: none; border-radius: 15px; font-size: 1.3rem; font-weight: 700; cursor: pointer;">
                    <i class="fab fa-whatsapp"></i> إرسال الطلب عبر واتساب
                </button>

                <div id="geoBlockMessage" style="display: none; color: var(--kuwait-red); font-weight: 600; text-align: center; margin-top: 1rem;">
                    عفواً، التوصيل متاح داخل الكويت فقط 🇰🇼
                </div>
            </form>
        </div>
    </main>

    <div id="site-footer"></div>

    <script>
        function isValidKuwaitiPhone(localPart) {
            return /^[569][0-9]{7}$/.test(localPart);
        }

        window.addEventListener('load', function() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            if (cart.length === 0) { window.location.href = '/'; return; }

            let total = 0; let itemsHtml = '';
            cart.forEach(item => {
                const itemTotal = (item.sale_price || item.price) * (item.quantity || 1);
                total += itemTotal;
                itemsHtml += `<div style="display:flex;justify-content:space-between;margin:.5rem 0;"><span>${item.title.substring(0,30)}...</span><span>${itemTotal.toFixed(2)} د.ك</span></div>`;
            });
            document.getElementById('orderItems').innerHTML = itemsHtml;
            document.getElementById('finalTotal').textContent = total.toFixed(2) + ' د.ك';

            // تعطيل الإرسال للمقيمين خارج الكويت
            if (!window.geoIsKuwait) {
                document.getElementById('submitBtn').disabled = true;
                document.getElementById('submitBtn').style.background = '#ccc';
                document.getElementById('geoBlockMessage').style.display = 'block';
            }

            document.getElementById('checkout-form').addEventListener('submit', function(e) {
                e.preventDefault();
                const localPhone = document.getElementById('phone').value.trim();
                const gov = document.getElementById('governorate').value;
                const name = document.getElementById('name').value.trim();
                const address = document.getElementById('address').value.trim();

                if (!window.geoIsKuwait) { alert('عذراً، التوصيل متاح داخل الكويت فقط 🇰🇼'); return; }
                if (!isValidKuwaitiPhone(localPhone)) { alert('أدخل رقم كويتي صحيح (يبدأ بـ 5 أو 6 أو 9، 8 أرقام)'); return; }
                if (!gov) { alert('اختر المحافظة'); return; }
                if (!name || !address) { alert('أكمل البيانات المطلوبة'); return; }

                const fullPhone = `+965${localPhone}`;
                let orderText = `طلب جديد من سوق الكويت 🛍️\n\n`;
                orderText += `👤 الاسم: ${name}\n`;
                orderText += `📞 الهاتف: ${fullPhone}\n`;
                orderText += `🏙️ المحافظة: ${gov}\n`;
                orderText += `📍 العنوان: ${address}\n\n`;
                orderText += `🛍️ تفاصيل الطلب:\n`;
                cart.forEach((item, index) => {
                    orderText += `${index + 1}. ${item.title}\n`;
                    orderText += `   الكمية: ${item.quantity || 1} | السعر: ${item.sale_price || item.price} د.ك\n\n`;
                });
                orderText += `💰 الإجمالي: ${total.toFixed(2)} د.ك\n`;
                orderText += `شكراً لاختياركم سوق الكويت! 🇰🇼`;

                const whatsappUrl = `https://wa.me/201110760081?text=${encodeURIComponent(orderText)}`;
                window.open(whatsappUrl, '_blank');
                localStorage.removeItem('cart');
                
                // تحديث عداد السلة
                if (window.dispatchEvent) {
                    window.dispatchEvent(new CustomEvent('cart:updated'));
                }
                
                alert('تم إرسال طلبك! سنتواصل معك قريباً 🙏');
                window.location.href = '/';
            });
        });
    </script>
    <script src="partials/partials-loader.js" defer></script>
    <script src="cart-core.js" defer></script>
    <script src="checkout-ajax.js" defer></script>
</body>
</html>
