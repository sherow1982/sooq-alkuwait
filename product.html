<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج - سوق الكويت</title>
    <meta name="description" content="عرض تفاصيل المنتج بأفضل الأسعار في سوق الكويت">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --kuwait-green: #007A3D; --kuwait-red: #CE1126; --kuwait-black: #000000; --kuwait-white: #FFFFFF; --kuwait-green-light: #00B359; --kuwait-green-dark: #005A2D; --kuwait-gold: #FFD700; --shadow-medium: rgba(0, 122, 61, 0.25); --gradient-kuwait: linear-gradient(135deg, var(--kuwait-green) 0%, var(--kuwait-red) 100%); --gradient-subtle: linear-gradient(145deg, rgba(255,255,255,0.98) 0%, rgba(248,248,248,0.95) 100%); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--gradient-kuwait); min-height: 100vh; line-height: 1.8; color: var(--kuwait-black); }
        .container { max-width: 1000px; margin: 0 auto; padding: 30px; }
        .back-btn { display: inline-flex; align-items: center; gap: 10px; background: var(--kuwait-green); color: var(--kuwait-white); text-decoration: none; padding: 15px 30px; border-radius: 30px; font-weight: 700; margin-bottom: 30px; transition: all 0.3s ease; box-shadow: 0 8px 20px var(--shadow-medium); }
        .back-btn:hover { background: var(--kuwait-green-dark); transform: translateY(-3px); }
        .product-container { background: var(--gradient-subtle); padding: 50px; border-radius: 30px; box-shadow: 0 25px 50px var(--shadow-medium); border: 4px solid var(--kuwait-white); position: relative; }
        .product-container::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: var(--gradient-kuwait); border-radius: 30px 30px 0 0; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; margin-bottom: 40px; }
        .product-image-section { text-align: center; }
        .product-image { width: 100%; max-width: 400px; height: 400px; object-fit: cover; border-radius: 20px; border: 3px solid var(--kuwait-green-light); box-shadow: 0 15px 35px var(--shadow-medium); }
        .product-info h1 { font-size: 2.2em; color: var(--kuwait-black); margin-bottom: 25px; font-weight: 800; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        .price-section { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .current-price { font-size: 2.5em; color: var(--kuwait-red); font-weight: 800; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        .original-price { font-size: 1.5em; color: #999; text-decoration: line-through; font-weight: 600; }
        .discount-badge { background: var(--gradient-kuwait); color: var(--kuwait-white); padding: 10px 20px; border-radius: 25px; font-size: 1.1em; font-weight: 700; box-shadow: 0 5px 15px var(--shadow-medium); }
        .description { font-size: 1.2em; line-height: 1.8; margin-bottom: 40px; color: var(--kuwait-green-dark); font-weight: 600; }
        .action-buttons { display: flex; gap: 20px; }
        .whatsapp-order-btn { background: linear-gradient(135deg, #25d366 0%, #128c7e 100%); color: var(--kuwait-white); border: 3px solid var(--kuwait-white); border-radius: 30px; padding: 18px 35px; font-size: 1.2em; font-weight: 800; text-decoration: none; display: flex; align-items: center; gap: 12px; transition: all 0.4s ease; flex: 1; justify-content: center; box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4); }
        .whatsapp-order-btn:hover { background: linear-gradient(135deg, var(--kuwait-green) 0%, var(--kuwait-green-dark) 100%); transform: translateY(-5px); border-color: var(--kuwait-gold); }
        .whatsapp-btn { position: fixed; bottom: 30px; left: 30px; background: linear-gradient(135deg, #25d366 0%, #128c7e 100%); color: var(--kuwait-white); border: 3px solid var(--kuwait-white); border-radius: 60px; padding: 20px 28px; font-size: 17px; font-weight: 700; z-index: 1001; transition: all 0.4s ease; text-decoration: none; display: flex; align-items: center; gap: 12px; }
        .whatsapp-btn:hover { background: linear-gradient(135deg, var(--kuwait-green) 0%, var(--kuwait-green-dark) 100%); transform: translateY(-5px) scale(1.08); }
        @media (max-width: 768px) { .container { padding: 20px; } .product-grid { grid-template-columns: 1fr; gap: 30px; } .product-image { height: 300px; } .action-buttons { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="products-catalog.html" class="back-btn">← عودة للكتالوج</a>
        
        <div class="product-container">
            <div class="product-grid">
                <div class="product-image-section">
                    <img id="productImage" class="product-image" src="" alt="">
                </div>
                
                <div class="product-info">
                    <h1 id="productTitle"></h1>
                    
                    <div class="price-section">
                        <span id="currentPrice" class="current-price"></span>
                        <span id="originalPrice" class="original-price" style="display: none;"></span>
                        <div id="discountBadge" class="discount-badge" style="display: none;"></div>
                    </div>
                    
                    <div class="action-buttons">
                        <a id="whatsappOrderBtn" class="whatsapp-order-btn" href="" target="_blank">
                            💬 اطلب عبر واتساب
                        </a>
                    </div>
                </div>
            </div>
            
            <div class="description" id="productDescription"></div>
        </div>
    </div>
    
    <a href="https://wa.me/201110760081" target="_blank" class="whatsapp-btn">💬 تواصل معنا</a>

    <script>
        async function loadProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            
            if (!productId) {
                window.location.href = 'products-catalog.html';
                return;
            }
            
            try {
                const response = await fetch('https://raw.githubusercontent.com/sherow1982/sooq-alkuwait/main/products_data.json');
                const products = await response.json();
                const product = products.find(p => p.id == productId);
                
                if (!product) {
                    window.location.href = 'products-catalog.html';
                    return;
                }
                
                displayProduct(product);
            } catch (error) {
                console.error('خطأ في تحميل المنتج:', error);
                window.location.href = 'products-catalog.html';
            }
        }
        
        function displayProduct(product) {
            document.getElementById('productImage').src = product.image_link;
            document.getElementById('productImage').alt = product.title + ' - سوق الكويت';
            document.getElementById('productTitle').textContent = product.title;
            document.getElementById('currentPrice').textContent = (product.sale_price || product.price) + ' د.ك';
            document.getElementById('productDescription').textContent = product.description;
            
            if (product.sale_price && product.price !== product.sale_price) {
                document.getElementById('originalPrice').textContent = product.price + ' د.ك';
                document.getElementById('originalPrice').style.display = 'inline';
                
                const discount = Math.round(((product.price - product.sale_price) / product.price) * 100);
                document.getElementById('discountBadge').textContent = '-' + discount + '%';
                document.getElementById('discountBadge').style.display = 'block';
            }
            
            document.getElementById('whatsappOrderBtn').href = 
                `https://wa.me/201110760081?text=مرحباً، أريد طلب: ${encodeURIComponent(product.title)} - السعر: ${product.sale_price || product.price} د.ك`;
                
            document.title = product.title + ' - سوق الكويت';
        }
        
        document.addEventListener('DOMContentLoaded', loadProduct);
    </script>
</body>
</html>
