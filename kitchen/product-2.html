<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

</head>
<body>
    <header class="header">
        <div class="container">
            <div class="nav-wrapper">

                        صفاية سلطة دوّارة متعددة الوظائف

                    <div class="product-price" style="margin: 2rem 0; padding: 1.5rem; background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(0,166,81,0.1)); border-radius: 15px;">

• جودة عالية

🚚 توصيل مجاني فوق 100 د.ك

        const message = `مرحباً! أريد هذا المنتج:\nصفاية سلطة\nالسعر: 13.0 د.ك`;
        window.open(`https://wa.me/201110760081?text=${encodeURIComponent(message)}`, '_blank');
