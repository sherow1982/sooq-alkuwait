<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading... | سوق الكويت</title>
    <meta name="description" content="منتج متوفر في سوق الكويت مع شحن مجاني">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Tajawal', sans-serif; }
        body { background: #f8f9fa; margin: 0; padding: 0; }
        
        .top-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .top-header h1 { font-size: 1.8rem; margin: 0; font-weight: 700; }
        
        .product-wrapper { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .product-box {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.1);
        }
        
        .product-image-container { text-align: center; margin-bottom: 30px; }
        .product-image-container img {
            max-width: 100%;
            max-height: 450px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        
        .product-title {
            font-size: 2rem;
            font-weight: 700;
            color: #2c3e50;
            margin: 20px 0;
            line-height: 1.5;
        }
        
        .rating-badge {
            display: inline-block;
            background: #27ae60;
            color: white;
            padding: 8px 15px;
            border-radius: 25px;
            font-weight: 600;
            margin: 10px 0;
        }
        
        .price-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            margin: 25px 0;
        }
        .old-price {
            text-decoration: line-through;
            font-size: 1.5rem;
            opacity: 0.8;
        }
        .new-price {
            font-size: 2.8rem;
            font-weight: 700;
            margin: 10px 0;
        }
        .discount-badge {
            background: #27ae60;
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 30px 0;
        }
        .feature-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .feature-box i { font-size: 2rem; margin-bottom: 10px; }
        
        .description-box {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin: 25px 0;
            line-height: 1.8;
        }
        
        .whatsapp-section {
            text-align: center;
            margin: 40px 0;
            padding: 30px;
            background: linear-gradient(135deg, #f5f7fa, #e3f2fd);
            border-radius: 15px;
        }
        .whatsapp-section h3 {
            color: #2c3e50;
            font-size: 1.5rem;
            margin-bottom: 15px;
            font-weight: 700;
        }
        .whatsapp-btn {
            display: inline-block;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            font-size: 1.4rem;
            font-weight: 700;
            padding: 20px 50px;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4);
            transition: all 0.3s ease;
        }
        .whatsapp-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(37, 211, 102, 0.5);
            color: white;
        }
        
        .floating-whatsapp {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: #25D366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 5px 20px rgba(37, 211, 102, 0.4);
            z-index: 9999;
            text-decoration: none;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @media (max-width: 768px) {
            .product-image-container img { max-height: 350px; }
            .product-title { font-size: 1.5rem; }
            .new-price { font-size: 2.2rem; }
            .features-grid { grid-template-columns: 1fr; gap: 10px; }
            .whatsapp-btn { font-size: 1.2rem; padding: 18px 35px; width: 100%; }
            .product-box { padding: 20px; }
        }
    </style>
</head>
<body>
    <header class="top-header">
        <h1>🛍️ سوق الكويت</h1>
        <p style="margin:5px 0 0 0;font-size:1rem;">متجرك الموثوق للمنتجات الأصلية</p>
    </header>
    
    <div class="product-wrapper">
        <div class="product-box">
            
            <div class="product-image-container">
                <img src="" alt="منتج" loading="lazy">
            </div>
            
            <h2 class="product-title">جاري التحميل...</h2>
            
            <div class="rating-badge">
                ⭐ 4.9 (5 تقييم) - الأكثر مبيعاً
            </div>
            
            <div class="price-box">
                <div class="new-price">0.00 د.ك</div>
            </div>
            
            <div class="features-grid">
                <div class="feature-box">
                    <i class="fas fa-shipping-fast text-success"></i>
                    <h6 class="fw-bold">شحن مجاني</h6>
                    <small class="text-muted">لجميع الكويت</small>
                </div>
                <div class="feature-box">
                    <i class="fas fa-undo text-info"></i>
                    <h6 class="fw-bold">إرجاع مجاني</h6>
                    <small class="text-muted">خلال 14 يوم</small>
                </div>
                <div class="feature-box">
                    <i class="fas fa-shield-alt text-warning"></i>
                    <h6 class="fw-bold">ضمان الجودة</h6>
                    <small class="text-muted">أصلي 100%</small>
                </div>
            </div>
            
            <div class="whatsapp-section">
                <h3>🛒 جاهز للطلب؟</h3>
                <p style="color:#666;margin-bottom:20px;">اضغط الزر وأرسل طلبك الآن</p>
                <a href="#" target="_blank" class="whatsapp-btn">
                    <i class="fab fa-whatsapp" style="margin-left:10px;"></i>
                    اطلب عبر واتساب - شحن مجاني 🚚
                </a>
                <p style="margin-top:15px;color:#666;font-size:0.95rem;">
                    ✅ ضمان الجودة | ⚡ رد فوري | 🚚 توصيل سريع
                </p>
            </div>
            
        </div>
    </div>
    
    <a href="#" target="_blank" class="floating-whatsapp">
        <i class="fab fa-whatsapp"></i>
    </a>
    
    <script src="product-loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
